# config/agents/hermes.yaml

module: hermes
enabled: true

# Minimum expected Hermes CLI version (v0.2.0+ unlocks provider router, MCP client, skills)
version_minimum: "0.2.0"

# Backend options: auto, cli, ollama
backend: auto

# Default inference provider (used by CLI backend for --provider flag)
provider: openrouter

# The default model (matches ~/.hermes/config.yaml)
model: nvidia/nemotron-3-super-120b-a12b:free

# The command/binary name for the official NousResearch Hermes CLI
command: hermes

# Subprocess timeout in seconds for normal chat/run operations
timeout: 600

# Longer timeout for dispatch operations, which include full source code in prompts
# and require Ollama to generate full improved Python source files as output.
# 900s handles scripts up to ~500 lines across all local Ollama inference speeds.
dispatch_timeout: 900

# SQLite session database path (~ is expanded at runtime)
session_db: ~/.codomyrmex/hermes_sessions.db

# Default prompt sent when run_hermes.py is invoked with no --prompt flag
default_prompt: "Explain what Hermes Agent is in one sentence."

# Observability and telemetry
observability:
  enable_traces: true
  log_level: DEBUG
  trace_file: logs/hermes_traces.jsonl

# Evaluator configuration (used by evaluate_orchestrators.py)
evaluator:
  # Directory for saving evaluation JSON + overall report (repo-root relative)
  output_dir: evaluations
  # Per-script execution timeout in seconds (script is executed before Hermes assesses it)
  script_timeout: 30
  # Hermes assessment timeout in seconds (separate from script_timeout)
  # Must be long enough to receive Hermes reasoning + JSON for the full source
  assessment_timeout: 600
  # Scripts that should be assessed from source only (NOT executed as subprocesses).
  # evaluate_orchestrators.py would recurse; dispatch_hermes.py would block on Hermes.
  no_exec_scripts:
    - evaluate_orchestrators.py
    - dispatch_hermes.py
  # Directories to exclude from script discovery
  excluded_dirs:
    - evaluations
    - output
    - __pycache__
    - dispatches

# Dispatch configuration (used by dispatch_hermes.py)
dispatch:
  # Agent to use: hermes | jules | claude
  agent: hermes
  # Mode: prompt (send directly) | issue (write shell command files)
  mode: prompt
  # Output directory for dispatch artefacts (repo-root relative)
  output_dir: dispatches
  # Only dispatch for NON_COMPLIANT scripts when true
  filter_failing: true
  # Always include full script source code in dispatch prompts (set false only when debugging)
  include_source: true
  # When true, write Hermes-improved code directly back to the original source files.
  # A .py.bak backup is created automatically. Set to true only after reviewing guidance files.
  apply: false

# Per-target evaluator overrides (keyed by the --target argument value)
# Used by evaluate_orchestrators.py when --target matches a key here.
target_overrides:
  "agents/gemini":
    # Save gemini evals to a dedicated subdirectory
    output_dir: evaluations/gemini
    # Both gemini scripts gracefully exit=0 without an API key — execute them.
    no_exec_scripts: []
    # Inject test-mode env so API-calling scripts short-circuit cleanly
    run_env:
      CODOMYRMEX_TEST_MODE: "1"
  "agents/hermes":
    output_dir: evaluations
    no_exec_scripts:
      - evaluate_orchestrators.py
      - dispatch_hermes.py
  "api":
    # Save api evals to a dedicated subdirectory
    output_dir: evaluations/api
    # Demo scripts exit gracefully without live API — execute them all
    no_exec_scripts: []
    # Inject test-mode env to prevent any live network calls during eval
    run_env:
      CODOMYRMEX_TEST_MODE: "1"
  "cli":
    # Save cli evals to a dedicated subdirectory
    output_dir: evaluations/cli
    # CLI scripts exit gracefully with no args — execute them all
    no_exec_scripts: []
    # Inject test-mode env to prevent interactive prompts or side-effects
    run_env:
      CODOMYRMEX_TEST_MODE: "1"

# ── Fallback & Resilience ─────────────────────────────────────────────
# Fallback model used when the primary provider returns an error (413, rate-limit, timeout).
# Set to null/empty to disable automatic fallback.
fallback_model: hermes3
fallback_provider: ollama

# ── Git Worktree Isolation ────────────────────────────────────────────
# When enabled via --worktree, agent sessions run in an isolated git worktree
# to prevent concurrent modifications to the working tree.
worktree:
  enabled: false
  base_dir: ~/.codomyrmex/worktrees
  auto_cleanup: true  # Remove worktree when session ends

# ── Filesystem Checkpoints ────────────────────────────────────────────
# Auto-snapshot before destructive operations (dispatch --apply).
checkpoint:
  enabled: true
  max_snapshots: 10
  snapshot_dir: ~/.codomyrmex/checkpoints

# ── MCP Bridge Configuration ─────────────────────────────────────────
# Configure Hermes v0.2.0 native MCP client to load Codomyrmex servers.
# These entries are written to ~/.hermes/mcp_servers.json on setup.
mcp_bridge:
  enabled: true
  servers:
    codomyrmex_tools:
      transport: stdio
      command: "uv"
      args: ["run", "python", "-m", "codomyrmex.model_context_protocol.server"]
      description: "Codomyrmex MCP tool server (474 tools)"

