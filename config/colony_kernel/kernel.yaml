# ColonyKernelConfig — primary kernel configuration
# db_path: null = in-memory (for testing); set to ~/.codomyrmex/colony.db in production
#
# Cross-references:
#   - Loaded by:   src/codomyrmex/colony_kernel/config_loader.py  (load_kernel_yaml / default_budget_from_yaml / default_gate_config_from_yaml)
#   - Documented:  config/colony_kernel/README.md §kernel.yaml
#   - Agent guide: config/colony_kernel/AGENTS.md
#   - Source spec: src/codomyrmex/colony_kernel/SPEC.md §Gate Scoring Model
#   - PAI usage:   src/codomyrmex/colony_kernel/PAI.md §EXECUTE → Actuation Gate
#   - Manuscript:  docs/manuscript/config.yaml §experiment (gate thresholds mirror values here)
db_path: null
repo_root: "."

budget:
  max_llm_calls: 500
  max_runtime_seconds: 3600.0
  max_risk_level: 0.8
  max_human_attention_minutes: 120.0
  max_merge_risk: 0.7
  max_doc_debt: 1000.0
  max_security_exposure: 0.5
  period_seconds: 86400.0

pheromone:
  evaporation_per_tick: 0.1
  reinforce_on_read_delta: 0.15
  min_strength: 0.0
  max_strength: 10.0

gate:
  execute_threshold: 0.75
  hold_threshold: 0.50

  # NOTE: The following values are DOCUMENTATION mirrors of code-defined
  # constants in actuation_gate.py and role_adapter.py, NOT runtime
  # configuration. The actual constants are read from Python source:
  #   _TRUST_HARD_FLOOR = 0.30     (actuation_gate.py)
  #   trust_ok tiering at 0.60     (actuation_gate.py evaluate method)
  #   _ROLE_REPAIR_MIN_TRUST = 0.20 through _ROLE_GUARD_MIN_TRUST = 0.70
  #                               (role_adapter.py)
  # See docs/manuscript/05_experimental_setup.md §5.5 and manuscript §2.4
  # for the full role ladder and gate-scoring derivation.
  trust_hard_refuse: 0.3
  trust_hold_threshold: 0.6
  high_risk_pheromone: 6.0
  medium_risk_pheromone: 3.0
