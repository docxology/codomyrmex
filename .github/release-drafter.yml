name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'
categories:
  - title: '🚀 Features'
    labels:
      - 'feature'
      - 'enhancement'
  - title: '🤖 Agent Swarm'
    labels:
      - 'jules'
      - 'gemini'
      - 'agent-pr'
  - title: '🐛 Bug Fixes'
    labels:
      - 'fix'
      - 'bug'
  - title: '🧰 Maintenance & Code Health'
    labels:
      - 'code-health'
      - 'refactor'
      - 'chore'
      - 'testing'
      - 'tests'
  - title: '📦 Dependency Updates'
    labels:
      - 'dependencies'
  - title: '📚 Documentation'
    labels:
      - 'documentation'
      - 'docs'
change-template: '- $TITLE @$AUTHOR (#$NUMBER)'
template: |
  ## Change Log

  $CHANGES
