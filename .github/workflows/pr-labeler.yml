name: PR Auto-Labeler

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    name: Auto-label PR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changes and apply labels
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          echo "🏷️ Auto-labeling PR #$PR_NUMBER..."
          labels=()

          # --- Source detection from changed files ---
          changed=$(gh pr diff "$PR_NUMBER" --name-only 2>/dev/null || echo "")

          # CI / Workflows
          if echo "$changed" | grep -qE '\.github/'; then
            labels+=("ci")
          fi

          # Documentation
          if echo "$changed" | grep -qiE '\.(md|rst)$|docs/|documentation/'; then
            labels+=("documentation")
          fi

          # Tests
          if echo "$changed" | grep -qE 'test_|_test\.py|testing/|tests/'; then
            labels+=("tests")
          fi

          # Dependencies
          if echo "$changed" | grep -qE 'pyproject\.toml|uv\.lock|requirements'; then
            labels+=("dependencies")
          fi

          # Source code
          if echo "$changed" | grep -qE 'src/codomyrmex/.*\.py$'; then
            labels+=("source")
          fi

          # --- Agent detection from branch name ---
          # Jules branches
          if echo "$PR_BRANCH" | grep -qE '^(fix|feat|improve|refactor|add|cleanup|code-health|defense|bolt|feature|ai-gateway|simulation|bio-simulation|calendar)-'; then
            labels+=("jules" "agent-pr" "auto-merge")
          fi

          # Dependabot
          if [[ "$PR_AUTHOR" == "dependabot"* ]]; then
            labels+=("dependencies" "automated" "auto-merge")
          fi

          # --- Size detection ---
          additions=$(gh pr view "$PR_NUMBER" --json additions -q '.additions' 2>/dev/null || echo "0")
          deletions=$(gh pr view "$PR_NUMBER" --json deletions -q '.deletions' 2>/dev/null || echo "0")
          total=$((additions + deletions))

          if [ "$total" -lt 50 ]; then
            labels+=("size/xs")
          elif [ "$total" -lt 200 ]; then
            labels+=("size/s")
          elif [ "$total" -lt 500 ]; then
            labels+=("size/m")
          elif [ "$total" -lt 1000 ]; then
            labels+=("size/l")
          else
            labels+=("size/xl")
          fi

          # --- Module detection ---
          modules=$(echo "$changed" | grep -oP 'src/codomyrmex/\K[^/]+' | sort -u | head -5)
          for mod in $modules; do
            if [ "$mod" != "__pycache__" ] && [ "$mod" != "output" ]; then
              labels+=("module:$mod")
            fi
          done

          # --- Apply labels ---
          if [ ${#labels[@]} -gt 0 ]; then
            unique_labels=($(printf '%s\n' "${labels[@]}" | sort -u))
            label_args=""
            for lbl in "${unique_labels[@]}"; do
              label_args="$label_args --add-label \"$lbl\""
            done
            eval "gh pr edit $PR_NUMBER $label_args" 2>/dev/null || true
            echo "✅ Applied labels: ${unique_labels[*]}"
          else
            echo "ℹ️ No labels to apply"
          fi
