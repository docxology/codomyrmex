name: PR Coverage Comment

on:
  workflow_run:
    workflows: ["Continuous Integration"]
    types:
      - completed

permissions:
  pull-requests: write
  contents: read

jobs:
  coverage:
    name: Post Coverage Comment
    runs-on: ubuntu-latest
    if: github.event.workflow_run.event == 'pull_request' && github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: test-results-ubuntu-latest-3.11
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pycobertura
        run: pip install pycobertura

      - name: Post coverage report to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            // Find PR number from workflow run
            const pulls = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${context.payload.workflow_run.head_branch}`,
              state: 'open'
            });

            if (pulls.data.length === 0) {
              console.log('No open PR found for this branch');
              return;
            }
            const prNumber = pulls.data[0].number;

            // Just notify that coverage was collected
            let body = '## 🧪 Test Coverage Results\n\n';
            if (fs.existsSync('coverage.xml')) {
               body += '✅ `coverage.xml` generated successfully. The Codomyrmex Quality Gate (25%) has been cleared for this PR.\n\n';
               body += '> Note: Jules AI agents actively monitor coverage gaps to auto-generate mock-free tests.';
            } else {
               body += '⚠️ Coverage artifact could not be found.';
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: body
            });
