name: First PR Merged

on:
  pull_request_target:
    types: [closed]

jobs:
  welcome:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const creator = context.payload.pull_request.user.login;

            // Check if this is the user's first merged PR
            const pulls = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'closed',
              sort: 'updated',
              direction: 'desc',
              per_page: 100
            });

            const mergedPRs = pulls.data.filter(pr =>
              pr.user.login === creator &&
              pr.merged_at !== null &&
              pr.number !== context.payload.pull_request.number
            );

            // Exclude dependabot and common bots
            const isBot = creator.includes('bot') || creator === 'github-actions[bot]';

            if (mergedPRs.length === 0 && !isBot) {
              const body = `🎉 **Congratulations on merging your fast Pull Request!** 🎉\n\n` +
                           `Your contribution has been successfully integrated into Codomyrmex. We deeply appreciate your efforts to improve the project!\n\n` +
                           `Looking for what to do next?\n` +
                           `- Check out our [open issues](https://github.com/docxology/codomyrmex/issues) for more ways to contribute.\n` +
                           `- Read about our [Multi-Agent Swarms](https://github.com/docxology/codomyrmex/blob/main/docs/agents/README.md) to see how Jules will use your code.\n\n` +
                           `Awesome job! 🚀`;

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: body
              });
            }
