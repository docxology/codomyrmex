name: PR Title Check

on:
  pull_request_target:
    types: [opened, edited, synchronize]

permissions:
  pull-requests: read
  statuses: write

jobs:
  main:
    name: Validate Semantic PR Title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Configure types
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
            ⚡ Bolt

          # Enforce proper casing
          requireScope: false
          subjectPattern: ^.*$
          subjectPatternError: |
            The subject \"{subject}\" found in the pull request title \"{title}\"
            didn't match the configured pattern.
            
          # If the PR contains multiple commits, check the title 
          # otherwise check the single commit message
          validateSingleCommit: true
