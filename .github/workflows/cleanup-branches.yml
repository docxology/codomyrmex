name: Branch Cleanup

on:
  schedule:
    # Run weekly on Sundays at 6 AM UTC
    - cron: '0 6 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    name: Delete merged and stale branches
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Delete merged branches
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🧹 Cleaning merged branches..."

          # Get all remote branches except main, develop, HEAD
          git branch -r --merged origin/main | \
            grep -v -E '(main|develop|HEAD)' | \
            sed 's/origin\///' | \
            while read branch; do
              echo "  Deleting merged branch: $branch"
              git push origin --delete "$branch" 2>/dev/null || true
            done

          echo "✅ Merged branch cleanup complete"

      - name: Delete stale branches (no PR, older than 14 days)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🧹 Cleaning stale branches (>14 days, no open PR)..."

          cutoff=$(date -d '14 days ago' +%s 2>/dev/null || date -v-14d +%s)

          git for-each-ref --sort=committerdate --format='%(refname:short) %(committerdate:unix)' refs/remotes/origin/ | \
            grep -v -E '(main|develop|HEAD)' | \
            while read ref timestamp; do
              branch=${ref#origin/}
              if [ "$timestamp" -lt "$cutoff" ] 2>/dev/null; then
                # Check if there's an open PR for this branch
                pr_count=$(gh pr list --head "$branch" --state open --json number --jq 'length' 2>/dev/null || echo "0")
                if [ "$pr_count" = "0" ]; then
                  echo "  Deleting stale branch: $branch (last commit: $(date -d @$timestamp '+%Y-%m-%d' 2>/dev/null || date -r $timestamp '+%Y-%m-%d'))"
                  git push origin --delete "$branch" 2>/dev/null || true
                fi
              fi
            done

          echo "✅ Stale branch cleanup complete"

      - name: Summary
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          remaining=$(git branch -r | grep -v HEAD | wc -l | tr -d ' ')
          echo "# 🧹 Branch Cleanup Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Remaining branches**: $remaining" >> $GITHUB_STEP_SUMMARY
