name: Agent Metrics Dashboard

on:
  schedule:
    - cron: '0 0 * * 1'  # Weekly on Mondays
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  issues: read

jobs:
  metrics:
    name: Collect Agent Metrics
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Collect comprehensive agent metrics
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "# 🤖 Agent Metrics Dashboard" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> Generated: $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # --- PR metrics ---
          echo "## Pull Requests" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          total_open=$(gh pr list --state open --limit 500 --json number -q 'length')
          total_merged=$(gh pr list --state merged --limit 500 --json number -q 'length')
          total_closed=$(gh pr list --state closed --limit 500 --json number -q 'length')

          # Jules PRs (estimate by branch pattern)
          jules_open=$(gh pr list --state open --limit 500 --json headRefName -q '[.[] | select(.headRefName | test("^(fix|feat|improve|refactor|add|cleanup|code-health|defense|bolt|feature)-"))] | length')
          jules_merged=$(gh pr list --state merged --limit 500 --json headRefName -q '[.[] | select(.headRefName | test("^(fix|feat|improve|refactor|add|cleanup|code-health|defense|bolt|feature)-"))] | length')

          # Dependabot PRs
          depbot_open=$(gh pr list --state open --label dependencies --limit 200 --json number -q 'length')

          echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|:--|:--:|" >> $GITHUB_STEP_SUMMARY
          echo "| Open PRs (total) | $total_open |" >> $GITHUB_STEP_SUMMARY
          echo "| Merged PRs (recent) | $total_merged |" >> $GITHUB_STEP_SUMMARY
          echo "| Closed PRs (recent) | $total_closed |" >> $GITHUB_STEP_SUMMARY
          echo "| Jules PRs (open) | $jules_open |" >> $GITHUB_STEP_SUMMARY
          echo "| Jules PRs (merged) | $jules_merged |" >> $GITHUB_STEP_SUMMARY
          echo "| Dependabot PRs (open) | $depbot_open |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # --- Issue metrics ---
          echo "## Issues" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          issues_open=$(gh issue list --state open --limit 500 --json number -q 'length')
          issues_closed=$(gh issue list --state closed --limit 500 --json number -q 'length')
          jules_issues=$(gh issue list --state open --label jules --limit 200 --json number -q 'length' 2>/dev/null || echo "0")

          echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|:--|:--:|" >> $GITHUB_STEP_SUMMARY
          echo "| Open Issues | $issues_open |" >> $GITHUB_STEP_SUMMARY
          echo "| Closed Issues | $issues_closed |" >> $GITHUB_STEP_SUMMARY
          echo "| Jules Task Issues | $jules_issues |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # --- Workflow metrics ---
          echo "## Workflow Health (Last 7 Days)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          for wf in ci.yml security.yml auto-merge.yml pr-labeler.yml maintenance.yml; do
            name=$(echo "$wf" | sed 's/.yml//')
            success=$(gh run list --workflow="$wf" --limit 20 --json conclusion -q '[.[] | select(.conclusion=="success")] | length' 2>/dev/null || echo "?")
            failure=$(gh run list --workflow="$wf" --limit 20 --json conclusion -q '[.[] | select(.conclusion=="failure")] | length' 2>/dev/null || echo "?")
            echo "- **$name**: ✅ $success / ❌ $failure (last 20 runs)" >> $GITHUB_STEP_SUMMARY
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "*Auto-generated by Agent Metrics Dashboard*" >> $GITHUB_STEP_SUMMARY
