name: Jules Batch Dispatch

on:
  workflow_dispatch:
    inputs:
      modules:
        description: 'Comma-separated list of modules (or "all")'
        required: true
        default: 'all'
        type: string
      task_template:
        description: 'Task type to dispatch'
        required: true
        type: choice
        options:
          - 'docstrings-mcp-tests'
          - 'zero-mock-tests'
          - 'ruff-autofix'
          - 'documentation'
          - 'custom'
      custom_prompt:
        description: 'Custom prompt (only if task_template is "custom")'
        required: false
        type: string

permissions:
  issues: write
  contents: read

jobs:
  dispatch:
    name: Dispatch Jules Tasks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Discover modules
        id: modules
        run: |
          if [ "${{ inputs.modules }}" = "all" ]; then
            modules=$(find src/codomyrmex -maxdepth 1 -type d -not -name '__pycache__' -not -name 'output' -not -name 'template' -not -name 'codomyrmex' | xargs -I{} basename {} | sort | paste -sd, -)
          else
            modules="${{ inputs.modules }}"
          fi
          echo "list=$modules" >> $GITHUB_OUTPUT
          echo "🎯 Target modules: $modules"

      - name: Generate task prompts
        id: prompts
        run: |
          template="${{ inputs.task_template }}"
          custom="${{ inputs.custom_prompt }}"

          case "$template" in
            "docstrings-mcp-tests")
              prompt_tpl="For the {MODULE} module in the codomyrmex repository:
          1. Add comprehensive Google-style docstrings to all public functions and classes
          2. Create or update MCP tool specifications in mcp_tools.py
          3. Write zero-mock unit tests achieving >80% coverage
          4. Update README.md and CHANGELOG.md
          Follow existing patterns from similar modules. Use real functional methods only (no mocks)."
              ;;
            "zero-mock-tests")
              prompt_tpl="For the {MODULE} module: Create comprehensive zero-mock unit tests. Test all public functions with real inputs/outputs. Achieve >80% coverage. Follow the project zero-mock testing policy."
              ;;
            "ruff-autofix")
              prompt_tpl="Fix all Ruff linting errors in src/codomyrmex/{MODULE}/. Run 'ruff check --fix' and 'ruff format' on all Python files. Ensure no regressions in existing tests."
              ;;
            "documentation")
              prompt_tpl="Update documentation for the {MODULE} module: improve README.md, add USAGE_EXAMPLES.md, update API_SPECIFICATION.md, and ensure CHANGELOG.md is current."
              ;;
            "custom")
              prompt_tpl="$custom"
              ;;
          esac

          echo "template=$prompt_tpl" >> $GITHUB_OUTPUT

      - name: Create issues for each module
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          IFS=',' read -ra MODULES <<< "${{ steps.modules.outputs.list }}"
          template="${{ steps.prompts.outputs.template }}"
          created=0

          for mod in "${MODULES[@]}"; do
            mod=$(echo "$mod" | xargs)  # trim whitespace
            prompt=$(echo "$template" | sed "s/{MODULE}/$mod/g")
            title="[Jules] ${{ inputs.task_template }}: $mod"

            echo "📤 Creating issue for $mod..."
            gh issue create \
              --title "$title" \
              --body "$prompt" \
              --label "jules,agent-task,automated" \
              2>/dev/null && created=$((created + 1)) || echo "  ⚠️ Failed for $mod"
          done

          echo ""
          echo "🏁 Created $created issues for ${#MODULES[@]} modules"
          echo "## Jules Batch Dispatch Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Template**: ${{ inputs.task_template }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Modules**: ${#MODULES[@]}" >> $GITHUB_STEP_SUMMARY
          echo "- **Issues created**: $created" >> $GITHUB_STEP_SUMMARY
