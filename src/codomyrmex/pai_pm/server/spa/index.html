<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PAI Project Manager</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0a0a0a;
      --panel: #141414;
      --border: #2a2a2a;
      --border-hover: #3a3a3a;
      --text: #e5e5e5;
      --text-dim: #9ca3af;
      --text-muted: #6b7280;
      --primary: #dc2626;
      --primary-hover: #b91c1c;
      --primary-dim: #dc262633;
      --success: #22c55e;
      --warning: #f59e0b;
      --error: #ef4444;
      --cyan: #06b6d4;
      --purple: #a855f7;
      --radius: 8px;
      --radius-lg: 12px;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    button {
      font-family: inherit;
      cursor: pointer;
      border: none;
    }

    input,
    select,
    textarea {
      font-family: inherit;
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 12px;
      outline: none;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 2px var(--primary-dim);
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
    }

    .header h1 {
      font-size: 20px;
      color: var(--primary);
      flex: 1;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--success);
      animation: pulse 2s infinite;
    }

    .status-dot.disconnected {
      background: var(--error);
      animation: none;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.5;
      }
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 2px;
      padding: 0 24px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
    }

    .tab {
      padding: 12px 20px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-dim);
      background: none;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }

    .tab:hover {
      color: var(--text);
    }

    .tab.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }

    /* Stats Bar */
    .stats {
      display: flex;
      gap: 12px;
      padding: 16px 24px;
      flex-wrap: wrap;
    }

    .stat {
      background: var(--panel);
      padding: 12px 16px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      min-width: 120px;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: var(--primary);
    }

    .stat-label {
      font-size: 11px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Content area */
    .content {
      padding: 24px;
      overflow-y: auto;
      height: calc(100vh - 155px);
    }

    /* Action bar */
    .action-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      align-items: center;
    }

    .btn {
      padding: 8px 16px;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:hover {
      background: var(--primary-hover);
    }

    .btn-danger {
      background: var(--error);
      color: white;
    }

    .btn-danger:hover {
      background: #dc2626;
    }

    .btn-ghost {
      background: transparent;
      color: var(--text-dim);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover {
      background: var(--panel);
      color: var(--text);
    }

    .btn-sm {
      padding: 4px 10px;
      font-size: 12px;
    }

    .btn-xs {
      padding: 2px 8px;
      font-size: 11px;
    }

    /* Badges */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
    }

    .badge-active,
    .badge-ACTIVE {
      background: #1d4ed833;
      color: var(--primary);
    }

    .badge-in_progress,
    .badge-IN_PROGRESS {
      background: #06b6d433;
      color: var(--cyan);
    }

    .badge-completed,
    .badge-COMPLETED {
      background: #16a34a33;
      color: var(--success);
    }

    .badge-blocked,
    .badge-BLOCKED {
      background: #ef444433;
      color: var(--error);
    }

    .badge-paused,
    .badge-PAUSED {
      background: #64748b33;
      color: var(--text-dim);
    }

    .badge-planning,
    .badge-PLANNING {
      background: #a855f733;
      color: var(--purple);
    }

    .badge-archived,
    .badge-ARCHIVED {
      background: #64748b22;
      color: var(--text-muted);
    }

    .badge-high,
    .badge-HIGH {
      background: #ef444433;
      color: var(--error);
    }

    .badge-medium,
    .badge-MEDIUM {
      background: #f59e0b33;
      color: var(--warning);
    }

    .badge-low,
    .badge-LOW {
      background: #64748b33;
      color: var(--text-dim);
    }

    .badge-backlog {
      background: #64748b33;
      color: var(--text-dim);
    }

    .badge-up_next {
      background: #f59e0b33;
      color: var(--warning);
    }

    /* Table */
    .table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 24px;
    }

    .table th {
      text-align: left;
      padding: 10px 12px;
      font-size: 11px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      user-select: none;
    }

    .table th:hover {
      color: var(--text);
    }

    .table td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      vertical-align: middle;
    }

    .table tr:hover td {
      background: #ffffff06;
    }

    .table-section {
      margin-bottom: 32px;
    }

    .table-section h3 {
      font-size: 15px;
      margin-bottom: 12px;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .table-section h3 .count {
      font-size: 12px;
      color: var(--text-dim);
      font-weight: normal;
    }

    /* Data Grid - Coda-like spreadsheet */
    .data-grid {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 16px;
    }

    .data-grid th {
      text-align: left;
      padding: 8px 12px;
      font-size: 11px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border: 1px solid var(--border);
      background: var(--panel);
      cursor: pointer;
      user-select: none;
      position: sticky;
      top: 0;
      z-index: 2;
    }

    .data-grid th:hover {
      color: var(--text);
      background: #253348;
    }

    .data-grid td {
      padding: 6px 12px;
      border: 1px solid var(--border);
      font-size: 13px;
      vertical-align: middle;
      cursor: pointer;
      transition: background 0.15s;
    }

    .data-grid tr:nth-child(even) td {
      background: #ffffff03;
    }

    .data-grid tr:hover td {
      background: #ffffff08;
    }

    .data-grid .data-cell.editing {
      padding: 2px;
    }

    .data-cell.editing input,
    .data-cell.editing select {
      width: 100%;
      border-color: var(--primary);
      box-shadow: 0 0 0 2px var(--primary-dim);
      padding: 4px 8px;
      font-size: 13px;
    }

    .data-sub-tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 16px;
    }

    .data-sub-tab {
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-dim);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.2s;
    }

    .data-sub-tab:hover {
      color: var(--text);
      border-color: var(--border-hover);
    }

    .data-sub-tab.active {
      color: var(--primary);
      border-color: var(--primary);
      background: var(--primary-dim);
    }

    .search-bar {
      width: 300px;
      margin-right: auto;
    }

    /* Progress bar */
    .progress {
      width: 80px;
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
      display: inline-block;
      vertical-align: middle;
    }

    .progress-fill {
      height: 100%;
      background: var(--primary);
      border-radius: 3px;
      transition: width 0.3s;
    }

    .progress-fill.high {
      background: var(--success);
    }

    /* Kanban */
    .kanban {
      display: flex;
      gap: 16px;
      overflow-x: auto;
      padding-bottom: 16px;
      min-height: 400px;
    }

    .kanban-col {
      min-width: 280px;
      max-width: 320px;
      flex-shrink: 0;
      background: var(--panel);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }

    .kanban-col-header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .kanban-col-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .kanban-col-count {
      background: var(--border);
      color: var(--text);
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
    }

    .kanban-col-add {
      background: none;
      color: var(--text-muted);
      font-size: 18px;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      transition: all 0.2s;
    }

    .kanban-col-add:hover {
      background: var(--border);
      color: var(--text);
    }

    .kanban-cards {
      flex: 1;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow-y: auto;
      min-height: 60px;
    }

    .kanban-cards.drag-over {
      background: var(--primary-dim);
      border-radius: var(--radius);
    }

    .kanban-empty {
      text-align: center;
      padding: 20px 12px;
      color: var(--text-muted);
      font-size: 12px;
    }

    .card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      cursor: grab;
      transition: all 0.2s;
    }

    .card:hover {
      border-color: var(--primary);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px #0004;
    }

    .card.dragging {
      opacity: 0.5;
    }

    .card-title {
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 8px;
    }

    .card-meta {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
    }

    .card-type {
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .card.mission-card {
      border-left: 3px solid var(--primary);
    }

    .card.project-card {
      border-left: 3px solid var(--cyan);
    }

    /* Board Collapsible Sections */
    .board-section {
      margin-bottom: 24px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }

    .board-section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      user-select: none;
      transition: background 0.2s;
    }

    .board-section-header:hover {
      background: #111;
    }

    .board-section-header h3 {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      margin: 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .board-section-toggle {
      font-size: 16px;
      color: var(--text-dim);
      transition: transform 0.2s;
    }

    .board-section-toggle.collapsed {
      transform: rotate(-90deg);
    }

    .board-section-content {
      padding: 16px;
      display: block;
    }

    .board-section-content.collapsed {
      display: none;
    }

    .board-type-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .board-type-badge.mission {
      background: #dc262620;
      color: var(--primary);
      border: 1px solid #dc262660;
    }

    .board-type-badge.project {
      background: #06b6d420;
      color: var(--cyan);
      border: 1px solid #06b6d460;
    }

    /* Projects Tab */
    .project-selector-bar {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
      padding: 16px 20px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
    }

    .project-selector-bar label {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-dim);
      white-space: nowrap;
    }

    .project-selector-bar select {
      flex: 1;
      max-width: 400px;
      font-size: 14px;
      padding: 10px 14px;
    }

    .project-info-header {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px 24px;
      margin-bottom: 20px;
    }

    .project-info-header h2 {
      font-size: 18px;
      margin-bottom: 6px;
      color: var(--text);
    }

    .project-info-meta {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      align-items: center;
      font-size: 13px;
      color: var(--text-dim);
      margin-top: 12px;
    }

    .project-info-meta>div {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .task-kanban {
      display: flex;
      gap: 16px;
      overflow-x: auto;
      padding-bottom: 16px;
      min-height: 400px;
    }

    .task-kanban-col {
      min-width: 240px;
      max-width: 300px;
      flex-shrink: 0;
      background: var(--panel);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }

    .task-kanban-col-header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .task-kanban-col-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .task-kanban-col-count {
      background: var(--border);
      color: var(--text);
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
    }

    .task-kanban-cards {
      flex: 1;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow-y: auto;
      min-height: 60px;
    }

    .task-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      transition: all 0.2s;
    }

    .task-card:hover {
      border-color: var(--primary);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px #0004;
    }

    .task-card-title {
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 8px;
      color: var(--text);
      line-height: 1.4;
    }

    .task-card-meta {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
      font-size: 11px;
    }

    .task-card-due {
      color: var(--text-dim);
    }

    .task-card-due.overdue {
      color: var(--error);
      font-weight: 600;
    }

    .task-card-assignee {
      color: var(--cyan);
      font-style: italic;
    }

    .project-empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .project-empty-state h3 {
      font-size: 16px;
      margin-bottom: 8px;
      color: var(--text-dim);
    }

    .project-empty-state p {
      font-size: 13px;
    }

    /* Dispatch Dropdowns */
    .dispatch-dropdown {
      position: relative;
      display: inline-block;
    }

    .dispatch-menu {
      display: none;
      position: absolute;
      top: 100%;
      right: 0;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 4px;
      z-index: 20;
      min-width: 150px;
      box-shadow: 0 8px 24px #0006;
    }

    .dispatch-menu.open {
      display: block;
    }

    .dispatch-menu button {
      display: block;
      width: 100%;
      text-align: left;
      padding: 6px 10px;
      font-size: 12px;
      background: none;
      color: var(--text-dim);
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    .dispatch-menu button:hover {
      background: var(--primary-dim);
      color: var(--primary);
    }

    /* Network Graph */
    .network-container {
      position: relative;
      width: 100%;
      height: calc(100vh - 220px);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }

    .network-container canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .network-controls {
      position: absolute;
      top: 12px;
      left: 12px;
      display: flex;
      gap: 6px;
      z-index: 5;
    }

    .network-controls button {
      padding: 6px 12px;
      font-size: 12px;
      background: var(--panel);
      color: var(--text-dim);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.2s;
    }

    .network-controls button:hover {
      background: var(--border);
      color: var(--text);
    }

    .network-controls button.active {
      background: var(--primary-dim);
      color: var(--primary);
      border-color: var(--primary);
    }

    .network-legend {
      position: absolute;
      bottom: 12px;
      left: 12px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      z-index: 5;
    }

    .network-legend-title {
      font-size: 11px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .network-legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--text-dim);
      margin-bottom: 3px;
    }

    .network-legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .network-tooltip {
      position: absolute;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      z-index: 10;
      pointer-events: none;
      display: none;
      min-width: 180px;
    }

    .network-tooltip h4 {
      font-size: 13px;
      margin-bottom: 4px;
    }

    .network-tooltip p {
      font-size: 12px;
      color: var(--text-dim);
      margin: 2px 0;
      max-width: 250px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Timeline / Gantt */
    .timeline-container {
      width: 100%;
      overflow-x: auto;
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      background: var(--panel);
    }

    .timeline-wrapper {
      display: flex;
      min-width: 100%;
    }

    .timeline-labels {
      min-width: 220px;
      max-width: 220px;
      flex-shrink: 0;
      border-right: 1px solid var(--border);
    }

    .timeline-labels-header {
      height: 40px;
      border-bottom: 1px solid var(--border);
      padding: 10px 12px;
      font-size: 11px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .timeline-label-row {
      height: 48px;
      padding: 0 12px;
      display: flex;
      align-items: center;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .timeline-chart {
      flex: 1;
      overflow-x: auto;
      position: relative;
    }

    .timeline-header {
      display: flex;
      height: 40px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 2;
      background: var(--panel);
    }

    .timeline-header-cell {
      min-width: 80px;
      padding: 10px 8px;
      font-size: 10px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-right: 1px solid var(--border);
      text-align: center;
      flex-shrink: 0;
    }

    .timeline-row {
      height: 48px;
      display: flex;
      align-items: center;
      border-bottom: 1px solid var(--border);
      position: relative;
    }

    .timeline-bar {
      position: absolute;
      height: 24px;
      border-radius: 4px;
      top: 12px;
      min-width: 20px;
      font-size: 10px;
      color: white;
      display: flex;
      align-items: center;
      padding: 0 6px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .timeline-bar:hover {
      opacity: 0.85;
    }

    .timeline-bar.completed {
      background: var(--success);
    }

    .timeline-bar.in_progress {
      background: var(--cyan);
    }

    .timeline-bar.blocked {
      background: var(--error);
    }

    .timeline-bar.backlog,
    .timeline-bar.up_next {
      background: var(--text-muted);
    }

    .timeline-bar.planning {
      background: var(--purple);
    }

    .timeline-bar.active {
      background: var(--primary);
    }

    .timeline-bar.paused {
      background: var(--text-muted);
    }

    .timeline-today {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 2px;
      background: var(--error);
      z-index: 3;
      pointer-events: none;
    }

    .timeline-today::before {
      content: 'Today';
      position: absolute;
      top: -18px;
      left: -16px;
      font-size: 9px;
      color: var(--error);
      text-transform: uppercase;
    }

    .timeline-diamond {
      position: absolute;
      width: 10px;
      height: 10px;
      background: var(--warning);
      transform: rotate(45deg);
      top: 19px;
      z-index: 2;
      cursor: pointer;
    }

    .timeline-empty {
      padding: 40px;
      text-align: center;
      color: var(--text-muted);
      font-size: 14px;
    }

    /* Analytics */
    .analytics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .chart-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px;
      position: relative;
    }

    .chart-card h3 {
      font-size: 14px;
      margin-bottom: 16px;
      color: var(--text);
    }

    .chart-card canvas {
      width: 100%;
    }

    .chart-tooltip {
      position: fixed;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 6px 10px;
      font-size: 12px;
      color: var(--text);
      pointer-events: none;
      z-index: 1000;
      display: none;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
    }

    .metric-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 16px;
      margin-bottom: 8px;
    }

    .metric-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px;
      text-align: center;
    }

    .metric-card .metric-value {
      font-size: 36px;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 4px;
    }

    .metric-card .metric-label {
      font-size: 12px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .metric-card.success .metric-value {
      color: var(--success);
    }

    .metric-card.warning .metric-value {
      color: var(--warning);
    }

    .metric-card.error .metric-value {
      color: var(--error);
    }

    .metric-card.cyan .metric-value {
      color: var(--cyan);
    }

    .metric-card.purple .metric-value {
      color: var(--purple);
    }

    /* Integration View */
    .integration-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
    }

    .integration-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 24px;
    }

    .integration-card h3 {
      font-size: 16px;
      margin-bottom: 12px;
    }

    .integration-card p {
      font-size: 13px;
      color: var(--text-dim);
      margin-bottom: 16px;
    }

    /* Interview View */
    .interview-panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px;
      min-height: 300px;
    }

    .interview-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }

    .interview-history-item {
      padding: 12px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .interview-history-item:hover {
      border-color: var(--primary);
      background: rgba(59, 130, 246, 0.05);
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: #000a;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 24px;
      width: 500px;
      max-width: 90vw;
      max-height: 80vh;
      overflow-y: auto;
    }

    .modal h2 {
      font-size: 18px;
      margin-bottom: 16px;
    }

    .modal-field {
      margin-bottom: 14px;
    }

    .modal-field label {
      display: block;
      font-size: 12px;
      color: var(--text-dim);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .modal-field input,
    .modal-field select,
    .modal-field textarea {
      width: 100%;
    }

    .modal-field textarea {
      min-height: 80px;
      resize: vertical;
    }

    .modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 20px;
    }

    /* Toast */
    .toast-container {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 200;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .toast {
      padding: 12px 20px;
      border-radius: var(--radius);
      font-size: 13px;
      animation: slideIn 0.3s ease;
      min-width: 250px;
    }

    .toast-success {
      background: #16a34a;
      color: white;
    }

    .toast-error {
      background: var(--error);
      color: white;
    }

    .toast-info {
      background: var(--primary);
      color: white;
    }

    @keyframes slideIn {
      from {
        transform: translateX(100%);
        opacity: 0;
      }

      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--border-hover);
    }

    /* Git Tab */
    .git-summary-bar {
      display: flex;
      gap: 16px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .git-summary-stat {
      background: var(--panel);
      padding: 12px 20px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }

    .git-summary-stat .val {
      font-size: 20px;
      font-weight: 700;
      color: var(--cyan);
    }

    .git-summary-stat .lbl {
      font-size: 11px;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    /* Dispatch Tab */
    .dispatch-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px;
      margin-bottom: 12px;
    }

    .dispatch-card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .dispatch-card-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }

    .dispatch-card-meta {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
      font-size: 12px;
      color: var(--text-dim);
      margin-bottom: 10px;
    }

    .dispatch-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .dispatch-actions .btn {
      font-size: 11px;
      padding: 4px 10px;
    }

    .dispatch-context {
      margin-top: 10px;
      padding: 10px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 12px;
    }

    .dispatch-context.collapsed {
      display: none;
    }

    .dispatch-context h5 {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-dim);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .dispatch-context-history {
      max-height: 120px;
      overflow-y: auto;
    }

    .dispatch-context-history-item {
      padding: 4px 0;
      border-bottom: 1px solid var(--border);
      color: var(--text-dim);
    }

    .dispatch-context-toggle {
      font-size: 11px;
      color: var(--text-muted);
      cursor: pointer;
      margin-top: 8px;
    }

    /* Dispatch Queue */
    .queue-empty {
      color: var(--text-muted);
      font-size: 13px;
      padding: 12px 0;
      text-align: center;
    }

    .queue-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 6px;
    }

    .queue-item-info {
      flex: 1;
      font-size: 13px;
      color: var(--text);
    }

    .queue-item-backend {
      font-size: 11px;
      color: var(--text-muted);
      background: var(--bg);
      padding: 2px 8px;
      border-radius: 4px;
    }

    /* Dispatch Mode Selector */
    .dispatch-mode-bar {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 20px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      margin-bottom: 20px;
    }

    .dispatch-mode-bar label {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-dim);
    }

    .dispatch-mode-bar select {
      font-size: 14px;
      padding: 8px 12px;
      min-width: 200px;
    }

    .dispatch-mode-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--text-dim);
      margin-left: auto;
    }

    .dispatch-mode-indicator .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .dispatch-mode-indicator .dot.copy {
      background: var(--text-muted);
    }

    .dispatch-mode-indicator .dot.claude {
      background: var(--primary);
    }

    .dispatch-mode-indicator .dot.ollama {
      background: var(--success);
    }

    .dispatch-mode-indicator .dot.gemini {
      background: #4285f4;
    }

    /* Dispatch Queue UI */
    .dispatch-queue {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px;
      margin-bottom: 20px;
    }

    .dispatch-queue h4 {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 12px;
      color: var(--text-dim);
    }

    .dispatch-queue-list {
      min-height: 40px;
    }

    .queue-empty {
      font-size: 12px;
      color: var(--text-muted);
      text-align: center;
      padding: 12px;
    }

    .queue-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: var(--bg);
      border-radius: var(--radius);
      margin-bottom: 6px;
    }

    .queue-item-info {
      flex: 1;
      font-size: 12px;
    }

    .queue-item-backend {
      font-size: 11px;
      color: var(--text-dim);
      padding: 2px 6px;
      background: var(--border);
      border-radius: 4px;
    }

    .dispatch-queue-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    /* Auto-fill buttons */
    .auto-fill-group {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .btn-sm {
      font-size: 11px;
      padding: 4px 8px;
    }

    /* Dispatch history indicators */
    .dispatch-indicators {
      display: flex;
      gap: 4px;
      font-size: 10px;
    }

    .dispatch-indicator {
      padding: 2px 6px;
      background: var(--border);
      border-radius: 4px;
      color: var(--text-dim);
    }

    .dispatch-indicator.filled {
      background: var(--success);
      color: white;
      opacity: 0.8;
    }

    /* Dispatch Execution Modal */
    .dispatch-output-modal {
      width: 700px;
      max-width: 95vw;
      max-height: 85vh;
    }

    .dispatch-output-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .dispatch-output-header h2 {
      font-size: 16px;
    }

    .dispatch-output-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
    }

    .dispatch-output-status .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .dispatch-output-content {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      max-height: 50vh;
      overflow-y: auto;
      font-family: monospace;
      font-size: 13px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .dispatch-output-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 16px;
    }


    /* Email Compose Toolbar */
    .email-compose-toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px 16px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .email-compose-toolbar .toolbar-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-right: 4px;
      white-space: nowrap;
    }

    .email-compose-toolbar .toolbar-divider {
      width: 1px;
      height: 24px;
      background: var(--border);
      margin: 0 4px;
      flex-shrink: 0;
    }

    .btn-template {
      padding: 7px 14px;
      font-size: 12px;
      font-weight: 500;
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.25s;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .btn-template:hover {
      border-color: var(--primary);
      background: linear-gradient(135deg, #1e3a5f 0%, #172554 100%);
      color: white;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.2);
    }

    .btn-template:active {
      transform: translateY(0);
    }

    .btn-template.composing {
      opacity: 0.6;
      pointer-events: none;
    }

    .btn-template .template-icon {
      font-size: 14px;
    }

    .toolbar-select {
      padding: 6px 10px;
      font-size: 12px;
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      min-width: 100px;
    }

    .toolbar-select:focus {
      border-color: var(--primary);
      outline: none;
    }

    .llm-composing-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      background: linear-gradient(135deg, #1e293b 0%, #172554 100%);
      border: 1px solid var(--primary);
      border-radius: var(--radius-lg);
      margin-bottom: 12px;
      animation: composePulse 2s ease-in-out infinite;
    }

    .llm-composing-indicator .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      flex-shrink: 0;
    }

    @keyframes composePulse {

      0%,
      100% {
        border-color: var(--primary);
      }

      50% {
        border-color: var(--cyan);
      }
    }

    /* Bike Ride Tab */
    .bikeride-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-left: 3px solid #22c55e;
      border-radius: var(--radius-lg);
      padding: 20px;
      margin-bottom: 14px;
      transition: all 0.2s;
    }

    .bikeride-card:hover {
      border-color: #22c55e;
      box-shadow: 0 4px 16px #0004;
    }

    .bikeride-card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 10px;
      gap: 12px;
    }

    .bikeride-card-subject {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      flex: 1;
    }

    .bikeride-card-date {
      font-size: 11px;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .bikeride-card-from {
      font-size: 12px;
      color: var(--cyan);
      margin-bottom: 10px;
    }

    .bikeride-summary {
      font-size: 13px;
      color: var(--text-dim);
      line-height: 1.6;
      padding: 12px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 12px;
    }

    .bikeride-play-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 18px;
      background: linear-gradient(135deg, #16a34a 0%, #15803d 100%);
      color: white;
      border: none;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.25s;
    }

    .bikeride-play-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(22, 163, 74, 0.35);
      background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
    }

    .bikeride-play-btn:active {
      transform: translateY(0);
    }

    .bikeride-play-btn.loading {
      opacity: 0.6;
      pointer-events: none;
    }

    .bikeride-play-btn .play-icon {
      font-size: 16px;
    }

    .bikeride-empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .bikeride-empty h3 {
      font-size: 18px;
      margin-bottom: 8px;
      color: var(--text-dim);
    }

    .bikeride-empty p {
      font-size: 13px;
      max-width: 400px;
      margin: 0 auto;
    }

    .bikeride-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      padding: 16px 20px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
    }

    .bikeride-header h2 {
      font-size: 18px;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .bikeride-header .thread-count {
      font-size: 13px;
      color: var(--text-dim);
      font-weight: normal;
    }

    .bikeride-llm-select {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .bikeride-llm-select label {
      font-size: 12px;
      color: var(--text-dim);
    }

    .bikeride-drafts {
      margin-top: 14px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .bikeride-draft {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      position: relative;
      transition: all 0.2s;
    }

    .bikeride-draft:hover {
      border-color: var(--primary);
    }

    .bikeride-draft-label {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      font-weight: 700;
      font-size: 13px;
      margin-bottom: 8px;
    }

    .bikeride-draft-label.label-a {
      background: #1e40af33;
      color: #60a5fa;
    }

    .bikeride-draft-label.label-b {
      background: #92400e33;
      color: #fbbf24;
    }

    .bikeride-draft-label.label-c {
      background: #6b21a833;
      color: #c084fc;
    }

    .bikeride-draft-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-dim);
      margin-bottom: 8px;
    }

    .bikeride-draft-text {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.5;

    .bikeride-draft-textarea {
      width: 100%;

      padding: 10px;
      font-size: 13px;
      line-height: 1.5;
      resize: vertical;
      margin-bottom: 10px;
      transition: border-color 0.2s;
    }

    .bikeride-draft-textarea:focus {
      border-color: var(--primary);
      outline: none;
    }

    .bikeride-voice-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    .bikeride-improve-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 14px;
      background: linear-gradient(135deg, #4c1d95 0%, #3b0764 100%);

      border: 1px solid #7c3aed;

    .bikeride-improve-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(124, 58, 237, 0.3);
      border-color: #8b5cf6;

    .bikeride-improve-btn.improving {
      opacity: 0.7;

    .bikeride-improve-btn .sparkle {

    .bikeride-voice-send {
      display: inline-flex;

      border-radius: 14px;

  <script>mermaid.initialize({ startOnLoad: false, theme: 'dark', themeVariables: { primaryColor: '#3b82f6', primaryTextColor: '#e2e8f0', primaryBorderColor: '#475569', lineColor: '#64748b', secondaryColor: '#1e293b', tertiaryColor: '#0f172a' } });</script>
</head>

<body>
  <div class="header">
    <div class="status-dot" id="ws-dot"></div>
    <h1>PAI Project Manager</h1>
    <button class="btn btn-primary btn-sm" onclick="showCreateModal('mission')">+ Mission</button>
    <button class="btn btn-primary btn-sm" onclick="showCreateModal('project')">+ Project</button>
    <button class="btn btn-ghost btn-sm" onclick="refreshData()">Refresh</button>
  </div>

  <div class="tabs" role="tablist" aria-label="Dashboard navigation">
    <button class="tab active" data-tab="analytics" onclick="switchTab('analytics')" role="tab" aria-selected="true"
      id="tab-analytics" aria-controls="content" tabindex="0">Analytics</button>
    <button class="tab" data-tab="awareness" onclick="switchTab('awareness')" role="tab" aria-selected="false"
      id="tab-awareness" aria-controls="content" tabindex="-1">Awareness</button>
    <button class="tab" data-tab="blockers" onclick="switchTab('blockers')" role="tab" aria-selected="false"
      id="tab-blockers" aria-controls="content" tabindex="-1">Blockers</button>
    <button class="tab" data-tab="board" onclick="switchTab('board')" role="tab" aria-selected="false" id="tab-board"
      aria-controls="content" tabindex="-1">Board</button>
    <button class="tab" data-tab="calendar" onclick="switchTab('calendar')" role="tab" aria-selected="false"
      id="tab-calendar" aria-controls="content" tabindex="-1">Calendar</button>
    <button class="tab" data-tab="email" onclick="switchTab('email')" role="tab" aria-selected="false" id="tab-email"
      aria-controls="content" tabindex="-1">Email</button>
    <button class="tab" data-tab="data" onclick="switchTab('data')" role="tab" aria-selected="false" id="tab-data"
      aria-controls="content" tabindex="-1">Data</button>
    <button class="tab" data-tab="dispatch" onclick="switchTab('dispatch')" role="tab" aria-selected="false"
      id="tab-dispatch" aria-controls="content" tabindex="-1">Dispatch</button>
    <button class="tab" data-tab="git" onclick="switchTab('git')" role="tab" aria-selected="false" id="tab-git"
      aria-controls="content" tabindex="-1">Git</button>
    <button class="tab" data-tab="integration" onclick="switchTab('integration')" role="tab" aria-selected="false"
      id="tab-integration" aria-controls="content" tabindex="-1">Integration</button>
    <button class="tab" data-tab="interview" onclick="switchTab('interview')" role="tab" aria-selected="false"
      id="tab-interview" aria-controls="content" tabindex="-1">Interview</button>
    <button class="tab" data-tab="network" onclick="switchTab('network')" role="tab" aria-selected="false"
      id="tab-network" aria-controls="content" tabindex="-1">Network</button>
    <button class="tab" data-tab="projects" onclick="switchTab('projects')" role="tab" aria-selected="false"
      id="tab-projects" aria-controls="content" tabindex="-1">Projects</button>
    <button class="tab" data-tab="timeline" onclick="switchTab('timeline')" role="tab" aria-selected="false"
      id="tab-timeline" aria-controls="content" tabindex="-1">Timeline</button>
    <button class="tab" data-tab="bikeride" onclick="switchTab('bikeride')" role="tab" aria-selected="false"
      id="tab-bikeride" aria-controls="content" tabindex="-1">🚴 Bike Ride</button>
  </div>

  <div class="stats" id="stats-bar"></div>

  <div class="content" id="content" role="tabpanel" aria-labelledby="tab-data"></div>

  <div id="modal-root"></div>
  <div class="toast-container" id="toast-container" aria-live="polite" role="status"></div>

  <script>
    // ============================================================================
    // State
    // ============================================================================
    var state = { missions: [], projects: [], orphan_projects: [], stats: {} };
    var currentTab = 'data';
    var dataSubTab = 'all';
    var sortState = { table: null, key: null, asc: true };
    var expanded = new Set();
    var editingCell = null;
    var searchFilter = '';
    var filterStatus = '';
    var filterPriority = '';
    var networkState = null;
    var networkActive = false;  // Flag: true while Network tab is current and initialized
    var showLabels = false;
    var showTasks = false;
    var _dispatchHandler = null;
    var boardSectionsExpanded = { missions: true, projects: true };
    var selectedProjectId = null;
    var gitStatusCache = {};
    var dispatchSectionsExpanded = { missions: true, projects: true, tasks: false };
    var dispatchMode = 'copy'; // 'copy' | 'claude' | 'ollama' | 'gemini'
    var dispatchOllamaModel = 'qwen3:4b';
    var activeDispatchJob = null;

    // Dispatch action handler - either copy to clipboard or execute via backend
    function dispatchAction(action, context) {
      if (dispatchMode === 'copy') {
        dispatchToClipboard(action, context);
        return;
      }

      // Execute via backend
      var backend = dispatchMode; // 'claude' or 'ollama'
      var body = { action: action, context: context, backend: backend };
      if (backend === 'ollama') body.model = dispatchOllamaModel;

      toast('Starting ' + backend + ' execution...', 'info');
      showDispatchOutputModal(action, context, backend);

      fetch('/api/dispatch/execute', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      })
        .then(function (r) { return r.json(); })
        .then(function (data) {
          if (!data.success) {
            updateDispatchOutput('error', data.error || 'Failed to start job');
            return;
          }
          activeDispatchJob = data.jobId;
          pollDispatchJob(data.jobId);
        })
        .catch(function (err) {
          updateDispatchOutput('error', 'Network error: ' + err.message);
        });
    }

    function pollDispatchJob(jobId) {
      fetch('/api/dispatch/status/' + jobId)
        .then(function (r) { return r.json(); })
        .then(function (job) {
          if (job.status === 'running') {
            setTimeout(function () { pollDispatchJob(jobId); }, 1000);
            return;
          }
          updateDispatchOutput(job.status, job.output || job.error || '');
        })
        .catch(function (err) {
          updateDispatchOutput('error', 'Poll error: ' + err.message);
        });
    }

    function showDispatchOutputModal(action, context, backend) {
      // Store context for auto-fill operations
      activeDispatchContext = { action: action, context: context, backend: backend };

      var modalRoot = document.getElementById('modal-root');
      modalRoot.innerHTML = '<div class="modal-overlay" onclick="if(event.target===this)closeModal()">' +
        '<div class="modal dispatch-output-modal">' +
        '<div class="dispatch-output-header">' +
        '<h2>Dispatch: ' + action + '</h2>' +
        '<div class="dispatch-output-status" id="dispatch-status">' +
        '<div class="spinner"></div>' +
        '<span>Running via ' + backend + '...</span>' +
        '</div>' +
        '</div>' +
        '<div class="dispatch-output-content" id="dispatch-output">Waiting for output...</div>' +
        '<div class="dispatch-output-actions">' +
        '<div class="auto-fill-group">' +
        '<span style="font-size:11px;color:var(--text-dim);">Apply to:</span>' +
        '<button class="btn btn-ghost btn-sm" onclick="applyDispatchResult(' + "'summary'" + ')">→ Summary</button>' +
        '<button class="btn btn-ghost btn-sm" onclick="applyDispatchResult(' + "'goal'" + ')">→ Goal</button>' +
        '<button class="btn btn-ghost btn-sm" onclick="applyDispatchResult(' + "'description'" + ')">→ Description</button>' +
        '<button class="btn btn-ghost btn-sm" onclick="applyDispatchResult(' + "'context'" + ')">+ Context</button>' +
        '</div>' +
        '<div style="display:flex;gap:8px;">' +
        '<button class="btn btn-ghost" onclick="addToQueue()">+ Queue</button>' +
        '<button class="btn btn-ghost" onclick="copyDispatchOutput()">Copy</button>' +
        '<button class="btn btn-primary" onclick="closeModal()">Close</button>' +
        '</div>' +
        '</div>' +
        '</div>' +
        '</div>';
      _openModal();
    }

    function updateDispatchOutput(status, content) {
      var statusEl = document.getElementById('dispatch-status');
      var outputEl = document.getElementById('dispatch-output');
      if (!statusEl || !outputEl) return;

      if (status === 'complete') {
        statusEl.innerHTML = '\u003cspan style=\"color:var(--success)\"\u003e✓ Complete\u003c/span\u003e';
        outputEl.textContent = content;
        toast('Dispatch completed successfully', 'success');
      } else if (status === 'error') {
        statusEl.innerHTML = '\u003cspan style=\"color:var(--error)\"\u003e✗ Error\u003c/span\u003e';
        outputEl.textContent = content;
        toast('Dispatch failed', 'error');
      } else {
        outputEl.textContent = content;
      }
    }

    function copyDispatchOutput() {
      var outputEl = document.getElementById('dispatch-output');
      if (outputEl) {
        navigator.clipboard.writeText(outputEl.textContent).then(function () {
          toast('Output copied to clipboard');
        });
      }
    }

    // Apply dispatch result to entity fields
    async function applyDispatchResult(field) {
      var outputEl = document.getElementById('dispatch-output');
      if (!outputEl || !activeDispatchContext) {
        toast('No dispatch context', 'error');
        return;
      }

      var output = outputEl.textContent;
      var ctx = activeDispatchContext.context;
      var entityType = ctx.projects ? 'mission' : 'project';
      var entityId = ctx.id;

      if (field === 'context') {
        // Add to dispatch context
        var currentCtx = await api('GET', '/api/' + entityType + 's/' + entityId + '/context');
        currentCtx.notes = (currentCtx.notes || '') + '\n\n--- ' + new Date().toISOString().slice(0, 10) + ' ---\n' + output.slice(0, 500);
        currentCtx.dispatch_history = currentCtx.dispatch_history || {};
        currentCtx.dispatch_history[activeDispatchContext.action] = {
          backend: activeDispatchContext.backend,
          timestamp: Date.now(),
          preview: output.slice(0, 200)
        };
        await api('PUT', '/api/' + entityType + 's/' + entityId + '/context', currentCtx);
        toast('Added to ' + entityType + ' context');
      } else {
        // Update entity field directly
        var update = {};
        update[field] = output.slice(0, 1000); // Limit field length

        if (entityType === 'mission') {
          await api('PUT', '/api/missions/' + entityId, update);
        } else {
          await api('PUT', '/api/projects/' + entityId, update);
        }
        toast('Updated ' + field + ' for ' + entityId);
      }

      refreshData();
    }

    // Dispatch queue management
    var dispatchQueue = [];

    async function addToQueue() {
      if (!activeDispatchContext) {
        toast('No active dispatch context', 'error');
        return;
      }

      var ctx = activeDispatchContext.context;
      var entityType = ctx.projects ? 'mission' : 'project';

      var res = await api('POST', '/api/dispatch/queue', {
        entityType: entityType,
        entityId: ctx.id,
        action: activeDispatchContext.action,
        backend: dispatchMode,
        model: dispatchOllamaModel
      });

      if (res.success) {
        toast('Added to dispatch queue');
        refreshDispatchQueue();
      } else {
        toast('Failed to add to queue: ' + res.error, 'error');
      }
    }

    async function refreshDispatchQueue() {
      var res = await api('GET', '/api/dispatch/queue');
      dispatchQueue = res.queue || [];
      renderDispatchQueueUI();
    }

    function renderDispatchQueueUI() {
      var container = document.getElementById('dispatch-queue-list');
      if (!container) return;

      if (dispatchQueue.length === 0) {
        container.innerHTML = '<div class="queue-empty">Queue is empty</div>';
        return;
      }

      var html = dispatchQueue.map(function (item) {
        return '<div class="queue-item" data-id="' + item.id + '">' +
          '<span class="queue-item-info">' + item.entityType + '/' + item.entityId + ' - ' + item.action + '</span>' +
          '<span class="queue-item-backend">' + item.backend + '</span>' +
          '<button class="btn btn-sm btn-ghost" onclick="removeFromQueue(\'' + item.id + '\')">✕</button>' +
          '</div>';
      }).join('');

      container.innerHTML = html;
    }

    async function removeFromQueue(itemId) {
      await api('DELETE', '/api/dispatch/queue/' + itemId);
      refreshDispatchQueue();
      toast('Removed from queue');
    }

    async function runDispatchQueue() {
      if (dispatchQueue.length === 0) {
        toast('Queue is empty', 'error');
        return;
      }

      var res = await api('POST', '/api/dispatch/queue/run');
      if (res.success) {
        toast('Running ' + dispatchQueue.length + ' queued items');
        refreshDispatchQueue();
      }
    }

    function setDispatchMode(mode) {
      dispatchMode = mode;
      var indicator = document.getElementById('dispatch-mode-indicator');
      if (indicator) {
        var labels = { copy: '📋 Copy Mode', claude: '🤖 Claude Code', ollama: '🦙 Ollama', gemini: '💎 Gemini CLI' };
        var colors = { copy: 'copy', claude: 'claude', ollama: 'ollama', gemini: 'gemini' };
        indicator.innerHTML = '\u003cdiv class=\"dot ' + colors[mode] + '\"\u003e\u003c/div\u003e\u003cspan\u003e' + labels[mode] + '\u003c/span\u003e';
      }
    }

    function allProjects() {
      var seen = new Set();
      var result = [];
      var all = (state.projects || []).concat(state.orphan_projects || []);
      for (var i = 0; i < all.length; i++) {
        var p = all[i];
        if (!seen.has(p.id)) { seen.add(p.id); result.push(p); }
      }
      return result;
    }
    var ws;

    // ============================================================================
    // API
    // ============================================================================
    async function api(method, path, body) {
      var opts = { method: method, headers: { 'Content-Type': 'application/json' } };
      if (body) opts.body = JSON.stringify(body);
      var res = await fetch(path, opts);
      return res.json();
    }

    async function refreshData() {
      try {
        state = await api('GET', '/api/dashboard');
        renderStats();
        renderCurrentView();
      } catch (e) { toast('Failed to load data', 'error'); }
    }

    // ============================================================================
    // WebSocket
    // ============================================================================
    function connectWS() {
      ws = new WebSocket('ws://' + location.host + '/ws');
      ws.onopen = function () { document.getElementById('ws-dot').classList.remove('disconnected'); };
      ws.onclose = function () {
        document.getElementById('ws-dot').classList.add('disconnected');
        setTimeout(connectWS, 2000);
      };
      ws.onmessage = function (e) {
        var msg = JSON.parse(e.data);
        if (msg.event === 'init') {
          state = msg.data;
          renderStats();
          renderCurrentView();
        } else if (msg.event === 'dispatch' && msg.entity === 'progress') {
          // Streaming dispatch progress update
          var outputEl = document.getElementById('dispatch-output');
          var statusEl = document.getElementById('dispatch-status');
          if (outputEl && msg.data.output) {
            outputEl.textContent = msg.data.output;
            outputEl.scrollTop = outputEl.scrollHeight;
          }
          if (statusEl && msg.data.tokens) {
            statusEl.innerHTML = '<div class="spinner"></div>' +
              '<span>Model: ' + (msg.data.model || '?') + ' | ' +
              msg.data.tokens + ' tokens (' + msg.data.tokensPerSec + ' tok/s) | ' +
              msg.data.elapsed + 's</span>';
          }
        } else if (msg.event === 'dispatch' && msg.entity === 'job') {
          // Dispatch job completed
          if (msg.data.status === 'complete' || msg.data.status === 'error') {
            updateDispatchOutput(msg.data.status, msg.data.output || '');
            // Refresh to get final output
            if (activeDispatchJob === msg.data.id) {
              pollDispatchJob(msg.data.id);
            }
          }
        } else {
          refreshData();
        }
      };
    }

    // ============================================================================
    // Toast
    // ============================================================================
    function toast(msg, type) {
      type = type || 'success';
      var c = document.getElementById('toast-container');
      var el = document.createElement('div');
      el.className = 'toast toast-' + type;
      el.textContent = msg;
      if (type === 'error') { el.setAttribute('role', 'alert'); el.setAttribute('aria-live', 'assertive'); }
      c.appendChild(el);
      setTimeout(function () { el.remove(); }, 3000);
    }

    // Alias for interview functions
    var showToast = toast;

    // HTML escaping helper
    function escapeHtml(str) {
      if (!str) return '';
      return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // ============================================================================
    // Tabs
    // ============================================================================
    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab').forEach(function (t) {
        var isActive = t.dataset.tab === tab;
        t.classList.toggle('active', isActive);
        t.setAttribute('aria-selected', isActive ? 'true' : 'false');
        t.setAttribute('tabindex', isActive ? '0' : '-1');
      });
      var content = document.getElementById('content');
      if (content) content.setAttribute('aria-labelledby', 'tab-' + tab);
      if (tab === 'network') {
        // Clean up any previous network state before re-rendering
        if (networkState && networkState.animFrame) {
          cancelAnimationFrame(networkState.animFrame);
          networkState.animFrame = null;
        }
        networkState = null;
        networkActive = true;
        renderNetworkView();
        setTimeout(initNetwork, 250);
      } else {
        networkActive = false;
        if (networkState && networkState.animFrame) {
          cancelAnimationFrame(networkState.animFrame);
          networkState.animFrame = null;
        }
        networkState = null;
        renderCurrentView();
      }
    }

    function renderCurrentView() {
      switch (currentTab) {
        case 'data': renderDataView(); break;
        case 'network':
          if (networkActive) break;  // NEVER clobber network canvas while tab is active
          renderNetworkView(); break;
        case 'board': renderBoardView(); break;
        case 'projects': renderProjectsView(); break;
        case 'timeline': renderTimelineView(); break;
        case 'analytics': renderAnalyticsView(); break;
        case 'git': renderGitView(); break;
        case 'dispatch': renderDispatchView(); break;
        case 'integration': renderIntegrationView(); break;
        case 'interview': renderInterviewView(); break;
        case 'awareness': renderAwarenessView(); break;
        case 'blockers': renderBlockersView(); break;
        case 'calendar': renderCalendarView(); break;
        case 'email': renderEmailView(); break;
        case 'bikeride': renderBikeRideView(); break;
      }
    }

    // ============================================================================
    // Stats
    // ============================================================================
    function renderStats() {
      var s = state.stats || {};
      document.getElementById('stats-bar').innerHTML =
        stat(s.total_missions || 0, 'Missions') +
        stat(s.active_missions || 0, 'Active') +
        stat(s.total_projects || 0, 'Projects') +
        stat(s.total_tasks || 0, 'Tasks') +
        stat(s.completed_tasks || 0, 'Done') +
        stat(s.overdue_tasks || 0, 'Overdue') +
        stat(s.blocked_tasks || 0, 'Blocked');
    }

    function stat(val, label) {
      return '<div class="stat"><div class="stat-value">' + val + '</div><div class="stat-label">' + label + '</div></div>';
    }

    // ============================================================================
    // Sort helpers
    // ============================================================================
    function sortBy(tbl, key) {
      if (sortState.table === tbl && sortState.key === key) {
        sortState.asc = !sortState.asc;
      } else {
        sortState = { table: tbl, key: key, asc: true };
      }
      renderCurrentView();
    }

    function sortIndicator(tbl, key) {
      if (sortState.table === tbl && sortState.key === key) return sortState.asc ? ' \u25B2' : ' \u25BC';
      return '';
    }

    function sortArray(arr, key, asc) {
      var priorityOrder = { HIGH: 0, MEDIUM: 1, LOW: 2 };
      return arr.slice().sort(function (a, b) {
        var va = a[key], vb = b[key];
        if (key === 'priority') { va = priorityOrder[va] !== undefined ? priorityOrder[va] : 9; vb = priorityOrder[vb] !== undefined ? priorityOrder[vb] : 9; }
        if (typeof va === 'number' && typeof vb === 'number') return asc ? va - vb : vb - va;
        va = String(va || '').toLowerCase(); vb = String(vb || '').toLowerCase();
        return asc ? va.localeCompare(vb) : vb.localeCompare(va);
      });
    }

        '<button class="btn btn-ghost btn-xs filter-chip' + (filterStatus === 'ACTIVE' ? ' active' : '') + '" onclick="filterStatus=\'ACTIVE\';renderDataView()" style="' + (filterStatus === 'ACTIVE' ? 'background:var(--primary);color:white;' : '') + '">Active</button>' +
        '<button class="btn btn-ghost btn-xs filter-chip' + (filterStatus === 'PLANNING' ? ' active' : '') + '" onclick="filterStatus=\'PLANNING\';renderDataView()" style="' + (filterStatus === 'PLANNING' ? 'background:var(--primary);color:white;' : '') + '">Planning</button>' +
        '<button class="btn btn-ghost btn-xs filter-chip' + (filterStatus === 'COMPLETED' ? ' active' : '') + '" onclick="filterStatus=\'COMPLETED\';renderDataView()" style="' + (filterStatus === 'COMPLETED' ? 'background:var(--primary);color:white;' : '') + '">Completed</button>' +

    function renderTasksGrid(filter) {
      var allTasks = [];
      var prjs = allProjects();
      for (var i = 0; i < prjs.length; i++) {
        var p = prjs[i];
        var tasks = p.tasks || [];
        for (var j = 0; j < tasks.length; j++) {
          var t = tasks[j];
          allTasks.push({ title: t.title, section: t.section, priority: t.priority, due: t.due, assignee: t.assignee, projectId: p.id, projectTitle: p.title || p.id });
        }
      }
      if (filter) {
        allTasks = allTasks.filter(function (t) {
          return (t.title || '').toLowerCase().indexOf(filter) !== -1 || (t.projectId || '').toLowerCase().indexOf(filter) !== -1;
        });
      }
      if (filterStatus) {
        allTasks = allTasks.filter(function (t) { return (t.section || '').toUpperCase() === filterStatus || (filterStatus === 'ACTIVE' && t.section === 'in_progress') || (filterStatus === 'BLOCKED' && t.section === 'blocked') || (filterStatus === 'COMPLETED' && t.section === 'completed') || (filterStatus === 'PLANNING' && t.section === 'remaining'); });
      }
      if (filterPriority) {
        allTasks = allTasks.filter(function (t) { return (t.priority || '').toUpperCase() === filterPriority; });
      }
      if (sortState.table === 'tasks') allTasks = sortArray(allTasks, sortState.key, sortState.asc);

      var today = new Date().toISOString().split('T')[0];
      var html = '<div class="table-section"><h3>Tasks <span class="count">(' + allTasks.length + ')</span></h3>';
      html += '<table class="data-grid"><thead><tr>' +
        '<th onclick="sortBy(\'tasks\',\'title\')">Task' + sortIndicator('tasks', 'title') + '</th>' +
        '<th onclick="sortBy(\'tasks\',\'projectId\')">Project' + sortIndicator('tasks', 'projectId') + '</th>' +
        '<th onclick="sortBy(\'tasks\',\'section\')">Section' + sortIndicator('tasks', 'section') + '</th>' +
        '<th onclick="sortBy(\'tasks\',\'priority\')">Priority' + sortIndicator('tasks', 'priority') + '</th>' +
        '<th onclick="sortBy(\'tasks\',\'due\')">Due' + sortIndicator('tasks', 'due') + '</th>' +
        '<th>Status</th>' +
        '<th>Actions</th></tr></thead><tbody>';

      for (var k = 0; k < allTasks.length; k++) {
        var t = allTasks[k];

          '<td class="data-cell" onclick="startTaskDateEdit(this,\'' + esc(t.projectId) + '\',\'' + esc(t.title) + '\',\'' + esc(t.due || '') + '\')">' + (t.due ? esc(t.due) : '<span class="text-dim">-</span>') + '</td>' +
          '<td>' + (overdue ? '<span style="color:var(--error);font-weight:600">OVERDUE</span>' : (t.section === 'completed' ? '<span style="color:var(--success)">Done</span>' : '')) + '</td>' +
          '<td><div class="dispatch-dropdown">' +
          '<button class="btn btn-ghost btn-xs dispatch-trigger" onclick="toggleDispatch(this)">Dispatch</button>' +
          '<div class="dispatch-menu">' +
          '<button onclick="dispatchToClipboard(\'task-interview\',{title:\'' + esc(t.title).replace(/'/g, "\\'") + '\',projectId:\'' + esc(t.projectId) + '\',section:\'' + esc(t.section || '') + '\',priority:\'' + esc(t.priority || '') + '\'})">Interview</button>' +

          '<button onclick="dispatchToClipboard(\'task-implement\',{title:\'' + esc(t.title).replace(/'/g, "\\'") + '\',projectId:\'' + esc(t.projectId) + '\',section:\'' + esc(t.section || '') + '\',priority:\'' + esc(t.priority || '') + '\'})">Implement</button>' +
