    async function ghDiffPreview() {
      var proj = document.getElementById('gh-diff-project').value;
      var el = document.getElementById('gh-diff-result');
      if (!proj) { toast('Select a linked project', 'error'); return; }
      if (el) el.innerHTML = '<span style="color:var(--text-dim);">Loading diff...</span>';
      try {
        var res = await api('GET', '/api/github/diff/' + proj);
        if (!res.success) { if (el) el.innerHTML = '<span style="color:var(--error);">' + (res.error || 'Failed') + '</span>'; return; }
        var html = '';
        var ol = res.only_local || [];
        var og = res.only_github || [];
        var sm = res.state_mismatch || [];
        if (ol.length === 0 && og.length === 0 && sm.length === 0) {
          html = '<div style="color:var(--success);padding:8px;">\u2705 Fully in sync — no differences found</div>';
        } else {
          if (ol.length > 0) {
            html += '<div style="margin-bottom:8px;"><strong style="color:var(--warning);">Local Only (' + ol.length + ')</strong>';
            for (var i = 0; i < ol.length; i++) html += '<div style="padding:2px 8px;color:var(--warning);">+ ' + esc(ol[i]) + '</div>';
            html += '</div>';
          }
          if (og.length > 0) {
            html += '<div style="margin-bottom:8px;"><strong style="color:var(--cyan);">GitHub Only (' + og.length + ')</strong>';
            for (var j = 0; j < og.length; j++) html += '<div style="padding:2px 8px;color:var(--cyan);">- ' + esc(typeof og[j] === 'string' ? og[j] : og[j].title || og[j]) + '</div>';
            html += '</div>';
          }
          if (sm.length > 0) {
            html += '<div><strong style="color:var(--purple);">State Mismatch (' + sm.length + ')</strong>';
            for (var k = 0; k < sm.length; k++) {
              var m = sm[k];
              html += '<div style="padding:2px 8px;color:var(--purple);">\u26A0 ' + esc(m.task || m) + ' (local: ' + esc(m.local_section || '?') + ', gh: ' + esc(m.github_state || '?') + ')</div>';
            }
            html += '</div>';
          }
        }
        if (el) el.innerHTML = html;
      } catch (e) { if (el) el.innerHTML = '<span style="color:var(--error);">Error: ' + e.message + '</span>'; }
    }

    async function ghCleanupDry() {
      var repo = document.getElementById('gh-cleanup-repo').value;
      var el = document.getElementById('gh-cleanup-result');
      if (!repo) { toast('Enter a repo (owner/repo)', 'error'); return; }
      if (el) el.innerHTML = '<span style="color:var(--text-dim);">Scanning for test issues...</span>';
      try {
        var res = await api('POST', '/api/github/cleanup', { repo: repo, dry_run: true });
        if (!res.success) { if (el) el.innerHTML = '<span style="color:var(--error);">' + (res.error || 'Failed') + '</span>'; return; }
        var issues = res.issues || [];
        if (issues.length === 0) {
          if (el) el.innerHTML = '<div style="color:var(--success);padding:4px;">No test issues found</div>';
          return;
        }
        var html = '<div style="color:var(--warning);padding:4px;margin-bottom:4px;">' + issues.length + ' test issues found (dry run):</div>';
        for (var i = 0; i < Math.min(issues.length, 20); i++) {
          html += '<div style="padding:2px 8px;font-size:11px;">#' + (issues[i].number || issues[i]) + ' ' + esc(issues[i].title || '') + '</div>';
        }
        if (issues.length > 20) html += '<div style="padding:2px 8px;color:var(--text-muted);">... and ' + (issues.length - 20) + ' more</div>';
        if (el) el.innerHTML = html;
      } catch (e) { if (el) el.innerHTML = '<span style="color:var(--error);">Error: ' + e.message + '</span>'; }

          toast('Cleaned up ' + count + ' test issues');

          refreshData();

    var awarenessData = null;

    async function loadAwarenessData() {
      try {
        var res = await fetch('/api/awareness');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        awarenessData = await res.json();
        return awarenessData;
      } catch (e) {
        toast('Failed to load awareness data', 'error');
        return null;
      }
    }

    function renderAwarenessView() {
      var c = document.getElementById('content');
      c.innerHTML = '<div style="display:flex;align-items:center;gap:12px;padding:24px;color:var(--text-dim);"><div class="spinner" style="width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin 1s linear infinite;"></div> Loading awareness data...</div>';
      loadAwarenessData().then(function (data) {
        if (!data) { c.innerHTML = '<div style="padding:24px;text-align:center;"><div style="background:var(--panel);border:1px solid var(--error);border-radius:var(--radius-lg);padding:24px;display:inline-block;"><p style="color:var(--error);font-weight:600;margin-bottom:8px;">Failed to load awareness data</p><p style="color:var(--text-dim);font-size:13px;">Check that the server is running and try refreshing.</p><button class="btn btn-ghost" onclick="renderAwarenessView()" style="margin-top:12px;">Retry</button></div></div>'; return; }
        var m = data.metrics || {};

        var html = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">' +
          '<h3 style="font-size:16px;margin:0;">System Awareness</h3>' +
          '<button class="btn btn-ghost" onclick="awarenessData=null;renderAwarenessView()">Refresh</button>' +
          '</div>';

        // Metrics bar
        html += '<div style="display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:24px;">';
        html += awarenessMetric(m.mission_count || 0, 'Missions', 'var(--primary)');
        html += awarenessMetric(m.project_count || 0, 'Projects', 'var(--cyan)');
        html += awarenessMetric(m.total_tasks || 0, 'Total Tasks', 'var(--purple)');
        html += awarenessMetric(m.completed_tasks || 0, 'Completed', 'var(--success)');
        html += awarenessMetric(m.telos_files || 0, 'TELOS Files', 'var(--warning)');
        html += awarenessMetric((m.overall_completion || 0) + '%', 'Completion', 'var(--cyan)');
        html += '</div>';

        // Two-column layout
        html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">';

        // Left: Mission Hierarchy
        html += '<div style="background:var(--panel);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;">';
        html += '<h3 style="font-size:15px;margin-bottom:16px;color:var(--text);">Mission Hierarchy</h3>';
        var missions = data.missions || [];
        if (missions.length === 0) { html += '<p style="color:var(--text-dim);font-size:13px;">No missions found.</p>'; }
        for (var i = 0; i < missions.length; i++) {
          var mi = missions[i];
          html += '<div style="margin-bottom:12px;padding:12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);">';
          html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">';
          html += '<strong style="font-size:13px;">' + esc(mi.title) + '</strong>';
          html += '<div style="display:flex;gap:6px;">' + badge(mi.status) + badge(mi.priority) + '</div>';
          html += '</div>';
          if (mi.description) { html += '<p style="font-size:12px;color:var(--text-dim);margin-bottom:6px;">' + esc(mi.description).slice(0, 120) + '</p>'; }
          if (mi.completion_percentage > 0) { html += '<div style="height:4px;background:var(--border);border-radius:2px;overflow:hidden;"><div style="height:100%;width:' + mi.completion_percentage + '%;background:var(--success);"></div></div>'; }
          html += '</div>';
        }
        html += '</div>';

        // Right: Ecosystem Map (Mermaid)
        html += '<div style="background:var(--panel);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;">';
        html += '<h3 style="font-size:15px;margin-bottom:16px;color:var(--text);">Ecosystem Map</h3>';
        if (data.mermaid_graph) {
          html += '<div class="mermaid" id="awareness-mermaid">' + data.mermaid_graph + '</div>';
        } else {
          html += '<p style="color:var(--text-dim);font-size:13px;">No data to visualize.</p>';
        }
        html += '</div>';

        html += '</div>'; // close 2-col

        // Projects Detail (full width)
        html += '<div style="background:var(--panel);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;margin-top:20px;">';
        html += '<h3 style="font-size:15px;margin-bottom:16px;color:var(--text);">Projects Detail</h3>';
        html += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;">';
        var projects = data.projects || [];
        for (var j = 0; j < projects.length; j++) {

          html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">';
          html += '<strong style="font-size:13px;">' + esc(pj.title) + '</strong>';
          html += badge(pj.status);
          html += '</div>';
          if (pj.goal) { html += '<p style="font-size:12px;color:var(--text-dim);margin-bottom:8px;">' + esc(pj.goal).slice(0, 100) + '</p>'; }
          var tc = pj.task_counts || {};
          if (tc.total > 0) {
            var pct = Math.round((tc.completed || 0) / tc.total * 100);
            html += '<div style="font-size:11px;color:var(--text-dim);margin-bottom:4px;">' + (tc.completed || 0) + '/' + tc.total + ' tasks (' + pct + '%)</div>';
            html += '<div style="height:4px;background:var(--border);border-radius:2px;overflow:hidden;"><div style="height:100%;width:' + pct + '%;background:var(--success);"></div></div>';
          }
          html += '</div>';
        }
        html += '</div></div>';

        // Two column bottom: TELOS + Memory
        html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:20px;">';

        // TELOS Profile
        html += '<div style="background:var(--panel);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;">';
        html += '<h3 style="font-size:15px;margin-bottom:16px;color:var(--text);">TELOS Profile</h3>';
        var telos = data.telos || [];
        if (telos.length === 0) { html += '<p style="color:var(--text-dim);font-size:13px;">No TELOS files found.</p>'; }
        for (var k = 0; k < telos.length; k++) {
          var t = telos[k];
          html += '<div style="padding:8px 12px;margin-bottom:6px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);font-size:13px;">';
          html += '<strong>' + esc(t.name) + '</strong>';
          if (t.preview) { html += '<p style="font-size:11px;color:var(--text-dim);margin-top:4px;">' + esc(t.preview).slice(0, 80) + '...</p>'; }
          html += '</div>';
        }
        html += '</div>';

        // Memory System
        html += '<div style="background:var(--panel);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;">';
        html += '<h3 style="font-size:15px;margin-bottom:16px;color:var(--text);">Memory System</h3>';
        var mem = data.memory || {};
        var dirs = mem.directories || [];
        html += '<div style="font-size:12px;color:var(--text-dim);margin-bottom:12px;">Total files: ' + (mem.total_files || 0) + '</div>';
        for (var l = 0; l < dirs.length; l++) {
          var d = dirs[l];
          html += '<div style="display:flex;justify-content:space-between;padding:6px 12px;margin-bottom:4px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);font-size:13px;">';
          html += '<span>' + esc(d.name) + '</span>';
          html += '<span style="color:var(--text-dim);">' + d.file_count + ' files</span>';
          html += '</div>';
        }
        html += '</div>';

        html += '</div>'; // close 2-col bottom

        c.innerHTML = html;

        // Initialize Mermaid if available
        if (typeof mermaid !== 'undefined' && data.mermaid_graph) {
          try { mermaid.run({ nodes: [document.getElementById('awareness-mermaid')] }); } catch (e) { console.warn('Mermaid render failed:', e); }
        }
      });
    }

    function awarenessMetric(value, label, color) {
      return '<div style="background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center;">' +
        '<div style="font-size:24px;font-weight:700;color:' + color + ';">' + value + '</div>' +
        '<div style="font-size:11px;color:var(--text-dim);margin-top:4px;">' + label + '</div>' +
        '</div>';
    }

    // Awareness auto-refresh (every 120s)
    setInterval(function () {
      if (currentTab === 'awareness' && awarenessData) {
        loadAwarenessData().then(function (data) {
          if (data) renderAwarenessView();
        });
      }
    }, 120000);

    // ============================================================================
    // Helpers
    // ============================================================================
    function esc(s) { return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }

    function badge(text, cls) {
      if (!text) return '';
      return '<span class="badge badge-' + (cls || text) + '">' + esc(text) + '</span>';
    }

    function field(name, label, type, value, placeholder, options) {
      var html = '<div class="modal-field"><label for="f-' + name + '">' + label + '</label>';
      if (type === 'select') {
        html += '<select name="' + name + '" id="f-' + name + '">';
        for (var i = 0; i < (options || []).length; i++) {
          var o = options[i];
          html += '<option value="' + o + '"' + (o === value ? ' selected' : '') + '>' + o + '</option>';
        }
        html += '</select>';
      } else if (type === 'textarea') {
        html += '<textarea name="' + name + '" id="f-' + name + '" placeholder="' + esc(placeholder || '') + '">' + esc(value || '') + '</textarea>';
      } else {
        html += '<input type="' + type + '" name="' + name + '" id="f-' + name + '" value="' + esc(value || '') + '" placeholder="' + esc(placeholder || '') + '">';

    // ============================================================================
    // Keyboard Navigation for Tabs + Modal Escape
    // ============================================================================
    document.addEventListener('keydown', function (e) {
      // Don't trigger shortcuts when typing in inputs
      var tag = (e.target.tagName || '').toLowerCase();
      var isInput = tag === 'input' || tag === 'textarea' || tag === 'select' || e.target.isContentEditable;

      if (e.key === 'Escape') {
        var modalRoot = document.getElementById('modal-root');
        if (modalRoot && modalRoot.innerHTML.trim()) { closeModal(); return; }
        // Also blur any focused input
        if (isInput) { e.target.blur(); return; }
      }

      if (isInput) return; // Don't trigger shortcuts while typing

      // Number keys 1-9 + 0 for tab switching
      var tabOrder = ['analytics', 'awareness', 'blockers', 'board', 'calendar', 'data', 'dispatch', 'git', 'integration', 'interview', 'network', 'projects', 'timeline'];
      var keyNum = parseInt(e.key);
      if (!isNaN(keyNum) && keyNum >= 1 && keyNum <= tabOrder.length && !e.ctrlKey && !e.metaKey && !e.altKey) {
        e.preventDefault();
        switchTab(tabOrder[keyNum - 1]);
        return;
      }

      // / for search focus
      if (e.key === '/' && !e.ctrlKey && !e.metaKey) {
        e.preventDefault();
        var searchBox = document.querySelector('.search-box input') || document.querySelector('input[type="search"]') || document.querySelector('input[placeholder*="earch"]');
        if (searchBox) searchBox.focus();
        return;
      }

      // r for refresh
      if (e.key === 'r' && !e.ctrlKey && !e.metaKey) {
        e.preventDefault();
        fetchData();
        return;
      }
    });

    (function () {
      var tablist = document.querySelector('[role="tablist"]');
      if (!tablist) return;
      tablist.addEventListener('keydown', function (e) {
        var tabs = Array.prototype.slice.call(tablist.querySelectorAll('[role="tab"]'));
        var idx = tabs.indexOf(document.activeElement);
        if (idx === -1) return;
        var newIdx = idx;
        if (e.key === 'ArrowRight') { newIdx = (idx + 1) % tabs.length; }
        else if (e.key === 'ArrowLeft') { newIdx = (idx - 1 + tabs.length) % tabs.length; }
        else if (e.key === 'Home') { newIdx = 0; }
        else if (e.key === 'End') { newIdx = tabs.length - 1; }
        else if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); tabs[idx].click(); return; }
        else { return; }
        e.preventDefault();
        tabs[newIdx].focus();
        tabs[newIdx].click();
      });
    })();

    async function calLoadStatus() {
      var res = await api('GET', '/api/calendar/status');
      calState.authenticated = res.authenticated;
      return res;
    }

    async function calLoadEvents() {
      if (!calState.authenticated) return;
      calState.loading = true;
      renderCalendarView();
      var firstDay = new Date(calState.year, calState.month, 1);
      var lastDay = new Date(calState.year, calState.month + 1, 0);
      // Always include today + 14 days for Today/Tomorrow views
      var now = new Date();
      var futureMin = new Date(now.getTime() - 30 * 86400000);
      var futureMax = new Date(now.getTime() + 30 * 86400000);
      var rangeMin = new Date(Math.min(firstDay.getTime() - 7 * 86400000, futureMin.getTime()));
      var rangeMax = new Date(Math.max(lastDay.getTime() + 7 * 86400000, futureMax.getTime()));
      var timeMin = rangeMin.toISOString();
      var timeMax = rangeMax.toISOString();
      try {
        var res = await api('GET', '/api/calendar/events?timeMin=' + encodeURIComponent(timeMin) + '&timeMax=' + encodeURIComponent(timeMax));
        if (res.success) {
          calState.events = res.events || [];
          calState.calendarName = res.calendarName || 'Primary';
        } else if (res.needsReauth) {
          calState.authenticated = false;
          calState.events = [];
          toast('Calendar token expired \u2014 please reconnect', 'warning');
        } else {
          toast('Calendar: ' + (res.error || 'Unknown error'), 'error');
        }
      } catch (e) { toast('Calendar fetch failed: ' + e.message, 'error'); }
      calState.loading = false;
      renderCalendarView();
    }

    function calConnectClick() {
      api('GET', '/api/calendar/auth').then(function (res) {
        if (res.error) { toast(res.error, 'error'); return; }
        window.open(res.auth_url, '_blank', 'width=500,height=650');
        // Poll status after 3s
        setTimeout(function () { calLoadStatus().then(function () { if (calState.authenticated) calLoadEvents(); else renderCalendarView(); }); }, 3000);
      }).catch(function (e) { toast('Auth init failed: ' + e.message, 'error'); });
    }

    function calGetProjectEvents() {
      // Collect project deadlines from state as synthetic events
      var prjs = allProjects();
      var synthetic = [];
      for (var i = 0; i < prjs.length; i++) {
        var p = prjs[i];
        if (!p.target) continue;
        synthetic.push({ id: '__proj__' + p.id, _synthetic: true, _projectId: p.id, _projectTitle: p.title, _projectStatus: p.status, summary: p.title, start: { date: p.target }, end: { date: p.target }, colorId: 'proj' });
      }
      // Also include task due dates
      for (var j = 0; j < prjs.length; j++) {
        var proj = prjs[j];
        var tasks = proj.tasks || [];
        for (var k = 0; k < tasks.length; k++) {
          var t = tasks[k];
          if (!t.due || t.section === 'completed') continue;
          synthetic.push({ id: '__task__' + proj.id + '__' + (t.id || k), _synthetic: true, _taskId: t.id || k, _projectId: proj.id, _projectTitle: proj.title, summary: t.title, start: { date: t.due }, end: { date: t.due }, colorId: 'task' });
        }
      }
      return synthetic;
    }

    function calEventDate(ev) {
      var s = ev.start;
      if (!s) return null;
      return s.date || (s.dateTime ? s.dateTime.substring(0, 10) : null);
    }

    function calEventEndDate(ev) {
      var e = ev.end;
      if (!e) return calEventDate(ev);
      return e.date || (e.dateTime ? e.dateTime.substring(0, 10) : null);
    }

    function calEventsByDay(year, month) {
      var byDay = {};
      var allEvs = calState.events.concat(calGetProjectEvents());
      for (var i = 0; i < allEvs.length; i++) {
        var ev = allEvs[i];
        var start = calEventDate(ev);
        var end = calEventEndDate(ev);
        if (!start) continue;
        // Expand multi-day events
        var cur = new Date(start + 'T00:00:00');
        var endD = new Date((end || start) + 'T00:00:00');
        while (cur <= endD) {
          if (cur.getFullYear() === year && cur.getMonth() === month) {
            var d = cur.getDate();
            if (!byDay[d]) byDay[d] = [];
            byDay[d].push(ev);
          }
          cur.setDate(cur.getDate() + 1);
        }
      }
      return byDay;
    }

    function calEventColor(ev) {
      if (ev.colorId === 'proj') return '#f59e0b'; // amber for project deadlines

      var colors = { '1': '#7986cb', '2': '#33b679', '3': '#8e24aa', '4': '#e67c73', '5': '#f6c026', '6': '#f5511d', '7': '#039be5', '8': '#616161', '9': '#3f51b5', '10': '#0b8043', '11': '#d60000' };

          '<p style="color:var(--text-dim);margin-bottom:16px;">Link your Google Calendar to see events alongside your PAI projects and tasks. Bidirectional sync lets you push project deadlines to Google Calendar and link calendar events to projects.</p>' +
          '<div style="background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:12px;margin-bottom:16px;font-size:0.85rem;">' +
          '<p style="color:var(--text-muted);margin-bottom:6px;"><strong>Setup required:</strong></p>' +
          '<ol style="color:var(--text-dim);padding-left:18px;line-height:1.8;">' +
          '<li>Go to <strong>console.cloud.google.com</strong></li>' +
          '<li>Create a project → Enable <strong>Google Calendar API</strong></li>' +
          '<li>Credentials → OAuth 2.0 Client → Desktop app</li>' +
          '<li>Add <code>http://localhost:8888/api/calendar/callback</code> as redirect URI</li>' +
          '<li>Add to your <code>.env</code> file:<br><code>GOOGLE_CLIENT_ID=...</code><br><code>GOOGLE_CLIENT_SECRET=...</code></li>' +
          '<li>Restart the server, then click <strong>Connect Google Calendar</strong></li>' +
          '</ol></div>' +
          '<button class="btn btn-primary" onclick="calConnectClick()">Connect Google Calendar</button>' +
          '</div>';
      }

      // Always show local project + task events even without Google auth
      var prjEvts = calGetProjectEvents();

      // Calendar grid
      var firstOfMonth = new Date(yr, mon, 1);
      var daysInMonth = new Date(yr, mon + 1, 0).getDate();
      var startDow = firstOfMonth.getDay(); // 0=Sun
      var byDay = calEventsByDay(yr, mon);
      var today = new Date();
      var todayStr = today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0') + '-' + String(today.getDate()).padStart(2, '0');

      var prjs = allProjects();
      var projMap = {};
      for (var i = 0; i < prjs.length; i++) projMap[prjs[i].id] = prjs[i].title;

      var grid = '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);border-radius:8px;overflow:hidden;">';
      var dayLabels = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
      for (var dl = 0; dl < 7; dl++) {
        grid += '<div style="background:var(--panel);padding:8px;text-align:center;font-size:0.75rem;color:var(--text-muted);font-weight:600;">' + dayLabels[dl] + '</div>';
      }

      var cellCount = 0;
      // Blank cells before first day
      for (var b = 0; b < startDow; b++) { grid += '<div style="background:var(--bg);min-height:90px;"></div>'; cellCount++; }

      for (var d = 1; d <= daysInMonth; d++) {
        var cellDate = yr + '-' + String(mon + 1).padStart(2, '0') + '-' + String(d).padStart(2, '0');
        var isToday = cellDate === todayStr;
        var dayEvts = byDay[d] || [];
        var cellBg = isToday ? 'background:#1e3a5f;' : 'background:var(--panel);';
        grid += '<div style="' + cellBg + 'min-height:90px;padding:4px;vertical-align:top;cursor:pointer;" onclick="calDayClick(' + d + ')">';
        grid += '<div style="text-align:right;padding:2px 4px;font-size:0.8rem;' + (isToday ? 'color:#60a5fa;font-weight:700;' : 'color:var(--text-muted);') + '">' + d + '</div>';
        var shown = 0;
        for (var ei = 0; ei < dayEvts.length && shown < 3; ei++) {
          var ev = dayEvts[ei];
          var evColor = calEventColor(ev);
          var linked = ev._pai_link ? '🔗 ' : '';
          var title = (ev._synthetic ? (ev.colorId === 'proj' ? '📌 ' : '✓ ') : '') + linked + esc((ev.summary || '(no title)').substring(0, 22));
          grid += '<div style="background:' + evColor + '22;border-left:3px solid ' + evColor + ';border-radius:3px;padding:2px 4px;margin:1px 0;font-size:0.7rem;color:' + evColor + ';white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;" title="' + esc(ev.summary || '') + '" onclick="calEventClick(event,' + JSON.stringify(ev.id) + ')">' + title + '</div>';
          shown++;
        }
        if (dayEvts.length > 3) grid += '<div style="font-size:0.65rem;color:var(--text-muted);padding:1px 4px;">+' + (dayEvts.length - 3) + ' more</div>';
        grid += '</div>';
        cellCount++;
      }
      // Fill remainder
      var remainder = (7 - (cellCount % 7)) % 7;
      for (var r = 0; r < remainder; r++) grid += '<div style="background:var(--bg);min-height:90px;"></div>';
      grid += '</div>';

      // Event detail panel (if selectedEvent)
      var detailPanel = '';
      if (calState.selectedEvent) {
        var se = calState.selectedEvent;
        var seColor = calEventColor(se);
        var seStart = calEventDate(se);
        var seEnd = calEventEndDate(se);
        var seLinked = se._pai_link || '';
        var projOptions = '<option value="">— No project link —</option>';
        for (var pi = 0; pi < prjs.length; pi++) {
          projOptions += '<option value="' + esc(prjs[pi].id) + '"' + (seLinked === prjs[pi].id ? ' selected' : '') + '>' + esc(prjs[pi].title) + '</option>';
        }
        detailPanel = '<div style="background:var(--panel);border:1px solid ' + seColor + '44;border-radius:8px;padding:16px;margin-top:16px;">' +
          '<div style="display:flex;justify-content:space-between;align-items:flex-start;">' +
          '<div>' +
          '<div style="font-size:0.7rem;color:' + seColor + ';font-weight:600;margin-bottom:4px;">' + (se._synthetic ? (se.colorId === 'proj' ? 'PROJECT DEADLINE' : 'TASK DUE') : 'GOOGLE CALENDAR EVENT') + '</div>' +
          '<div style="font-size:1.1rem;font-weight:600;margin-bottom:4px;">' + esc(se.summary || '(no title)') + '</div>' +
          '<div style="color:var(--text-muted);font-size:0.85rem;">' + (seStart || '') + (seEnd && seEnd !== seStart ? ' → ' + seEnd : '') + '</div>' +
          (se.description ? '<div style="color:var(--text-dim);font-size:0.85rem;margin-top:8px;">' + esc(se.description) + '</div>' : '') +
          (se.location ? '<div style="color:var(--text-muted);font-size:0.8rem;margin-top:4px;">📍 ' + esc(se.location) + '</div>' : '') +
          '</div>' +
          '<button class="btn btn-ghost btn-sm" onclick="calState.selectedEvent=null;renderCalendarView()">✕</button>' +
          '</div>';
        if (!se._synthetic) {
          detailPanel += '<div style="margin-top:12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;">' +
            '<label style="font-size:0.8rem;color:var(--text-muted);">Link to project:</label>' +
            '<select onchange="calLinkEvent(calState.selectedEvent.id,this.value)" style="background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:4px 8px;font-size:0.8rem;">' + projOptions + '</select>' +
            '<button class="btn btn-ghost btn-sm" style="color:#ef4444;" onclick="calDeleteEvent(calState.selectedEvent.id)">🗑 Delete</button>' +
            (se.htmlLink ? '<a href="' + esc(se.htmlLink) + '" target="_blank" class="btn btn-ghost btn-sm">↗ Open in Google</a>' : '') +
            '</div>';
        } else if (se.colorId === 'proj') {
          detailPanel += '<div style="margin-top:12px;"><a onclick="calOpenProjects()" style="cursor:pointer;color:var(--primary);font-size:0.85rem;">→ Open project</a></div>';
        }
        detailPanel += '</div>';
      }

      // Agenda section: upcoming events in next 14 days
      var agendaItems = '';
      var now2 = new Date();
      var cutoff = new Date(now2.getTime() + 14 * 86400000);
      var upcomingEvts = calState.events.concat(calGetProjectEvents()).filter(function (ev) {
        var d2 = calEventDate(ev);
        if (!d2) return false;
        var dt = new Date(d2 + 'T00:00:00');
        return dt >= now2 && dt <= cutoff;
      }).sort(function (a, b) { return (calEventDate(a) || '').localeCompare(calEventDate(b) || ''); });

      if (upcomingEvts.length > 0) {
        agendaItems = '<div style="margin-top:20px;">' +
          '<div style="font-size:0.85rem;font-weight:600;color:var(--text-muted);margin-bottom:8px;">NEXT 14 DAYS</div>';
        var lastDateLabel = '';
        for (var ai = 0; ai < upcomingEvts.length; ai++) {
          var aev = upcomingEvts[ai];
          var adate = calEventDate(aev);
          if (adate !== lastDateLabel) {
            if (lastDateLabel) agendaItems += '</div>';
            var adt = new Date(adate + 'T00:00:00');
            var adLabel = adt.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
            agendaItems += '<div style="margin-bottom:8px;"><div style="font-size:0.75rem;color:var(--text-muted);font-weight:600;border-bottom:1px solid var(--border);padding-bottom:4px;margin-bottom:4px;">' + adLabel + '</div>';
            lastDateLabel = adate;
          }
          var aeColor = calEventColor(aev);
          var aeLinked = aev._pai_link ? (' <span style="color:#60a5fa;font-size:0.7rem;">🔗 ' + esc(projMap[aev._pai_link] || aev._pai_link) + '</span>') : '';
          agendaItems += '<div style="display:flex;align-items:center;gap:8px;padding:4px 0;cursor:pointer;" onclick="calEventClick(event,' + JSON.stringify(aev.id) + ')">' +
            '<div style="width:8px;height:8px;border-radius:50%;background:' + aeColor + ';flex-shrink:0;"></div>' +
            '<span style="font-size:0.85rem;">' + esc(aev.summary || '(no title)') + '</span>' + aeLinked +
            '</div>';
        }
        if (lastDateLabel) agendaItems += '</div>';
        agendaItems += '</div>';
      }

      // Render based on view mode
      if (calState.view === 'today' || calState.view === 'tomorrow') {
        var now3 = new Date();
        var todayDate = now3.getFullYear() + '-' + String(now3.getMonth() + 1).padStart(2, '0') + '-' + String(now3.getDate()).padStart(2, '0');
        var tom3 = new Date(now3.getTime() + 86400000);
        var tomDate = tom3.getFullYear() + '-' + String(tom3.getMonth() + 1).padStart(2, '0') + '-' + String(tom3.getDate()).padStart(2, '0');
        var dayContent = '';
        if (calState.view === 'today') {
          dayContent = calRenderDayDetail(todayDate, 'Today') + calRenderDayDetail(tomDate, 'Tomorrow');
        } else {
          dayContent = calRenderDayDetail(tomDate, 'Tomorrow');
        }
        dayContent += '<div style="margin-top:8px;"><button class="btn btn-ghost btn-sm" onclick="calShowCreate(&#39;' + (calState.view === 'today' ? todayDate : tomDate) + '&#39;)">+ Add event for ' + (calState.view === 'today' ? 'today' : 'tomorrow') + '</button></div>';
        c.innerHTML = toolbar + createForm + statusBar + dayContent + detailPanel;
      } else {
        c.innerHTML = toolbar + createForm + monthNav + statusBar + grid + agendaItems + detailPanel;
      }
    }

    function calNav(delta) {
      calState.month += delta;
      if (calState.month > 11) { calState.month = 0; calState.year++; }
      if (calState.month < 0) { calState.month = 11; calState.year--; }
      calState.selectedEvent = null;
      calLoadEvents();
    }

    function calGoToday() {
      var now = new Date();
      calState.year = now.getFullYear();
      calState.month = now.getMonth();
      calState.selectedEvent = null;
      calLoadEvents();
    }

    function calDayClick(day) {
      calState.selectedDay = day;
      calState.selectedEvent = null;
      renderCalendarView();
    }

    function calEventClick(e, eventId) {
      e.stopPropagation();
      var allEvts = calState.events.concat(calGetProjectEvents());
      calState.selectedEvent = allEvts.find(function (ev) { return ev.id === eventId; }) || null;
      renderCalendarView();
    }

    // Auto-init when calendar tab is activated
    var _calInitialized = false;
    var _origSwitchTab = null;
    (function () {
      var _origRender = window.renderCurrentView;
      window.renderCalendarView = window.renderCalendarView || function () { };
      // Hook into switchTab to init calendar on first activation
      var _origSwitch = window.switchTab;
      window.switchTab = function (tab) {
        _origSwitch(tab);
        if (tab === 'calendar' && !_calInitialized) {
          _calInitialized = true;
          calLoadStatus().then(function (res) {
            if (res.authenticated) { calLoadEvents(); } else { renderCalendarView(); }
          }).catch(function () { renderCalendarView(); });
        }
      };
    })();

    // ============================================================================
    // Email (FristonBlanket)
    // ============================================================================
    var emailState = {
      loading: false,
      agentMailConnected: false,
      agentMailInboxes: [],
      agentMailMessages: [],
      gmailConnected: false,
      gmailEmail: '',
      gmailAuthUrl: null,
      showCompose: false,
      composeTo: '',
      composeSubject: '',
      composeBody: '',
      composeProvider: 'agentmail',
      sending: false,
      error: null,
      gmailMessages: [],
      llmComposing: false,
      llmTemplate: '',
      llmBackend: 'ollama',
      llmProject: '',
      customPrompt: ''
    };

    var _emailInitialized = false;

    async function emailLoadStatus() {
      emailState.loading = true;
      renderEmailView();
      try {
        var amRes = await api('GET', '/api/email/agentmail/status');
        emailState.agentMailConnected = !!(amRes && amRes.connected);
        emailState.agentMailInboxes = (amRes && amRes.inboxes) || [];
      } catch (e) {
        emailState.agentMailConnected = false;
      }
      try {
        var gmRes = await api('GET', '/api/gmail/status');
        emailState.gmailConnected = !!(gmRes && gmRes.connected);
        emailState.gmailEmail = (gmRes && gmRes.email) || '';
        emailState.gmailAuthUrl = (gmRes && gmRes.auth_url) || null;
      } catch (e) {
        emailState.gmailConnected = false;
      }
      emailState.loading = false;
      renderEmailView();
      if (emailState.agentMailConnected) emailLoadMessages();
      if (emailState.gmailConnected) emailLoadGmailMessages();
    }

    async function emailLoadMessages() {
      try {
        var res = await api('GET', '/api/email/agentmail/messages?limit=10');
        emailState.agentMailMessages = (res && res.messages) || [];
        renderEmailView();
      } catch (e) {
        emailState.agentMailMessages = [];
      }
    }

    async function emailLoadGmailMessages() {
      try {
        var res = await api('GET', '/api/email/gmail/messages?limit=10');
        emailState.gmailMessages = (res && res.messages) || [];
        renderEmailView();
      } catch (e) {
        emailState.error = e.message || 'Failed to load Gmail messages';
        renderEmailView();
      }
    }

    async function emailSend() {
      if (!emailState.composeTo || !emailState.composeSubject) {
        toast('To and Subject are required', 'error');
        return;
      }
      emailState.sending = true;
      renderEmailView();
      try {
        var endpoint = emailState.composeProvider === 'gmail' ? '/api/email/gmail/send' : '/api/email/agentmail/send';
        var res = await api('POST', endpoint, {
          to: [emailState.composeTo],
          subject: emailState.composeSubject,
          text: emailState.composeBody
        });
        if (res && res.success) {
          toast('Email sent!', 'success');
          emailState.showCompose = false;
          emailState.composeTo = '';
          emailState.composeSubject = '';
          emailState.composeBody = '';
        } else {
          toast((res && res.error) || 'Send failed', 'error');
        }
      } catch (e) {
        toast('Send error: ' + e.message, 'error');
      }
      emailState.sending = false;
      renderEmailView();
    }

    function emailGmailConnect() {
      api('GET', '/api/gmail/auth').then(function (res) {
        if (res && res.error) { toast(res.error, 'error'); return; }
        if (res && res.auth_url) {
          window.open(res.auth_url, '_blank', 'width=500,height=650');
          setTimeout(function () {
            api('GET', '/api/gmail/status').then(function (r) {
              emailState.gmailConnected = !!(r && r.connected);
              emailState.gmailEmail = (r && r.email) || '';
              renderEmailView();
            });
          }, 5000);
        }
      }).catch(function (e) { toast('Auth error: ' + e.message, 'error'); });
    }

    async function emailGmailDisconnect() {
      if (!confirm('Disconnect Gmail? This will delete the stored OAuth token.')) return;
      await api('POST', '/api/gmail/disconnect');
      emailState.gmailConnected = false;
      emailState.gmailEmail = '';
      renderEmailView();
    }

    function emailGetHeader(msg, name) {
      var headers = (msg && msg.payload && msg.payload.headers) || (msg && msg.headers) || [];
      var h = headers.find(function (h) { return h.name && h.name.toLowerCase() === name.toLowerCase(); });
      return h ? h.value : '';
    }

    function emailMsgPreview(msg) {
      if (msg.snippet) return msg.snippet.substring(0, 100);
      if (msg.text) return msg.text.substring(0, 100);
      if (msg.body) return (typeof msg.body === 'string' ? msg.body : JSON.stringify(msg.body)).substring(0, 100);
      return '';
    }

    function renderEmailView() {
      var c = document.getElementById('content');
      if (!c) return;

      if (emailState.loading) {
        c.innerHTML = '<div style="padding:40px;text-align:center;color:var(--text-muted)">Loading email status...</div>';
        return;
      }

      // Error banner
      var errorBanner = '';
      if (emailState.error) {
        errorBanner = '<div style="margin-bottom:12px;padding:8px 12px;background:#fee2e2;border:1px solid #ef4444;border-radius:6px;color:#7f1d1d;">' + esc(emailState.error) + '</div>';
        emailState.error = null;
      }

      // Status row
      var amBadge = emailState.agentMailConnected
        ? '<span class="badge" style="background:#16a34a33;color:#22c55e;margin-right:8px;">&#x2714; AgentMail</span>'
        : '<span class="badge" style="background:#ef444433;color:#ef4444;margin-right:8px;">&#x2716; AgentMail (check AGENTMAIL_API_KEY)</span>';
      var gmBadge = emailState.gmailConnected
        ? '<span class="badge" style="background:#16a34a33;color:#22c55e;margin-right:8px;">&#x2714; Gmail (' + esc(emailState.gmailEmail) + ')</span>'
        : (emailState.gmailAuthUrl
          ? '<span class="badge" style="background:#ef444433;color:#ef4444;cursor:pointer;margin-right:8px;" onclick="emailGmailConnect()">&#x2716; Gmail — Click to Connect</span>'
          : '<span class="badge" style="background:#f59e0b33;color:#f59e0b;margin-right:8px;">&#9888; Gmail (set GMAIL_CLIENT_ID)</span>');

      var statusRow = '<div style="display:flex;align-items:center;gap:8px;padding:16px 0 8px;flex-wrap:wrap;">' +
        amBadge + gmBadge +
        '<span style="flex:1"></span>' +
        '<button class="btn btn-ghost btn-sm" onclick="emailLoadStatus()" style="font-size:0.78rem;">&#x21bb; Refresh</button>' +
        (emailState.gmailConnected ? '<button class="btn btn-ghost btn-sm" onclick="emailGmailDisconnect()" style="color:var(--text-muted);font-size:0.78rem;">Disconnect Gmail</button>' : '') +
        '</div>';

      // ── LLM Compose Toolbar ──
      var projectOptions = '<option value="">(all projects)</option>';
      (state.projects || []).concat(state.orphan_projects || []).forEach(function (p) {
        var sel = emailState.llmProject === p.slug ? ' selected' : '';
        projectOptions += '<option value="' + esc(p.slug) + '"' + sel + '>' + esc(p.title || p.slug) + '</option>';
      });

      var composingClass = emailState.llmComposing ? ' composing' : '';
      var composeToolbar = '<div class="email-compose-toolbar">' +
        '<span class="toolbar-label">AI Compose</span>' +
        '<button class="btn-template' + composingClass + '" onclick="emailLlmCompose(' + "'daily-schedule'" + ')" title="Generate a daily schedule summary from calendar events and active tasks">' +
        '<span class="template-icon">📅</span> Daily Schedule</button>' +
        '<button class="btn-template' + composingClass + '" onclick="emailLlmCompose(' + "'all-projects'" + ')" title="Generate a cross-project status summary email">' +
        '<span class="template-icon">📊</span> All Projects</button>' +
        '<button class="btn-template' + composingClass + '" onclick="emailLlmCompose(' + "'project-summary'" + ')" title="Generate a status update email for a specific project">' +
        '<span class="template-icon">🎯</span> Project Update</button>' +
        '<button class="btn-template' + composingClass + '" onclick="emailLlmCompose(' + "'interview-followup'" + ')" title="Generate an interview follow-up email">' +
        '<span class="template-icon">🎤</span> Interview</button>' +
        '<button class="btn-template' + composingClass + '" onclick="emailLlmComposeCustom()" title="Write a custom prompt for the LLM to compose an email">' +
        '<span class="template-icon">✉️</span> Custom</button>' +
        '<div class="toolbar-divider"></div>' +
        '<select class="toolbar-select" onchange="emailState.llmProject=this.value" title="Select project for project-specific templates">' + projectOptions + '</select>' +
        '<select class="toolbar-select" onchange="emailState.llmBackend=this.value" title="Select LLM backend">' +
        '<option value="ollama"' + (emailState.llmBackend === 'ollama' ? ' selected' : '') + '>🦙 Ollama</option>' +
        '<option value="claude"' + (emailState.llmBackend === 'claude' ? ' selected' : '') + '>🤖 Claude</option>' +
        '<option value="gemini"' + (emailState.llmBackend === 'gemini' ? ' selected' : '') + '>💎 Gemini</option>' +
        '</select>' +
        '</div>';

      // Composing indicator
      var composingIndicator = '';
      if (emailState.llmComposing) {
        composingIndicator = '<div class="llm-composing-indicator">' +
          '<div class="spinner"></div>' +
          '<span style="font-size:13px;color:var(--text);">Composing email via <strong>' + esc(emailState.llmBackend) + '</strong> using <em>' + esc(emailState.llmTemplate.replace(/-/g, ' ')) + '</em> template...</span>' +
          '</div>';
      }

      // Compose panel
      var composeBtn = '<button class="btn btn-primary btn-sm" onclick="emailState.showCompose=!emailState.showCompose;renderEmailView();" style="margin-bottom:12px;">+ Compose</button>';

      var composePanel = '';
      if (emailState.showCompose) {
        composePanel = '<div style="background:var(--panel);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-bottom:16px;">' +
          '<div style="font-weight:600;margin-bottom:12px;color:var(--text);">New Email</div>' +
          '<div style="display:grid;gap:8px;">' +
          '<input id="email-to" type="email" placeholder="To" value="' + esc(emailState.composeTo) + '" oninput="emailState.composeTo=this.value" style="width:100%;">' +
          '<input id="email-subject" type="text" placeholder="Subject" value="' + esc(emailState.composeSubject) + '" oninput="emailState.composeSubject=this.value" style="width:100%;">' +
          '<textarea id="email-body" placeholder="Message..." rows="8" oninput="emailState.composeBody=this.value" style="width:100%;resize:vertical;font-family:inherit;line-height:1.5;">' + esc(emailState.composeBody) + '</textarea>' +
          '<div style="display:flex;align-items:center;gap:8px;">' +
          '<select onchange="emailState.composeProvider=this.value" style="flex:0 0 auto;"><option value="agentmail"' + (emailState.composeProvider === 'agentmail' ? ' selected' : '') + '>AgentMail</option><option value="gmail"' + (emailState.composeProvider === 'gmail' ? ' selected' : '') + '>Gmail</option></select>' +
          '<button class="btn btn-primary btn-sm" onclick="emailSend()" ' + (emailState.sending ? 'disabled' : '') + '>' + (emailState.sending ? 'Sending...' : 'Send') + '</button>' +
          '<button class="btn btn-ghost btn-sm" onclick="emailState.showCompose=false;renderEmailView();">Cancel</button>' +
          '</div></div></div>';
      }

      // Inbox panel (AgentMail messages)
      var inboxPanel = '';
      if (emailState.agentMailConnected) {
        var msgRows = '';
        if (emailState.agentMailMessages.length === 0) {
          msgRows = '<div style="color:var(--text-muted);padding:16px;text-align:center;">No messages</div>';
        } else {
          msgRows = emailState.agentMailMessages.map(function (msg) {
            var from = esc(msg.from || emailGetHeader(msg, 'from') || '—');
            var subject = esc(msg.subject || emailGetHeader(msg, 'subject') || '(no subject)');
            var date = esc(msg.created_at || msg.date || emailGetHeader(msg, 'date') || '');
            var preview = esc(emailMsgPreview(msg));
            return '<div style="padding:12px 0;border-bottom:1px solid var(--border);">' +
              '<div style="display:flex;justify-content:space-between;margin-bottom:4px;">' +
              '<span style="font-weight:500;color:var(--text);">' + subject + '</span>' +
              '<span style="font-size:0.75rem;color:var(--text-muted);">' + date + '</span>' +
              '</div>' +
              '<div style="font-size:0.82rem;color:var(--text-muted);margin-bottom:4px;">From: ' + from + '</div>' +
              (preview ? '<div style="font-size:0.82rem;color:var(--text-dim);">' + preview + '…</div>' : '') +
              '</div>';
          }).join('');
        }
        inboxPanel = '<div style="background:var(--panel);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;">' +
          '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">' +
          '<span style="font-weight:600;color:var(--text);">AgentMail Inbox</span>' +
          '<button class="btn btn-ghost btn-sm" onclick="emailLoadMessages()" style="font-size:0.78rem;">&#x21bb; Reload</button>' +
          '</div>' + msgRows + '</div>';
      } else {
        inboxPanel = '<div style="background:var(--panel);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;text-align:center;color:var(--text-muted);">' +
          '<div style="font-size:1rem;margin-bottom:8px;">AgentMail not connected</div>' +
          '<div style="font-size:0.85rem;">Set <code>AGENTMAIL_API_KEY</code> in your .env and restart the server.</div>' +
          '</div>';
      }

      // Gmail inbox panel
      var gmailPanel = '';
      if (emailState.gmailConnected) {
        var gmailRows = '';
        if (emailState.gmailMessages.length === 0) {
          gmailRows = '<div style="color:var(--text-muted);padding:16px;text-align:center;">No messages</div>';
        } else {
          gmailRows = emailState.gmailMessages.map(function (m) {
            var from = esc(emailGetHeader(m, 'From') || '');
            var subj = esc(emailGetHeader(m, 'Subject') || '(no subject)');
            var date = esc(emailGetHeader(m, 'Date') || '');
            return '<div style="padding:12px 0;border-bottom:1px solid var(--border);">' +
              '<div style="display:flex;justify-content:space-between;margin-bottom:4px;">' +
              '<span style="font-weight:500;color:var(--text);">' + subj + '</span>' +
              '<span style="font-size:0.75rem;color:var(--text-muted);">' + date + '</span>' +
              '</div>' +
              '<div style="font-size:0.82rem;color:var(--text-muted);">From: ' + from + '</div>' +
              '</div>';
          }).join('');
        }
        gmailPanel = '<div style="background:var(--panel);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-top:12px;">' +
          '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">' +
          '<span style="font-weight:600;color:var(--text);">Gmail Inbox</span>' +
          '<button class="btn btn-ghost btn-sm" onclick="emailLoadGmailMessages()" style="font-size:0.78rem;">&#x21bb; Reload</button>' +
          '</div>' + gmailRows + '</div>';
      }

      c.innerHTML = errorBanner + statusRow + composeToolbar + composingIndicator + composeBtn + composePanel + inboxPanel + gmailPanel;
    }

    // LLM Email Compose
    async function emailLlmCompose(template) {
      if (emailState.llmComposing) return;
      emailState.llmComposing = true;
      emailState.llmTemplate = template;
      renderEmailView();
      toast('Composing email via ' + emailState.llmBackend + '...', 'info');

      try {
        var res = await api('POST', '/api/email/compose', {
          template: template,
          project: emailState.llmProject,
          backend: emailState.llmBackend,
          prompt: emailState.customPrompt
        });

        if (res && res.success) {
          emailState.showCompose = true;
          emailState.composeSubject = res.subject || '';
          emailState.composeBody = res.body || '';
          if (res.to) emailState.composeTo = res.to;
          toast('Email composed! Review and send.', 'success');
        } else {
          toast('Compose failed: ' + ((res && res.error) || 'Unknown error'), 'error');
        }
      } catch (e) {
        toast('Compose error: ' + e.message, 'error');
      }

      emailState.llmComposing = false;
      emailState.customPrompt = '';
      renderEmailView();
    }

    function emailLlmComposeCustom() {
      var prompt = window.prompt('Enter your email prompt (e.g., "Write a thank-you email for the team meeting about Q1 goals"):');
      if (!prompt || !prompt.trim()) return;
      emailState.customPrompt = prompt.trim();
      emailLlmCompose('custom');
    }

    // ============================================================================
    // Bike Ride (Awaiting-reply threads with LLM summaries + TTS audio)
    // ============================================================================
    var bikeRideState = {
      threads: [],
      loading: false,
      error: null,
      audioCache: {},
      loadingAudio: {},
      playingAudio: null,
      backend: 'gemini',
      model: 'qwen3:4b',
      sendingDraft: {},
      sentDraft: {},
      // Voice Reply State
      recording: {},
      voiceDraft: {},
      improving: {},
      recognition: null
    };

    var _bikeRideInitialized = false;

    async function bikeRideLoad() {
      bikeRideState.loading = true;
      bikeRideState.error = null;
      renderBikeRideView();
      toast('Loading unanswered threads... (this may take a moment for LLM summaries)', 'info');

      try {
        var res = await api('POST', '/api/bikeride/load', {
          backend: bikeRideState.backend,
          model: bikeRideState.model
        });
        if (res && res.success) {
          bikeRideState.threads = res.threads || [];
          toast('Found ' + bikeRideState.threads.length + ' unanswered thread' + (bikeRideState.threads.length === 1 ? '' : 's'), 'success');
        } else {
          bikeRideState.error = (res && res.error) || 'Failed to load threads';
          toast('Load failed: ' + bikeRideState.error, 'error');
        }
      } catch (e) {
        bikeRideState.error = e.message || 'Network error';
        toast('Load error: ' + bikeRideState.error, 'error');
      }

      bikeRideState.loading = false;
      renderBikeRideView();
    }

    async function bikeRideTts(threadId, summaryText) {
      if (bikeRideState.audioCache[threadId]) {
        // Already cached — just play
        bikeRidePlayAudio(threadId);
        return;
      }

      bikeRideState.loadingAudio[threadId] = true;
      renderBikeRideView();

      try {
        var res = await api('POST', '/api/bikeride/tts', { text: summaryText, threadId: threadId });
        if (res && res.success && res.audioUrl) {
          bikeRideState.audioCache[threadId] = res.audioUrl;
          bikeRidePlayAudio(threadId);
        } else {
          toast('TTS failed: ' + ((res && res.error) || 'Unknown error'), 'error');
        }
      } catch (e) {
        toast('TTS error: ' + e.message, 'error');
      }

      bikeRideState.loadingAudio[threadId] = false;
      renderBikeRideView();
    }

    function bikeRidePlayAudio(threadId) {
      // Stop any currently playing audio
      if (bikeRideState.playingAudio) {
        try { bikeRideState.playingAudio.pause(); } catch (e) { }
        bikeRideState.playingAudio = null;
      }

      var url = bikeRideState.audioCache[threadId];
      if (!url) return;

      var audio = new Audio(url);
      bikeRideState.playingAudio = audio;
      audio.play().catch(function (e) {
        toast('Audio playback failed: ' + e.message, 'error');
      });
      audio.onended = function () {
        bikeRideState.playingAudio = null;
        renderBikeRideView();
      };
      renderBikeRideView();
    }

    function bikeRideStopAudio() {
      if (bikeRideState.playingAudio) {
        bikeRideState.playingAudio.pause();
        bikeRideState.playingAudio.currentTime = 0;
        bikeRideState.playingAudio = null;
        renderBikeRideView();
      }
    }

    function bikeRideTtsByIndex(idx) {
      var t = (window._bikeRideThreads || [])[idx];
      if (t) bikeRideTts(t.id, t.summary || '');
    }

    function bikeRideTtsDraft(idx, draftIdx) {
      var t = (window._bikeRideThreads || [])[idx];
      if (t && t.drafts && t.drafts[draftIdx]) {
        var draft = t.drafts[draftIdx];
        var cacheKey = t.id + '_draft_' + draftIdx;
        bikeRideTts(cacheKey, draft.text || '');
      }
    }

    async function bikeRideSend(idx, draftIdx) {
      var t = (window._bikeRideThreads || [])[idx];
      if (!t || !t.drafts || !t.drafts[draftIdx]) return;

      var draft = t.drafts[draftIdx];
      var sendKey = t.id + '_' + draftIdx;
      if (bikeRideState.sendingDraft[sendKey]) return;

      if (!confirm('Send this reply? -- ' + draft.text.substring(0, 80) + '...')) return;

      bikeRideState.sendingDraft[sendKey] = true;
      renderBikeRideView();

      try {
        var res = await api('POST', '/api/bikeride/send', {
          threadId: t.id,
          to: t.replyTo || t.lastReplyFrom,
          subject: t.threadSubject || t.subject,
          text: draft.text
        });
        if (res && res.success) {
          bikeRideState.sentDraft[sendKey] = true;
          toast('Reply sent successfully!', 'success');
        } else {
          toast('Send failed: ' + ((res && res.error) || 'Unknown error'), 'error');
        }
      } catch (e) {
        toast('Send error: ' + e.message, 'error');
      }

      bikeRideState.sendingDraft[sendKey] = false;
      renderBikeRideView();
    }

    // ---- Voice Reply STT ----

    function bikeRideToggleMic(idx) {
      var t = (window._bikeRideThreads || [])[idx];
      if (!t) return;

      if (bikeRideState.recording[t.id]) {
        bikeRideStopMic(t.id);
      } else {
        bikeRideStartMic(t.id);
      }
    }

    function bikeRideStartMic(threadId) {
      if (bikeRideState.recording[threadId]) return;

      var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) {
        toast('Speech recognition is not supported in this browser.', 'error');
        return;
      }

      if (bikeRideState.recognition) {
        try { bikeRideState.recognition.stop(); } catch (e) { }
      }

      var recognition = new SpeechRecognition();
      recognition.continuous = true;
      recognition.interimResults = true;
      recognition.lang = 'en-US';

      recognition.onstart = function () {
        bikeRideState.recording[threadId] = true;
        renderBikeRideView();
        toast('Microphone listening...', 'info');
      };

      recognition.onresult = function (event) {
        var interimTranscript = '';
        var finalTranscript = '';

        for (var i = event.resultIndex; i < event.results.length; ++i) {
          if (event.results[i].isFinal) {
            finalTranscript += event.results[i][0].transcript;
          } else {
            interimTranscript += event.results[i][0].transcript;
          }
        }

        if (finalTranscript) {
          var current = bikeRideState.voiceDraft[threadId] || '';
          bikeRideState.voiceDraft[threadId] = current + (current && !current.endsWith(' ') ? ' ' : '') + finalTranscript;
        }

        // Update the textarea live with current state + interim
        var textarea = document.getElementById('bikeride-draft-' + threadId);
        if (textarea) {
          var base = bikeRideState.voiceDraft[threadId] || '';
          textarea.value = base + (base && interimTranscript && !base.endsWith(' ') ? ' ' : '') + interimTranscript;
        }
      };

      recognition.onerror = function (event) {
        bikeRideState.recording[threadId] = false;
        renderBikeRideView();
        if (event.error !== 'no-speech') {
          toast('Microphone error: ' + event.error, 'error');
        }
      };

      recognition.onend = function () {
        bikeRideState.recording[threadId] = false;
        renderBikeRideView();
      };

      bikeRideState.recognition = recognition;

      try {
        recognition.start();
      } catch (e) {
        toast('Could not start microphone: ' + e.message, 'error');
      }
    }

    function bikeRideStopMic(threadId) {
      if (bikeRideState.recognition && bikeRideState.recording[threadId]) {
        bikeRideState.recognition.stop();
      }
      bikeRideState.recording[threadId] = false;
      renderBikeRideView();
    }

    function bikeRideUpdateVoiceDraft(threadId, val) {
      bikeRideState.voiceDraft[threadId] = val;
    }

    async function bikeRideImprove(idx) {
      var t = (window._bikeRideThreads || [])[idx];
      if (!t) return;
      var draft = bikeRideState.voiceDraft[t.id] || '';
      if (!draft.trim()) {
        toast('Nothing to improve yet. Speak or type a draft first.', 'error');
        return;
      }

      bikeRideState.improving[t.id] = true;
      renderBikeRideView();

      try {
        var res = await api('POST', '/api/bikeride/improve', {
          draft: draft,
          threadContext: t.rawText || '',
          backend: bikeRideState.backend,
          model: bikeRideState.model
        });

        if (res && res.success) {
          bikeRideState.voiceDraft[t.id] = res.improved;
          toast('Draft improved via LLM!', 'success');
        } else {
          toast('Improve failed: ' + ((res && res.error) || 'Unknown error'), 'error');
        }
      } catch (e) {
        toast('Improve error: ' + e.message, 'error');
      }

      bikeRideState.improving[t.id] = false;
      renderBikeRideView();
    }

    async function bikeRideSendVoiceDraft(idx) {
      var t = (window._bikeRideThreads || [])[idx];
      if (!t) return;
      var draft = bikeRideState.voiceDraft[t.id] || '';
      if (!draft.trim()) {
        toast('Draft is empty!', 'error');
        return;
      }

      var sendKey = 'voice_' + t.id;
      if (bikeRideState.sendingDraft[sendKey]) return;

      if (!confirm('Send this voice-drafted reply?')) return;

      bikeRideState.sendingDraft[sendKey] = true;
      renderBikeRideView();

      try {
        var res = await api('POST', '/api/bikeride/send', {
          threadId: t.id,
          to: t.replyTo || t.lastReplyFrom,
          subject: t.threadSubject || t.subject,
          text: draft
        });
        if (res && res.success) {
          bikeRideState.sentDraft[sendKey] = true;
          toast('Voice reply sent successfully!', 'success');
        } else {
          toast('Send failed: ' + ((res && res.error) || 'Unknown error'), 'error');
        }
      } catch (e) {
        toast('Send error: ' + e.message, 'error');
      }

      bikeRideState.sendingDraft[sendKey] = false;
      renderBikeRideView();
    }

    function renderBikeRideView() {
      var c = document.getElementById('content');
      if (!c) return;

      if (bikeRideState.loading) {
        c.innerHTML = '<div style="padding:60px;text-align:center;">' +
          '<div class="spinner" style="width:32px;height:32px;border:3px solid var(--border);border-top-color:#22c55e;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px;"></div>' +
          '<div style="color:var(--text-dim);font-size:14px;">Loading unanswered threads and generating summaries...</div>' +
          '<div style="color:var(--text-muted);font-size:12px;margin-top:8px;">This may take a minute if there are many threads to summarize.</div>' +
          '</div>';
        return;
      }

      // Error banner
      var errorBanner = '';
      if (bikeRideState.error) {
        errorBanner = '<div style="margin-bottom:12px;padding:10px 14px;background:#fee2e2;border:1px solid #ef4444;border-radius:8px;color:#7f1d1d;font-size:13px;">' +
          esc(bikeRideState.error) + '</div>';
      }

      // Header
      var header = '<div class="bikeride-header">' +
        '<h2>\ud83d\udeb4 Bike Ride Briefing <span class="thread-count">(' + bikeRideState.threads.length + ' thread' + (bikeRideState.threads.length === 1 ? '' : 's') + ' awaiting reply)</span></h2>' +
        '<div style="display:flex;align-items:center;gap:12px;">' +
        '<div class="bikeride-llm-select">' +
        '<label>Summarize via:</label>' +
        '<select class="toolbar-select" onchange="bikeRideState.backend=this.value" style="min-width:110px;">' +
        '<option value="ollama"' + (bikeRideState.backend === 'ollama' ? ' selected' : '') + '>\ud83e\udd99 Ollama</option>' +
        '<option value="claude"' + (bikeRideState.backend === 'claude' ? ' selected' : '') + '>\ud83e\udd16 Claude</option>' +
        '<option value="gemini"' + (bikeRideState.backend === 'gemini' ? ' selected' : '') + '>\ud83d\udc8e Gemini</option>' +
        '</select>' +
        '</div>' +
        (bikeRideState.playingAudio ? '<button class="btn btn-danger btn-sm" onclick="bikeRideStopAudio()">\u23f9 Stop Audio</button>' : '') +
        '<button class="btn btn-primary btn-sm" onclick="bikeRideLoad()">\u21bb Reload</button>' +
        '</div>' +
        '</div>';

      // Thread cards
      var threadCards = '';
      if (bikeRideState.threads.length === 0) {
        threadCards = '<div class="bikeride-empty">' +
          '<h3>\ud83c\udf89 All caught up!</h3>' +
          '<p>No unanswered email threads found. Enjoy your ride!</p>' +
          '</div>';
      } else {
        // Store summaries in a lookup so onclick can reference by index
        window._bikeRideThreads = bikeRideState.threads;
        bikeRideState.threads.forEach(function (t, idx) {
          var isLoadingAudio = bikeRideState.loadingAudio[t.id];
          var hasCachedAudio = !!bikeRideState.audioCache[t.id];
          var playBtnClass = 'bikeride-play-btn' + (isLoadingAudio ? ' loading' : '');
          var playBtnText = isLoadingAudio
            ? '<div class="spinner" style="width:14px;height:14px;border:2px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 1s linear infinite;"></div> Generating...'
            : (hasCachedAudio
              ? '<span class="play-icon">\u25b6</span> Play Summary'
              : '<span class="play-icon">\ud83d\udd0a</span> Listen');

          var dateStr = t.lastReplyDate ? new Date(t.lastReplyDate).toLocaleString() : '';

          // Build draft response cards
          var draftsHtml = '';
          if (t.drafts && t.drafts.length > 0) {
            draftsHtml = '<div class="bikeride-drafts">';
            t.drafts.forEach(function (d, di) {
              var labelClass = 'bikeride-draft-label label-' + d.label.toLowerCase();
              var sendKey = t.id + '_' + di;
              var isSending = bikeRideState.sendingDraft[sendKey];
              var isSent = bikeRideState.sentDraft[sendKey];
              var sendBtnClass = 'bikeride-send-btn' + (isSent ? ' sent' : (isSending ? ' sending' : ''));
              var sendBtnText = isSent ? '\u2714 Sent' : (isSending ? 'Sending...' : '\u2709 Send ' + d.label);

              // TTS for draft
              var draftAudioKey = t.id + '_draft_' + di;
              var isDraftAudioLoading = bikeRideState.loadingAudio[draftAudioKey];
              var hasDraftAudio = !!bikeRideState.audioCache[draftAudioKey];
              var listenText = isDraftAudioLoading ? '...' : (hasDraftAudio ? '\u25b6' : '\ud83d\udd0a');

              draftsHtml += '<div class="bikeride-draft">' +
                '<div class="' + labelClass + '">' + esc(d.label) + '</div>' +
                '<div class="bikeride-draft-title">' + esc(d.title) + '</div>' +
                '<div class="bikeride-draft-text">' + esc(d.text) + '</div>' +
                '<div class="bikeride-draft-actions">' +
                '<button class="' + sendBtnClass + '" onclick="bikeRideSend(' + idx + ',' + di + ')">' + sendBtnText + '</button>' +
                '<button class="bikeride-listen-btn" onclick="bikeRideTtsDraft(' + idx + ',' + di + ')">' + listenText + ' Listen</button>' +
                '</div>' +
                '</div>';
            });
            draftsHtml += '</div>';
          }

          // Build Voice Panel
          var isRecording = bikeRideState.recording[t.id];
          var isImproving = bikeRideState.improving[t.id];
          var voiceSendKey = 'voice_' + t.id;
          var isVoiceSending = bikeRideState.sendingDraft[voiceSendKey];
          var isVoiceSent = bikeRideState.sentDraft[voiceSendKey];
          var voiceDraftText = bikeRideState.voiceDraft[t.id] || '';

          var voicePanelHtml = '<div class="bikeride-voice-panel' + (isRecording ? ' recording' : '') + '">' +
            '<div class="bikeride-voice-header">' +
            '<div class="bikeride-voice-title"><span style="font-size:14px;">🎤</span> Voice Reply</div>' +
            '<button class="bikeride-mic-btn' + (isRecording ? ' recording' : '') + '" onclick="bikeRideToggleMic(' + idx + ')" title="' + (isRecording ? 'Stop Recording' : 'Start Dictation') + '">' +
            (isRecording ? '⬛' : '🎙️') +
            '</button>' +
            '</div>' +
            '<textarea id="bikeride-draft-' + t.id + '" class="bikeride-draft-textarea" placeholder="Click the microphone to start dictating your reply, or type here..." oninput="bikeRideUpdateVoiceDraft(\'' + t.id + '\', this.value)">' + esc(voiceDraftText) + '</textarea>' +
            '<div class="bikeride-voice-actions">' +
            '<button class="bikeride-improve-btn' + (isImproving ? ' improving' : '') + '" onclick="bikeRideImprove(' + idx + ')">' +
            (isImproving ? '<div class="spinner" style="width:12px;height:12px;border:2px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 1s linear infinite;"></div> Polishing...' : '<span class="sparkle">✨</span> Improve w/ Context') +
            '</button>' +
            '<button class="bikeride-voice-send' + (isVoiceSent ? ' sent' : (isVoiceSending ? ' sending' : '')) + '" onclick="bikeRideSendVoiceDraft(' + idx + ')">' +
            (isVoiceSent ? '✔ Sent' : (isVoiceSending ? 'Sending...' : '📨 Send Reply')) +
            '</button>' +
            '</div>' +
            '</div>';

          threadCards += '<div class="bikeride-card">' +
            '<div class="bikeride-card-header">' +
            '<div class="bikeride-card-subject">' + esc(t.subject) + '</div>' +
            '<div class="bikeride-card-date">' + esc(dateStr) + '</div>' +
            '</div>' +
            '<div class="bikeride-card-from">Last reply from: <strong>' + esc(t.lastReplyFrom) + '</strong></div>' +
            '<div class="bikeride-summary">' + esc(t.summary || '(no summary)') + '</div>' +
            '<button class="' + playBtnClass + '" onclick="bikeRideTtsByIndex(' + idx + ')">' +
            playBtnText + '</button>' +
            draftsHtml +
            voicePanelHtml +
            '</div>';
        });
      }

      c.innerHTML = errorBanner + header + threadCards;
    }

    // Auto-init when email or bikeride tab is first activated
    (function () {
      var _origSwitch2 = window.switchTab;
      window.switchTab = function (tab) {
        _origSwitch2(tab);
        if (tab === 'email' && !_emailInitialized) {
          _emailInitialized = true;
          emailLoadStatus();
        }
        if (tab === 'bikeride' && !_bikeRideInitialized) {
          _bikeRideInitialized = true;
          bikeRideLoad();
        }
      };
    })();

    // ============================================================================
    // Init
    // ============================================================================
    connectWS();
    refreshData();
  </script>
</body>
