    // Inline editing
    function startEditing(td, entityType, slug, fieldName, currentValue, inputType, optionsStr) {
      if (editingCell) {
        if (editingCell.td === td) return;
        cancelEditing();
      }
      editingCell = { td: td, entityType: entityType, slug: slug, fieldName: fieldName, originalHTML: td.innerHTML };
      td.classList.add('editing');

      if (inputType === 'select') {
        var options = (optionsStr || '').split(',');
        var html = '<select onchange="commitEditing(this.value)" onkeydown="if(event.key===\'Escape\')cancelEditing()">';
        for (var i = 0; i < options.length; i++) {
          html += '<option value="' + options[i] + '"' + (options[i] === currentValue ? ' selected' : '') + '>' + options[i] + '</option>';
        }
        html += '</select>';
        td.innerHTML = html;
        td.querySelector('select').focus();
      } else if (inputType === 'date') {
        td.innerHTML = '<input type="date" value="' + esc(currentValue || '') + '" onblur="commitEditing(this.value)" onkeydown="if(event.key===\'Enter\')commitEditing(this.value);if(event.key===\'Escape\')cancelEditing()">';
        td.querySelector('input').focus();
      } else {
        td.innerHTML = '<input type="text" value="' + esc(currentValue || '') + '" onblur="commitEditing(this.value)" onkeydown="if(event.key===\'Enter\')commitEditing(this.value);if(event.key===\'Escape\')cancelEditing()">';
        var inp = td.querySelector('input');
        inp.focus();
        inp.select();
      }
    }

    function startTaskSectionEdit(td, projectSlug, taskTitle, currentSection) {
      if (editingCell) {
        if (editingCell.td === td) return;
        cancelEditing();
      }
      editingCell = { td: td, entityType: 'task', slug: projectSlug, fieldName: 'moveTo', taskTitle: taskTitle, originalHTML: td.innerHTML };
      td.classList.add('editing');
      var sections = ['backlog', 'up_next', 'in_progress', 'completed', 'blocked'];
      var html = '<select onchange="commitTaskEditing(this.value)" onkeydown="if(event.key===\'Escape\')cancelEditing()">';
      for (var i = 0; i < sections.length; i++) {
        html += '<option value="' + sections[i] + '"' + (sections[i] === currentSection ? ' selected' : '') + '>' + sections[i] + '</option>';
      }
      html += '</select>';
      td.innerHTML = html;
      td.querySelector('select').focus();
    }

    function startTaskFieldEdit(td, projectSlug, taskTitle, fieldName, currentValue) {
      if (editingCell) {
        if (editingCell.td === td) return;
        cancelEditing();
      }
      editingCell = { td: td, entityType: 'task', slug: projectSlug, fieldName: fieldName, taskTitle: taskTitle, originalHTML: td.innerHTML };
      td.classList.add('editing');
      if (fieldName === 'priority') {
        var options = ['HIGH', 'MEDIUM', 'LOW'];
        var html = '<select onchange="commitTaskEditing(this.value)" onkeydown="if(event.key===\'Escape\')cancelEditing()">';
        html += '<option value="">-</option>';
        for (var i = 0; i < options.length; i++) {
          html += '<option value="' + options[i] + '"' + (options[i] === currentValue ? ' selected' : '') + '>' + options[i] + '</option>';
        }
        html += '</select>';
        td.innerHTML = html;
        td.querySelector('select').focus();
      }
    }

    function startTaskDateEdit(td, projectSlug, taskTitle, currentValue) {
      if (editingCell) {
        if (editingCell.td === td) return;
        cancelEditing();
      }
      editingCell = { td: td, entityType: 'task', slug: projectSlug, fieldName: 'due', taskTitle: taskTitle, originalHTML: td.innerHTML };
      td.classList.add('editing');
      td.innerHTML = '<input type="date" value="' + esc(currentValue || '') + '" onblur="commitTaskEditing(this.value)" onkeydown="if(event.key===\'Enter\')commitTaskEditing(this.value);if(event.key===\'Escape\')cancelEditing()">';
      td.querySelector('input').focus();
    }

    async function commitEditing(newValue) {
      if (!editingCell) return;
      var ec = editingCell;
      editingCell = null;
      ec.td.classList.remove('editing');

      var body = {};
      body[ec.fieldName] = newValue;

      try {
        if (ec.entityType === 'mission') {
          await api('PUT', '/api/missions/' + ec.slug, body);
        } else if (ec.entityType === 'project') {
          await api('PUT', '/api/projects/' + ec.slug, body);
        }
        toast('Updated ' + ec.fieldName);
        refreshData();
      } catch (err) {
        toast('Update failed', 'error');
        ec.td.innerHTML = ec.originalHTML;
      }
    }

    async function commitTaskEditing(newValue) {
      if (!editingCell) return;
      var ec = editingCell;
      editingCell = null;
      ec.td.classList.remove('editing');

      var body = {};
      body[ec.fieldName] = newValue;

      try {
        await api('PUT', '/api/tasks/' + encodeURIComponent(ec.slug) + '/' + encodeURIComponent(ec.taskTitle), body);
        toast('Task updated');
        refreshData();
      } catch (err) {
        toast('Update failed', 'error');
        ec.td.innerHTML = ec.originalHTML;
      }
    }

    function cancelEditing() {
      if (!editingCell) return;
      editingCell.td.classList.remove('editing');
      editingCell.td.innerHTML = editingCell.originalHTML;
      editingCell = null;
    }

    // ============================================================================
    // Tab 2: Network (Force-Directed Graph)
    // ============================================================================
    function renderNetworkView() {
      var c = document.getElementById('content');
      c.innerHTML = '<div class="network-container" id="network-box">' +
        '<canvas id="network-canvas"></canvas>' +
        '<div class="network-controls">' +
        '<button onclick="resetNetworkLayout()">Reset Layout</button>' +
        '<button onclick="unpinAllNodes()">Unpin All</button>' +
        '<button id="btn-labels" class="' + (showLabels ? 'active' : '') + '" onclick="toggleLabels()">Labels</button>' +
        '<button id="btn-tasks" class="' + (showTasks ? 'active' : '') + '" onclick="toggleTasks()">Tasks</button>' +
        '</div>' +
        '<div class="network-legend">' +
        '<div class="network-legend-title">Legend</div>' +
        '<div class="network-legend-item"><div class="network-legend-dot" style="background:#3b82f6"></div>Mission</div>' +
        '<div class="network-legend-item"><div class="network-legend-dot" style="background:#06b6d4"></div>Project (Active)</div>' +
        '<div class="network-legend-item"><div class="network-legend-dot" style="background:#22c55e"></div>Project (Completed)</div>' +
        '<div class="network-legend-item"><div class="network-legend-dot" style="background:#94a3b8"></div>Task</div>' +
        '</div>' +
        '<div class="network-tooltip" id="network-tooltip"><h4 id="tt-title"></h4><p id="tt-type"></p><p id="tt-status"></p><p id="tt-detail"></p><p id="tt-extra1"></p><p id="tt-extra2"></p><p id="tt-extra3"></p></div>' +
        '</div>';
    }

    function initNetwork() {
      var canvas = document.getElementById('network-canvas');
      if (!canvas) return;
      var box = document.getElementById('network-box');
      var W = box.clientWidth;
      var H = box.clientHeight;
      // Retry if dimensions not yet established (layout race condition)
      if (W < 100 || H < 100) {
        setTimeout(initNetwork, 150);
        return;
      }
      canvas.width = W;
      canvas.height = H;
      var ctx = canvas.getContext('2d');

      // Build nodes and edges
      var nodes = [];
      var edges = [];
      var nodeMap = {};

      // --- Hierarchical initial layout: missions in a ring, projects orbit their mission ---
      var missions = state.missions || [];
      var mCount = missions.length || 1;
      for (var i = 0; i < missions.length; i++) {
        var m = missions[i];
        var angle = (2 * Math.PI * i) / mCount;
        var ringR = Math.min(W, H) * 0.3;
        var n = {
          id: 'm-' + m.id, type: 'mission', label: m.title || m.id, status: m.status, priority: m.priority, data: m, pinned: false,
          x: W / 2 + Math.cos(angle) * ringR, y: H / 2 + Math.sin(angle) * ringR, vx: 0, vy: 0, radius: 30
        };
        nodes.push(n);
        nodeMap[n.id] = n;
      }

      var prjs = allProjects();
      for (var j = 0; j < prjs.length; j++) {
        var p = prjs[j];
        var color = p.status === 'COMPLETED' ? '#22c55e' : (p.status === 'BLOCKED' ? '#ef4444' : (p.status === 'PAUSED' ? '#64748b' : '#06b6d4'));
        // Position projects near their parent mission
        var parentMissionNode = null;
        for (var mi = 0; mi < missions.length; mi++) {
          var linked = missions[mi].linked_projects || [];
          if (linked.indexOf(p.id) !== -1) {
            parentMissionNode = nodeMap['m-' + missions[mi].id];
            edges.push({ source: 'm-' + missions[mi].id, target: 'p-' + p.id });
          }
        }
        var px = parentMissionNode ? parentMissionNode.x + (Math.random() - 0.5) * 120 : W / 2 + (Math.random() - 0.5) * W * 0.6;
        var py = parentMissionNode ? parentMissionNode.y + (Math.random() - 0.5) * 120 : H / 2 + (Math.random() - 0.5) * H * 0.6;
        var n2 = {
          id: 'p-' + p.id, type: 'project', label: p.title || p.id, status: p.status, priority: p.priority, color: color, data: p, pinned: false,
          x: px, y: py, vx: 0, vy: 0, radius: 20
        };
        nodes.push(n2);
        nodeMap[n2.id] = n2;

        // Tasks: position near parent project
        var tasks = p.tasks || [];
        for (var k = 0; k < tasks.length; k++) {
          var t = tasks[k];
          var tColor = t.section === 'completed' ? '#22c55e66' : (t.section === 'blocked' ? '#ef444466' : (t.section === 'in_progress' ? '#06b6d466' : '#94a3b866'));
          var n3 = {
            id: 't-' + p.id + '-' + k, type: 'task', label: t.title, section: t.section, priority: t.priority, color: tColor, data: t, pinned: false,
            x: n2.x + (Math.random() - 0.5) * 60, y: n2.y + (Math.random() - 0.5) * 60, vx: 0, vy: 0, radius: 6
          };
          nodes.push(n3);
          nodeMap[n3.id] = n3;
          edges.push({ source: 'p-' + p.id, target: n3.id });
        }
      }

      var zoom = 1;
      var panX = 0;
      var panY = 0;
      var dragging = null;
      var panning = false;
      var panStart = { x: 0, y: 0 };
      var hovered = null;
      var running = true;
      var iterCount = 0;
      var maxIter = 300;
      var alpha = 1.0;  // Cooling factor: starts at 1.0, decays toward 0

      networkState = { nodes: nodes, edges: edges, nodeMap: nodeMap, canvas: canvas, ctx: ctx, W: W, H: H, zoom: zoom, panX: panX, panY: panY, animFrame: null, setRunning: function (v) { running = v; iterCount = Math.max(iterCount, 40); alpha = 0.6; } };

      function screenToWorld(sx, sy) {
        return { x: (sx - W / 2) / zoom + W / 2 - panX / zoom, y: (sy - H / 2) / zoom + H / 2 - panY / zoom };
      }

      function worldToScreen(wx, wy) {
        return { x: (wx - W / 2 + panX / zoom) * zoom + W / 2, y: (wy - H / 2 + panY / zoom) * zoom + H / 2 };
      }

      function findNodeAt(sx, sy) {
        var wpos = screenToWorld(sx, sy);
        for (var i = nodes.length - 1; i >= 0; i--) {
          var n = nodes[i];
          if (n.type === 'task' && !showTasks) continue;
          var dx = n.x - wpos.x;
          var dy = n.y - wpos.y;
          if (dx * dx + dy * dy < (n.radius / zoom + 4) * (n.radius / zoom + 4)) return n;
        }
        return null;
      }

      canvas.addEventListener('mousedown', function (e) {
        var rect = canvas.getBoundingClientRect();
        var sx = e.clientX - rect.left;
        var sy = e.clientY - rect.top;
        var node = findNodeAt(sx, sy);
        if (node) {
          dragging = node;
          running = false;
        } else {
          panning = true;
          panStart = { x: e.clientX - panX, y: e.clientY - panY };
        }
      });

      canvas.addEventListener('mousemove', function (e) {
        var rect = canvas.getBoundingClientRect();
        var sx = e.clientX - rect.left;
        var sy = e.clientY - rect.top;

        if (dragging) {
          var wpos = screenToWorld(sx, sy);
          dragging.x = wpos.x;
          dragging.y = wpos.y;
          dragging.vx = 0;
          dragging.vy = 0;
        } else if (panning) {
          panX = e.clientX - panStart.x;
          panY = e.clientY - panStart.y;
          networkState.panX = panX;
          networkState.panY = panY;
        } else {
          var h = findNodeAt(sx, sy);
          hovered = h;
          var tt = document.getElementById('network-tooltip');
          if (h && tt) {
            tt.style.display = 'block';
            tt.style.left = (sx + 16) + 'px';
            tt.style.top = (sy + 16) + 'px';
            document.getElementById('tt-title').textContent = h.label;
            document.getElementById('tt-type').textContent = 'Type: ' + h.type;
            document.getElementById('tt-status').textContent = 'Status: ' + (h.status || h.section || '-');
            document.getElementById('tt-detail').textContent = h.priority ? 'Priority: ' + h.priority : '';
            document.getElementById('tt-extra1').textContent = '';
            document.getElementById('tt-extra2').textContent = '';
            document.getElementById('tt-extra3').textContent = '';
            if (h.type === 'mission') {
              var md = h.data;
              document.getElementById('tt-extra1').textContent = 'Projects: ' + ((md.linked_projects || []).length);
              document.getElementById('tt-extra2').textContent = 'Completion: ' + (md.aggregate_completion || 0) + '%';
              document.getElementById('tt-extra3').textContent = (md.description || '').substring(0, 60);
            } else if (h.type === 'project') {
              var pd = h.data;
              var ptc = pd.task_counts || {};
              var ptotal = (ptc.completed || 0) + (ptc.in_progress || 0) + (ptc.remaining || 0) + (ptc.blocked || 0);
              document.getElementById('tt-extra1').textContent = 'Tasks: ' + (ptc.completed || 0) + '/' + ptotal + ' done';
              document.getElementById('tt-extra2').textContent = 'Completion: ' + (pd.completion_percentage || 0) + '%';
              document.getElementById('tt-extra3').textContent = (pd.goal || '').substring(0, 60);
            } else if (h.type === 'task') {
              var td2 = h.data;
              document.getElementById('tt-extra1').textContent = td2.due ? 'Due: ' + td2.due : '';
              document.getElementById('tt-extra2').textContent = td2.assignee ? 'Assignee: ' + td2.assignee : '';
              document.getElementById('tt-extra3').textContent = '';
            }
          } else if (tt) {
            tt.style.display = 'none';
          }
        }
      });

      canvas.addEventListener('mouseup', function () {
        if (dragging) {
          dragging.pinned = true;
          dragging = null;
          running = true;
          iterCount = Math.max(iterCount, 40);
        }
        panning = false;
      });

      canvas.addEventListener('dblclick', function (e) {
        var rect = canvas.getBoundingClientRect();
        var node = findNodeAt(e.clientX - rect.left, e.clientY - rect.top);
        if (node && node.type !== 'task') {
          showEditModal(node.type, node.data.id);
        }
      });

      canvas.addEventListener('wheel', function (e) {
        e.preventDefault();
        var factor = e.deltaY > 0 ? 0.9 : 1.1;
        var newZoom = zoom * factor;
        // Clamp zoom and skip pan update if clamped (prevents off-screen drift)
        if (newZoom < 0.1) newZoom = 0.1;
        if (newZoom > 5) newZoom = 5;
        if (newZoom === zoom) return;  // No change, don't update pan
        var actualFactor = newZoom / zoom;
        var rect = canvas.getBoundingClientRect();
        var mx = e.clientX - rect.left;
        var my = e.clientY - rect.top;
        panX = mx - (mx - panX) * actualFactor;
        panY = my - (my - panY) * actualFactor;
        zoom = newZoom;
        networkState.zoom = zoom;
        networkState.panX = panX;
        networkState.panY = panY;
      });

      function simulate() {
        if (!running) return;

        // Cooling schedule: alpha decays from 1.0 toward 0
        alpha *= 0.995;
        if (alpha < 0.001) { running = false; return; }

        var maxV = 0;
        var visibleNodes = [];
        for (var vi = 0; vi < nodes.length; vi++) {
          if (nodes[vi].type === 'task' && !showTasks) continue;
          visibleNodes.push(nodes[vi]);
        }

        // Repulsion (scaled by alpha for cooling)
        var repK = 800 * alpha;
        for (var i = 0; i < visibleNodes.length; i++) {
          for (var j = i + 1; j < visibleNodes.length; j++) {
            var ni = visibleNodes[i], nj = visibleNodes[j];
            var dx = ni.x - nj.x;
            var dy = ni.y - nj.y;
            var dist = Math.sqrt(dx * dx + dy * dy) || 1;
            // Type-aware repulsion: missions & projects repel stronger
            var typeK = (ni.type !== 'task' && nj.type !== 'task') ? 2.5 : 1;
            var force = repK * typeK / (dist * dist);
            if (force > 3) force = 3;
            var fx = dx / dist * force;
            var fy = dy / dist * force;
            if (!ni.pinned) { ni.vx += fx; ni.vy += fy; }
            if (!nj.pinned) { nj.vx -= fx; nj.vy -= fy; }
          }
        }

        // Attraction along edges (spring-like)
        var springK = 0.08 * alpha;
        var idealLen = showTasks ? 60 : 120;
        for (var e = 0; e < edges.length; e++) {
          var src = nodeMap[edges[e].source];
          var tgt = nodeMap[edges[e].target];
          if (!src || !tgt) continue;
          if (tgt.type === 'task' && !showTasks) continue;
          var dx2 = tgt.x - src.x;
          var dy2 = tgt.y - src.y;
          var dist2 = Math.sqrt(dx2 * dx2 + dy2 * dy2) || 1;
          var f2 = springK * (dist2 - idealLen);
          var fx2 = dx2 / dist2 * f2;
          var fy2 = dy2 / dist2 * f2;
          if (!src.pinned) { src.vx += fx2; src.vy += fy2; }
          if (!tgt.pinned) { tgt.vx -= fx2; tgt.vy -= fy2; }
        }

        // Center gravity + velocity damping (damping increases as alpha decreases)
        var damping = 0.7 + 0.25 * (1 - alpha);  // 0.7 initially → 0.95 when cooled
        var gravity = 0.003 * alpha;
        for (var n = 0; n < visibleNodes.length; n++) {
          var nd = visibleNodes[n];
          if (nd.pinned) continue;
          nd.vx += (W / 2 - nd.x) * gravity;
          nd.vy += (H / 2 - nd.y) * gravity;
          nd.vx *= damping;
          nd.vy *= damping;
          nd.x += nd.vx;
          nd.y += nd.vy;
          var v = Math.abs(nd.vx) + Math.abs(nd.vy);
          if (v > maxV) maxV = v;
        }

        iterCount++;
        // Stop conditions: either maxV settled or hit iteration cap
        if (iterCount > maxIter) { running = false; return; }
        if (maxV < 0.1 && iterCount > 30) { running = false; }
      }

      var drawErrorLogged = false;
      var emptyFrames = 0;

      function draw() {
        try {
          // Verify canvas is still in DOM
          var liveCanvas = document.getElementById('network-canvas');
          if (!liveCanvas) {
            networkState.animFrame = null;
            return;
          }
          // If canvas was replaced (e.g. by renderNetworkView), get fresh context
          if (liveCanvas !== canvas) {
            canvas = liveCanvas;
            canvas.width = W;
            canvas.height = H;
            ctx = canvas.getContext('2d');
          }

          ctx.clearRect(0, 0, W, H);
          ctx.save();
          ctx.translate(panX, panY);
          ctx.scale(zoom, zoom);

          // Edges
          ctx.strokeStyle = '#334155';
          ctx.lineWidth = 1 / zoom;
          for (var e = 0; e < edges.length; e++) {
            var src = nodeMap[edges[e].source];
            var tgt = nodeMap[edges[e].target];
            if (!src || !tgt) continue;
            if (tgt.type === 'task' && !showTasks) continue;
            ctx.beginPath();
            ctx.moveTo(src.x, src.y);
            ctx.lineTo(tgt.x, tgt.y);
            ctx.stroke();
          }

          // Nodes
          var drawnCount = 0;
          for (var i = 0; i < nodes.length; i++) {
            var nd = nodes[i];
            if (nd.type === 'task' && !showTasks) continue;
            // NaN guard — reset corrupted coordinates
            if (isNaN(nd.x) || isNaN(nd.y)) {
              nd.x = W / 2 + (Math.random() - 0.5) * W * 0.3;
              nd.y = H / 2 + (Math.random() - 0.5) * H * 0.3;
              nd.vx = 0; nd.vy = 0;
            }
            ctx.beginPath();
            ctx.arc(nd.x, nd.y, nd.radius, 0, Math.PI * 2);
            if (nd.type === 'mission') {
              ctx.fillStyle = '#3b82f6';
            } else if (nd.color) {
              ctx.fillStyle = nd.color;
            } else {
              ctx.fillStyle = '#06b6d4';
            }
            ctx.fill();
            drawnCount++;
            if (nd.pinned) {
              ctx.strokeStyle = '#f59e0b';
              ctx.lineWidth = 2 / zoom;
              ctx.stroke();
            }
            if (hovered === nd) {
              ctx.strokeStyle = '#fff';
              ctx.lineWidth = 2 / zoom;
              ctx.stroke();
            }

            // Labels
            if (showLabels && (nd.type !== 'task' || nd.radius > 6)) {
              ctx.fillStyle = '#e2e8f0';
              ctx.font = (nd.type === 'mission' ? 12 : (nd.type === 'project' ? 10 : 8)) + 'px system-ui';
              ctx.textAlign = 'center';
              ctx.textBaseline = 'top';
              var lbl = nd.label || '';
              if (lbl.length > 20) lbl = lbl.substring(0, 18) + '..';
              ctx.fillText(lbl, nd.x, nd.y + nd.radius + 4);
            }
          }

          ctx.restore();

          // NaN guard for zoom/pan
          if (isNaN(panX)) panX = 0;
          if (isNaN(panY)) panY = 0;
          if (isNaN(zoom) || zoom <= 0) zoom = 1;

          simulate();
          drawErrorLogged = false;
        } catch (err) {
          if (!drawErrorLogged) {
            console.error('[Network draw error]', err);
            drawErrorLogged = true;
          }
        }
        networkState.animFrame = requestAnimationFrame(draw);
      }

      draw();
    }

    function resetNetworkLayout() {
      if (!networkState) return;
      var nodes = networkState.nodes;
      var W = networkState.W;
      var H = networkState.H;
      // Hierarchical reset: missions in ring, projects near parent
      var missionIdx = 0;
      var missionCount = 0;
      for (var c = 0; c < nodes.length; c++) { if (nodes[c].type === 'mission') missionCount++; }
      missionCount = missionCount || 1;
      var missionPositions = {};
      for (var i = 0; i < nodes.length; i++) {
        nodes[i].vx = 0;
        nodes[i].vy = 0;
        nodes[i].pinned = false;
        if (nodes[i].type === 'mission') {
          var ang = (2 * Math.PI * missionIdx) / missionCount;
          var rr = Math.min(W, H) * 0.3;
          nodes[i].x = W / 2 + Math.cos(ang) * rr;
          nodes[i].y = H / 2 + Math.sin(ang) * rr;
          missionPositions[nodes[i].id] = { x: nodes[i].x, y: nodes[i].y };
          missionIdx++;
        }
      }
      for (var j = 0; j < nodes.length; j++) {
        if (nodes[j].type === 'project') {
          // Find parent mission via edges
          var parentPos = null;
          for (var ei = 0; ei < networkState.edges.length; ei++) {
            if (networkState.edges[ei].target === nodes[j].id && missionPositions[networkState.edges[ei].source]) {
              parentPos = missionPositions[networkState.edges[ei].source];
              break;
            }
          }
          if (parentPos) {
            nodes[j].x = parentPos.x + (Math.random() - 0.5) * 120;
            nodes[j].y = parentPos.y + (Math.random() - 0.5) * 120;
          } else {
            nodes[j].x = W / 2 + (Math.random() - 0.5) * W * 0.5;
            nodes[j].y = H / 2 + (Math.random() - 0.5) * H * 0.5;
          }
        } else if (nodes[j].type === 'task') {
          // Find parent project via edges
          var parentPrj = null;
          for (var ej = 0; ej < networkState.edges.length; ej++) {
            if (networkState.edges[ej].target === nodes[j].id) {
              parentPrj = networkState.nodeMap[networkState.edges[ej].source];
              break;
            }
          }
          if (parentPrj) {
            nodes[j].x = parentPrj.x + (Math.random() - 0.5) * 50;
            nodes[j].y = parentPrj.y + (Math.random() - 0.5) * 50;
          } else {
            nodes[j].x = W / 2 + (Math.random() - 0.5) * W * 0.5;
            nodes[j].y = H / 2 + (Math.random() - 0.5) * H * 0.5;
          }
        }
      }
      networkState.panX = 0;
      networkState.panY = 0;
      networkState.zoom = 1;
      networkState.setRunning(true);
    }

    function unpinAllNodes() {
      if (!networkState) return;
      var nodes = networkState.nodes;
      for (var i = 0; i < nodes.length; i++) {
        nodes[i].pinned = false;
      }
      networkState.setRunning(true);
    }

    function toggleLabels() {
      showLabels = !showLabels;
      var btn = document.getElementById('btn-labels');
      if (btn) btn.classList.toggle('active', showLabels);
    }

    function toggleTasks() {
      showTasks = !showTasks;
      var btn = document.getElementById('btn-tasks');
      if (btn) btn.classList.toggle('active', showTasks);
    }

    // ============================================================================
    // Tab 3: Board (Enhanced Kanban)
    // ============================================================================
    function toggleBoardSection(section) {
      boardSectionsExpanded[section] = !boardSectionsExpanded[section];
      var content = document.getElementById('board-section-' + section);
      var toggle = document.getElementById('board-toggle-' + section);
      if (content) content.classList.toggle('collapsed', !boardSectionsExpanded[section]);

    function renderTaskKanban(project) {
      var tasks = project.tasks || [];
      var today = new Date().toISOString().split('T')[0];
      var sections = {
        'remaining': { label: 'Remaining', tasks: [] },
        'in_progress': { label: 'In Progress', tasks: [] },
        'blocked': { label: 'Blocked', tasks: [] },
        'completed': { label: 'Completed', tasks: [] },
        'optional': { label: 'Optional / Deferred', tasks: [] }
      };
      for (var i = 0; i < tasks.length; i++) {
        var t = tasks[i];
        var section = t.section || 'remaining';
        if (section === 'backlog' || section === 'up_next') section = 'remaining';
        if (sections[section]) { sections[section].tasks.push(t); } else { sections['remaining'].tasks.push(t); }
      }
      var sectionOrder = ['remaining', 'in_progress', 'blocked', 'completed', 'optional'];
      var html = '<div class="task-kanban">';
      for (var si = 0; si < sectionOrder.length; si++) {
        var secKey = sectionOrder[si];
        var sec = sections[secKey];
        html += '<div class="task-kanban-col">' +
          '<div class="task-kanban-col-header">' +
          '<span class="task-kanban-col-title">' + sec.label + '</span>' +
          '<span class="task-kanban-col-count">' + sec.tasks.length + '</span>' +
          '</div><div class="task-kanban-cards">';
        if (sec.tasks.length === 0) {
          html += '<div class="kanban-empty">No tasks</div>';
        }
        for (var ti = 0; ti < sec.tasks.length; ti++) {
          var task = sec.tasks[ti];
          var overdue = task.due && task.due < today && task.section !== 'completed';
          var clickHandler = "showKanbanDispatchModal(event, \'task\', \'\', \'" + esc(task.title).replace(/'/g, "\\'") + "\', \'\', \'" + esc(task.priority || '') + "\', \'" + esc(task.section || '') + "\', \'" + esc(project.id) + "\')";
          html += '<div class="task-card" style="cursor:pointer;" onclick="' + clickHandler + '">' +
            '<div class="task-card-title" style="display:flex;align-items:center;gap:6px;">' + esc(task.title) +
            (task.spec ? ' <span title="Spec: ' + esc(task.spec).replace(/"/g, '&quot;') + '" style="color:#22c55e;font-size:11px;cursor:help;">✓ spec</span>' : ' <span title="No acceptance criteria defined" style="color:#f59e0b;font-size:11px;cursor:help;">⚠ no spec</span>') +
            (task.depends_on && task.depends_on.length ? ' <span title="Depends on: ' + esc(Array.isArray(task.depends_on) ? task.depends_on.join(', ') : task.depends_on) + '" style="color:#06b6d4;font-size:11px;cursor:help;">⛓ deps</span>' : '') +
            '</div>' +
            '<div class="task-card-meta">';
          if (task.priority) { html += badge(task.priority, task.priority.toLowerCase()) + ' '; }
          if (task.due) { html += '<span class="task-card-due' + (overdue ? ' overdue' : '') + '">' + (overdue ? '&#x26A0; ' : '') + esc(task.due) + '</span> '; }
          if (task.assignee) { html += '<span class="task-card-assignee">@' + esc(task.assignee) + '</span>'; }
          html += '</div>';
          html += '<div style="margin-top:4px;display:flex;gap:4px;">' +
            '<button class="btn btn-ghost" style="font-size:0.65rem;padding:2px 6px;color:var(--primary);" onclick="event.stopPropagation();calScheduleTask(' + JSON.stringify(task) + ',' + JSON.stringify(project.id) + ')">&#x1F4C5; Schedule</button>' +
            '<button class="btn btn-ghost" style="font-size:0.65rem;padding:2px 6px;color:#22c55e;" onclick="event.stopPropagation();editTaskSpec(&quot;' + esc(project.id) + '&quot;,&quot;' + esc(task.title).replace(/"/g, '&amp;quot;') + '&quot;)">&#x270F; Spec</button>' +
            '</div>';
          html += '</div>';
        }
        html += '</div></div>';
      }
      html += '</div>';

      // Inline Add Task form
      html += '<div style="margin-top:16px;padding:12px 16px;background:var(--panel);border:1px solid var(--border);border-radius:var(--radius-lg);">' +
        '<div style="font-weight:600;margin-bottom:8px;font-size:13px;">Add Task</div>' +
        '<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;">' +
        '<input id="add-task-text" type="text" placeholder="Task description" style="flex:1;min-width:200px;padding:6px 10px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;">' +
        '<select id="add-task-priority" style="padding:6px 10px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;">' +
        '<option value="">Priority</option><option value="HIGH">HIGH</option><option value="MEDIUM">MEDIUM</option><option value="LOW">LOW</option></select>' +
        '<input id="add-task-spec" type="text" placeholder="Acceptance criteria (optional)" style="flex:1;min-width:200px;padding:6px 10px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;">' +
        '<input id="add-task-depends" type="text" placeholder="Depends on (optional)" style="min-width:150px;padding:6px 10px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;">' +
        '<button class="btn btn-primary btn-sm" onclick="addTaskInline(&quot;' + esc(project.id) + '&quot;)">Add</button>' +

      return html;

    async function addTaskInline(projectId) {
      var textEl = document.getElementById('add-task-text');
      var priorityEl = document.getElementById('add-task-priority');
      var specEl = document.getElementById('add-task-spec');
      var dependsEl = document.getElementById('add-task-depends');
      if (!textEl || !textEl.value.trim()) { toast('Task description required', 'error'); return; }
      var body = { text: textEl.value.trim() };
      if (priorityEl && priorityEl.value) body.priority = priorityEl.value;
      if (specEl && specEl.value.trim()) body.spec = specEl.value.trim();
      if (dependsEl && dependsEl.value.trim()) body.depends_on = dependsEl.value.trim().split(',').map(function (s) { return s.trim(); });
      try {
        var res = await api('POST', '/api/tasks/' + projectId, body);
        if (res.added) {
          toast('Task added: ' + body.text, 'success');
          textEl.value = '';
          if (specEl) specEl.value = '';
          if (dependsEl) dependsEl.value = '';
          fetchState();
        } else {
          toast('Failed: ' + (res.error || 'Unknown error'), 'error');
        }
      } catch (e) {
        toast('Error: ' + e.message, 'error');
      }
    }

        var res = await api('PUT', '/api/tasks/' + encodeURIComponent(projectId) + '/' + encodeURIComponent(taskTitle), { spec: spec });
        if (res.updated) {
          toast('Spec set for: ' + taskTitle, 'success');
          fetchState();
        } else {
          toast('Failed: ' + (res.error || 'Unknown error'), 'error');
        }
      } catch (e) {
        toast('Error: ' + e.message, 'error');
      }
    }

    async function loadProjectGantt(projectId) {
      try {
        var res = await fetch('/api/projects/' + projectId + '/gantt');
        var data = await res.json();
        renderProjectGantt(data);
      } catch (e) {
        var container = document.getElementById('project-gantt-container');

      }
    }

    function renderProjectGantt(data) {
      var container = document.getElementById('project-gantt-container');
      if (!container) return;
      var tasks = data.tasks || [];
      var deps = data.dependencies || [];
      if (tasks.length === 0) {
        container.innerHTML = '<div style="color:var(--text-muted);text-align:center;padding:40px;">No tasks to display in Gantt view</div>';
        return;
      }

      var rowHeight = 36;
      var labelWidth = 260;
      var barAreaWidth = Math.max(600, tasks.length * 60);
      var totalWidth = labelWidth + barAreaWidth;
      var totalHeight = tasks.length * rowHeight + 40;

      var positions = [];
      for (var i = 0; i < tasks.length; i++) {
        var maxDepEnd = 0;
        for (var d = 0; d < deps.length; d++) {
          if (deps[d].to === i) {
            var depPos = positions[deps[d].from];
            if (depPos && depPos.end > maxDepEnd) maxDepEnd = depPos.end;
          }
        }
        var start = Math.max(maxDepEnd, i * 40);
        var width = Math.max(50, 40 + (tasks[i].title.length * 2));
        positions.push({ start: start, end: start + width, width: width });
      }

      var sectionColors = { completed: '#22c55e', in_progress: '#3b82f6', remaining: '#64748b', blocked: '#ef4444', optional: '#8b5cf6' };
      var svgHtml = '<svg width="' + totalWidth + '" height="' + totalHeight + '" style="font-family:system-ui;">';
      svgHtml += '<defs><marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#f59e0b"/></marker></defs>';

      for (var t = 0; t < tasks.length; t++) {
        var y = t * rowHeight + 20;
        var task = tasks[t];
        var pos = positions[t];
        var color = sectionColors[task.section] || '#64748b';
        var specIcon = task.spec ? '\u2713' : '\u26a0';
        var specColor = task.spec ? '#22c55e' : '#f59e0b';
        if (t % 2 === 0) svgHtml += '<rect x="0" y="' + (y - 4) + '" width="' + totalWidth + '" height="' + rowHeight + '" fill="rgba(255,255,255,0.02)"/>';
        svgHtml += '<text x="4" y="' + (y + 14) + '" fill="#cbd5e1" font-size="11"><tspan fill="' + specColor + '">' + specIcon + '</tspan> ' + esc(task.title.length > 30 ? task.title.substring(0, 28) + '..' : task.title) + '</text>';
        svgHtml += '<rect x="' + (labelWidth + pos.start) + '" y="' + (y + 2) + '" width="' + pos.width + '" height="' + (rowHeight - 12) + '" rx="4" fill="' + color + '" opacity="0.85"><title>' + esc(task.title) + (task.spec ? ' | Spec: ' + esc(task.spec) : ' | No spec') + '</title></rect>';
        if (task.priority) svgHtml += '<text x="' + (labelWidth + pos.start + 6) + '" y="' + (y + 16) + '" fill="white" font-size="9" font-weight="600">' + task.priority.charAt(0) + '</text>';
      }

      for (var di = 0; di < deps.length; di++) {
        var dep = deps[di];
        var fromPos = positions[dep.from]; var toPos = positions[dep.to];
        var fromY = dep.from * rowHeight + 20 + (rowHeight - 12) / 2 + 2;
        var toY = dep.to * rowHeight + 20 + (rowHeight - 12) / 2 + 2;
        svgHtml += '<line x1="' + (labelWidth + fromPos.end) + '" y1="' + fromY + '" x2="' + (labelWidth + toPos.start) + '" y2="' + toY + '" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrowhead)"/>';
      }

      svgHtml += '<text x="4" y="' + (totalHeight - 4) + '" fill="#64748b" font-size="10">\u2713 = Has spec   \u26a0 = No spec   Lines = Dependencies</text>';

    var dragData = null;
    function onDragStart(e, type, id) {
      dragData = { type: type, id: id };
      e.target.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    }
    function onDragOver(e) {
      e.preventDefault();
      e.currentTarget.classList.add('drag-over');
    }
    function onDragLeave(e) {
      e.currentTarget.classList.remove('drag-over');
    }
    async function onDrop(e, newStatus) {
      e.preventDefault();
      e.currentTarget.classList.remove('drag-over');
      document.querySelectorAll('.dragging').forEach(function (el) { el.classList.remove('dragging'); });
      if (!dragData) return;

      var type = dragData.type;
      var id = dragData.id;
      dragData = null;

      try {
        if (type === 'mission') {
          await api('PUT', '/api/missions/' + id, { status: newStatus });
        } else {
          await api('PUT', '/api/projects/' + id, { status: newStatus });
        }
        toast(type + ' moved to ' + newStatus);
        refreshData();
      } catch (err) {
        toast('Failed to move: ' + (err.message || 'API error'), 'error');
        refreshData(); // Restore board to original state
      }
    }

    // ============================================================================
    // Tab 4: Timeline (Gantt View)
    // ============================================================================
    function renderTimelineView() {
      var c = document.getElementById('content');
      var prjs = allProjects();

      // Determine date range
      var now = new Date();
      var today = now.toISOString().split('T')[0];
      var allDates = [];
      var hasAnyDates = false;

      for (var i = 0; i < prjs.length; i++) {
        var p = prjs[i];
        if (p.created) allDates.push(new Date(p.created));
        if (p.target) { allDates.push(new Date(p.target)); hasAnyDates = true; }
        var tasks = p.tasks || [];
        for (var j = 0; j < tasks.length; j++) {
          if (tasks[j].due) { allDates.push(new Date(tasks[j].due)); hasAnyDates = true; }
          if (tasks[j].created) allDates.push(new Date(tasks[j].created));
        }
      }

      if (prjs.length === 0) {
        c.innerHTML = '<div class="timeline-empty">No projects to display. Create a project to see the timeline.</div>';
        return;
      }

      // Compute range: 2 months before earliest to 2 months after latest
      allDates.push(now);
      var minDate = new Date(Math.min.apply(null, allDates));
      var maxDate = new Date(Math.max.apply(null, allDates));
      minDate.setDate(1);
      minDate.setMonth(minDate.getMonth() - 1);
      maxDate.setDate(1);
      maxDate.setMonth(maxDate.getMonth() + 3);

      // Generate week columns
      var weeks = [];
      var cur = new Date(minDate);
      while (cur < maxDate) {
        weeks.push(new Date(cur));
        cur.setDate(cur.getDate() + 7);
      }

      var colWidth = 80;
      var totalWidth = weeks.length * colWidth;
      var rangeStart = minDate.getTime();
      var rangeEnd = maxDate.getTime();
      var rangeDuration = rangeEnd - rangeStart;

      function dateToX(dateStr) {
        if (!dateStr) return 0;
        var d = new Date(dateStr);
        var ratio = (d.getTime() - rangeStart) / rangeDuration;
        return Math.round(ratio * totalWidth);
      }

      var todayX = dateToX(today);

      // Build header
      var headerHtml = '';
      var monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
      for (var w = 0; w < weeks.length; w++) {
        var wd = weeks[w];
        var label = monthNames[wd.getMonth()] + ' ' + wd.getDate();
        headerHtml += '<div class="timeline-header-cell" style="min-width:' + colWidth + 'px;max-width:' + colWidth + 'px">' + label + '</div>';
      }

      // Build rows
      var labelsHtml = '<div class="timeline-labels-header">Project</div>';
      var rowsHtml = '';

      for (var pi = 0; pi < prjs.length; pi++) {
        var proj = prjs[pi];
        labelsHtml += '<div class="timeline-label-row">' + esc(proj.title || proj.id) + '</div>';

        rowsHtml += '<div class="timeline-row" style="width:' + totalWidth + 'px">';

        // Project bar
        var projStart = proj.created || today;
        var projEnd = proj.target || today;
        var x1 = dateToX(projStart);
        var x2 = dateToX(projEnd);
        if (x2 <= x1) x2 = x1 + 40;
        var barStatus = (proj.status || 'planning').toLowerCase();
        rowsHtml += '<div class="timeline-bar ' + barStatus + '" style="left:' + x1 + 'px;width:' + (x2 - x1) + 'px" title="' + esc(proj.title || proj.id) + '" onclick="showTimelineDetail(\'' + esc(proj.id) + '\')">' + esc(proj.title || proj.id) + '</div>';

        // Target date diamond
        if (proj.target) {
          var diamondX = dateToX(proj.target);
          rowsHtml += '<div class="timeline-diamond" style="left:' + (diamondX - 5) + 'px" title="Target: ' + esc(proj.target) + '"></div>';
        }

        rowsHtml += '</div>';
      }

      // Today marker
      var todayMarker = '';
      if (todayX > 0 && todayX < totalWidth) {
        todayMarker = '<div class="timeline-today" style="left:' + todayX + 'px"></div>';
      }

      c.innerHTML = '<div class="timeline-container"><div class="timeline-wrapper">' +
        '<div class="timeline-labels">' + labelsHtml + '</div>' +
        '<div class="timeline-chart" style="position:relative">' +
        '<div class="timeline-header" style="width:' + totalWidth + 'px">' + headerHtml + '</div>' +
        '<div style="position:relative">' + rowsHtml + todayMarker + '</div>' +
        '</div></div></div>';
    }

    function drawDonutChart(canvasId, data, colors) {
      var canvas = document.getElementById(canvasId);
      if (!canvas) return;
      var ctx = canvas.getContext('2d');
      var W = canvas.width;
      var H = canvas.height;
      var cx = W * 0.4;
      var cy = H / 2;
      var outerR = Math.min(cx, cy) - 10;
      var innerR = outerR * 0.55;

      var keys = Object.keys(data);
      var total = 0;
      for (var i = 0; i < keys.length; i++) total += data[keys[i]];
      if (total === 0) { ctx.fillStyle = '#64748b'; ctx.font = '13px system-ui'; ctx.fillText('No data', W / 2 - 25, H / 2); return; }

      var angle = -Math.PI / 2;
      for (var j = 0; j < keys.length; j++) {
        var k = keys[j];
        var sliceAngle = (data[k] / total) * Math.PI * 2;
        ctx.beginPath();
        ctx.moveTo(cx + innerR * Math.cos(angle), cy + innerR * Math.sin(angle));
        ctx.arc(cx, cy, outerR, angle, angle + sliceAngle);
        ctx.arc(cx, cy, innerR, angle + sliceAngle, angle, true);
        ctx.closePath();
        ctx.fillStyle = colors[k] || '#64748b';
        ctx.fill();
        angle += sliceAngle;
      }

      // Legend
      var lx = W * 0.7;
      var ly = 20;
      ctx.font = '11px system-ui';
      for (var l = 0; l < keys.length; l++) {
        if (data[keys[l]] === 0) continue;
        ctx.fillStyle = colors[keys[l]] || '#64748b';
        ctx.fillRect(lx, ly, 10, 10);
        ctx.fillStyle = '#e2e8f0';
        ctx.fillText(keys[l] + ' (' + data[keys[l]] + ')', lx + 16, ly + 9);
        ly += 18;
      }

      // Center text
      ctx.fillStyle = '#e2e8f0';
      ctx.font = 'bold 20px system-ui';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(String(total), cx, cy);
      ctx.textAlign = 'start';
      ctx.textBaseline = 'alphabetic';
    }

    function drawBarChartH(canvasId, data, colors) {
      var canvas = document.getElementById(canvasId);
      if (!canvas) return;
      var ctx = canvas.getContext('2d');
      var W = canvas.width;
      var H = canvas.height;
      var keys = Object.keys(data);
      var maxVal = 0;
      for (var i = 0; i < keys.length; i++) { if (data[keys[i]] > maxVal) maxVal = data[keys[i]]; }
      if (maxVal === 0) maxVal = 1;

      var barH = 30;
      var gap = 16;
      var startY = 20;
      var labelW = 70;
      var barMaxW = W - labelW - 60;

      for (var j = 0; j < keys.length; j++) {
        var y = startY + j * (barH + gap);
        ctx.fillStyle = '#94a3b8';
        ctx.font = '12px system-ui';
        ctx.fillText(keys[j], 8, y + barH / 2 + 4);

        var bw = (data[keys[j]] / maxVal) * barMaxW;
        ctx.fillStyle = colors[keys[j]] || '#3b82f6';
        ctx.beginPath();
        ctx.roundRect(labelW, y, Math.max(bw, 4), barH, 4);
        ctx.fill();

        ctx.fillStyle = '#e2e8f0';
        ctx.font = 'bold 12px system-ui';
        ctx.fillText(String(data[keys[j]]), labelW + bw + 8, y + barH / 2 + 4);
      }
    }

    function drawPieChart(canvasId, data, colors) {
      var canvas = document.getElementById(canvasId);
      if (!canvas) return;
      var ctx = canvas.getContext('2d');
      var W = canvas.width;
      var H = canvas.height;
      var cx = W * 0.35;
      var cy = H / 2;
      var R = Math.min(cx, cy) - 10;

      var keys = Object.keys(data);
      var total = 0;
      for (var i = 0; i < keys.length; i++) total += data[keys[i]];
      if (total === 0) { ctx.fillStyle = '#64748b'; ctx.font = '13px system-ui'; ctx.fillText('No data', W / 2 - 25, H / 2); return; }

      var angle = -Math.PI / 2;
      for (var j = 0; j < keys.length; j++) {
        var k = keys[j];
        var sliceAngle = (data[k] / total) * Math.PI * 2;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, R, angle, angle + sliceAngle);
        ctx.closePath();
        ctx.fillStyle = colors[k] || '#64748b';
        ctx.fill();
        angle += sliceAngle;
      }

      // Legend
      var lx = W * 0.65;
      var ly = 20;
      ctx.font = '11px system-ui';
      for (var l = 0; l < keys.length; l++) {
        ctx.fillStyle = colors[keys[l]] || '#64748b';
        ctx.fillRect(lx, ly, 10, 10);
        ctx.fillStyle = '#e2e8f0';
        ctx.fillText(keys[l] + ' (' + data[keys[l]] + ')', lx + 16, ly + 9);
        ly += 18;
      }
    }

    function drawBarChartV(canvasId, projects) {
      var canvas = document.getElementById(canvasId);
      if (!canvas) return;
      var ctx = canvas.getContext('2d');
      var W = canvas.width;
      var H = canvas.height;
      if (projects.length === 0) { ctx.fillStyle = '#64748b'; ctx.font = '13px system-ui'; ctx.fillText('No projects', W / 2 - 35, H / 2); return; }

      var padding = { top: 10, right: 10, bottom: 50, left: 40 };
      var chartW = W - padding.left - padding.right;
      var chartH = H - padding.top - padding.bottom;
      var barW = Math.min(40, (chartW / projects.length) - 8);
      var gap = (chartW - barW * projects.length) / (projects.length + 1);

      // Y axis
      ctx.strokeStyle = '#334155';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(padding.left, padding.top);
      ctx.lineTo(padding.left, padding.top + chartH);
      ctx.lineTo(padding.left + chartW, padding.top + chartH);
      ctx.stroke();

      // Y labels
      ctx.fillStyle = '#64748b';
      ctx.font = '10px system-ui';
      ctx.textAlign = 'right';
      for (var y = 0; y <= 100; y += 25) {
        var yPos = padding.top + chartH - (y / 100) * chartH;
        ctx.fillText(y + '%', padding.left - 6, yPos + 3);
        ctx.strokeStyle = '#1e293b';
        ctx.beginPath();
        ctx.moveTo(padding.left, yPos);
        ctx.lineTo(padding.left + chartW, yPos);
        ctx.stroke();
      }
      ctx.textAlign = 'start';

      // Bars
      for (var i = 0; i < projects.length; i++) {
        var p = projects[i];
        var pct = p.completion_percentage || 0;
        var x = padding.left + gap + i * (barW + gap);
        var bh = (pct / 100) * chartH;
        var by = padding.top + chartH - bh;

        ctx.fillStyle = pct >= 100 ? '#22c55e' : (pct >= 50 ? '#06b6d4' : '#3b82f6');
        ctx.beginPath();
        ctx.roundRect(x, by, barW, bh, [4, 4, 0, 0]);
        ctx.fill();

        // % label on bar
        ctx.fillStyle = '#e2e8f0';
        ctx.font = 'bold 10px system-ui';
        ctx.textAlign = 'center';
        ctx.fillText(pct + '%', x + barW / 2, by - 4);

        // Project name below
        ctx.fillStyle = '#94a3b8';
        ctx.font = '9px system-ui';
        ctx.save();
        ctx.translate(x + barW / 2, padding.top + chartH + 8);
        ctx.rotate(Math.PI / 4);
        var lbl = p.title || p.id || '';
        if (lbl.length > 12) lbl = lbl.substring(0, 10) + '..';
        ctx.textAlign = 'left';
        ctx.fillText(lbl, 0, 0);
        ctx.restore();
        ctx.textAlign = 'start';
      }
    }

    function addChartTooltip(canvasId, segments) {
      var canvas = document.getElementById(canvasId);
      if (!canvas) return;
      var tooltip = document.getElementById('chart-tooltip');
      canvas.addEventListener('mousemove', function (e) {
        var rect = canvas.getBoundingClientRect();
        var scaleX = canvas.width / rect.width;
        var scaleY = canvas.height / rect.height;
        var x = (e.clientX - rect.left) * scaleX;
        var y = (e.clientY - rect.top) * scaleY;
        var found = null;
        for (var i = 0; i < segments.length; i++) {
          var s = segments[i];
          if (s.type === 'arc') {
            var dx = x - s.cx, dy = y - s.cy;
            var dist = Math.sqrt(dx * dx + dy * dy);
            var angle = Math.atan2(dy, dx);
            if (angle < -Math.PI / 2) angle += Math.PI * 2;
            if (dist >= (s.innerR || 0) && dist <= s.outerR && angle >= s.startAngle && angle < s.endAngle) { found = s; break; }
          } else if (s.type === 'rect') {
            if (x >= s.x && x <= s.x + s.w && y >= s.y && y <= s.y + s.h) { found = s; break; }
          }
        }
        if (found) {
          tooltip.style.display = 'block';
          tooltip.style.left = (e.clientX + 12) + 'px';
          tooltip.style.top = (e.clientY - 20) + 'px';
          tooltip.textContent = found.label + ': ' + found.value;
        } else {
          tooltip.style.display = 'none';

    async function gitLoadData() {
      try {
        var statusRes = await api('GET', '/api/github/status');
        var projects = statusRes.projects || [];
        var linked = projects.filter(function (p) { return p.linked; });
        var unlinked = projects.filter(function (p) { return !p.linked; });

        // Summary bar
        var sumEl = document.getElementById('git-summary');
        if (sumEl) {
          sumEl.innerHTML =
            '<div class="git-summary-stat"><div class="val">' + linked.length + '</div><div class="lbl">Linked Repos</div></div>' +
            '<div class="git-summary-stat"><div class="val">' + unlinked.length + '</div><div class="lbl">Unlinked Projects</div></div>' +
            '<div class="git-summary-stat"><div class="val">' + projects.length + '</div><div class="lbl">Total Projects</div></div>';
        }

        // Linked repos table
        var lEl = document.getElementById('git-linked-section');
        if (lEl) {
          if (linked.length === 0) {
            lEl.innerHTML = '<div style="color:var(--text-muted);padding:20px;text-align:center;">No projects linked to GitHub repos yet.</div>';
          } else {
            var html = '<h4 style="font-size:14px;margin-bottom:12px;color:var(--text);">Linked Repos \u2192 Projects</h4>' +
              '<table class="table"><thead><tr>' +
              '<th>Project</th><th>Repository</th><th>Last Synced</th><th>Tasks Mapped</th><th>Actions</th>' +
              '</tr></thead><tbody>';
            for (var i = 0; i < linked.length; i++) {
              var p = linked[i];
              var syncTime = p.last_synced ? new Date(p.last_synced).toLocaleString() : 'Never';
              var syncAge = p.last_synced ? (Date.now() - new Date(p.last_synced).getTime()) : Infinity;
              var syncColor = syncAge < 3600000 ? 'var(--success)' : (syncAge < 86400000 ? 'var(--warning)' : 'var(--error)');
              if (!p.last_synced) syncColor = 'var(--text-muted)';
              var repoUrl = 'https://github.com/' + esc(p.repo);
              html += '<tr>' +
                '<td style="font-weight:500;">' + esc(p.project) + '</td>' +
                '<td><a href="' + repoUrl + '" target="_blank" style="color:var(--cyan);text-decoration:none;">' + esc(p.repo) + ' \u2197</a></td>' +
                '<td style="font-size:12px;color:' + syncColor + ';font-weight:500;">' + syncTime + '</td>' +
                '<td>' + (p.mapped_tasks || 0) + '</td>' +
                '<td><div style="display:flex;gap:4px;flex-wrap:wrap;">' +
                '<button class="btn btn-ghost btn-xs" onclick="gitAction(\'push\',\'' + esc(p.project) + '\')">Push</button>' +
                '<button class="btn btn-ghost btn-xs" onclick="gitAction(\'pull\',\'' + esc(p.project) + '\')">Pull</button>' +
                '<button class="btn btn-xs" style="background:var(--cyan);color:white;" onclick="gitAction(\'sync\',\'' + esc(p.project) + '\')">Sync</button>' +
                '<button class="btn btn-ghost btn-xs" style="color:var(--error);" onclick="gitAction(\'unlink\',\'' + esc(p.project) + '\')">Unlink</button>' +
                '</div></td>' +
                '</tr>';
            }
            html += '</tbody></table>';
            lEl.innerHTML = html;
          }
        }

        // Unlinked projects table
        var uEl = document.getElementById('git-unlinked-section');
        if (uEl) {
          if (unlinked.length === 0) {
            uEl.innerHTML = '<div style="color:var(--success);padding:12px;">\u2705 All projects are linked to GitHub repos.</div>';
          } else {
            var allP = allProjects();
            var html2 = '<h4 style="font-size:14px;margin-bottom:12px;color:var(--text);">Projects Without Git Repo</h4>' +
              '<table class="table"><thead><tr>' +
              '<th>Project</th><th>Status</th><th>Priority</th><th>Tasks</th><th>Actions</th>' +
              '</tr></thead><tbody>';
            for (var j = 0; j < unlinked.length; j++) {
              var up = unlinked[j];
              var projData = allP.find(function (x) { return x.id === up.project; }) || {};
              html2 += '<tr>' +
                '<td style="font-weight:500;">' + esc(up.project) + '</td>' +
                '<td>' + badge(projData.status || '-') + '</td>' +
                '<td>' + badge(projData.priority || '-', (projData.priority || '').toLowerCase()) + '</td>' +
                '<td>' + ((projData.tasks || []).length) + ' tasks</td>' +
                '<td><div style="display:flex;gap:4px;align-items:center;">' +
                '<input id="git-link-' + esc(up.project) + '" type="text" placeholder="owner/repo" style="width:180px;padding:4px 8px;font-size:12px;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:var(--radius);">' +
                '<button class="btn btn-ghost btn-xs" onclick="gitLinkProject(\'' + esc(up.project) + '\')">Link</button>' +

    async function gitAction(action, project) {
      var endpoint = '/api/github/' + action;
      toast(action.charAt(0).toUpperCase() + action.slice(1) + 'ing ' + project + '...', 'success');
      try {
        var res = await api('POST', endpoint, { project: project });
        if (res.success) {
          toast(action + ' successful for ' + project);
          gitLoadData();
          refreshData();
        } else { toast(res.error || action + ' failed', 'error'); }
      } catch (e) { toast(action + ' error: ' + e.message, 'error'); }
    }

    async function gitLinkProject(project) {
      var input = document.getElementById('git-link-' + project);
      var repo = input ? input.value.trim() : '';
      if (!repo) { toast('Enter owner/repo to link', 'error'); return; }
      try {
        var res = await api('POST', '/api/github/link', { project: project, repo: repo });
        if (res.success) { toast('Linked: ' + project + ' \u2192 ' + repo); gitLoadData(); }
        else { toast(res.error || 'Link failed', 'error'); }
      } catch (e) { toast('Link error: ' + e.message, 'error'); }
    }

    async function gitCreateAndLink(project) {
      var repoName = project;
      toast('Creating private repo docxology/' + repoName + '...', 'success');
      try {
        var createRes = await api('POST', '/api/github/create-repo', { name: repoName, private: true });
        if (!createRes.success) { toast(createRes.error || 'Create failed', 'error'); return; }
        toast('Repo created. Linking...');
        var linkRes = await api('POST', '/api/github/link', { project: project, repo: 'docxology/' + repoName });
        if (linkRes.success) { toast('Created & linked: docxology/' + repoName); gitLoadData(); refreshData(); }
        else { toast(linkRes.error || 'Link failed after create', 'error'); }
      } catch (e) { toast('Create & link error: ' + e.message, 'error'); }
    }

    function toggleDispatchSection(section) {
      dispatchSectionsExpanded[section] = !dispatchSectionsExpanded[section];
      var content = document.getElementById('dispatch-section-' + section);
      var toggle = document.getElementById('dispatch-toggle-' + section);
      if (content) content.classList.toggle('collapsed', !dispatchSectionsExpanded[section]);

    function toggleDispatchContext(type, id) {
      var el = document.getElementById('dispatch-ctx-' + type + '-' + id);
      if (!el) return;
      var isCollapsed = el.classList.toggle('collapsed');
      if (!isCollapsed) {
        // Load context from API
        fetch('/api/' + type + 's/' + id + '/context')
          .then(function (r) { return r.json(); })
          .then(function (ctx) {
            var histEl = document.getElementById('dispatch-ctx-history-' + type + '-' + id);
            if (!histEl) return;
            var dh = ctx.dispatch_history || {};
            var keys = Object.keys(dh);
            if (keys.length === 0) {
              histEl.innerHTML = '<span style="color:var(--text-muted);">No dispatch history yet</span>';
              return;
            }
            var html = keys.slice(-3).reverse().map(function (k) {
              var entry = dh[k];
              var ts = entry.timestamp ? new Date(entry.timestamp).toLocaleString() : 'unknown';
              return '<div class="dispatch-context-history-item">' + k + ' - ' + ts + '</div>';
            }).join('');
            histEl.innerHTML = html;
          })
          .catch(function () { });
      }
    }

            blockedTasks.push({ task: t, project: p });
          }
          if (t.blocks && t.blocks.length > 0) {
            blockingTasks.push({ task: t, project: p, blocksCount: t.blocks.length });
          }
        }
      }

      // Blocked missions
      var blockedMissions = ms.filter(function (m) { return (m.status || '').toUpperCase() === 'BLOCKED' || (m.status || '').toUpperCase() === 'PAUSED'; });

      var totalBlocked = blockedMissions.length + blockedProjects.length + blockedTasks.length;

      // Blocked Projects section
      if (blockedProjects.length > 0) {
        html += '<div class="table-section"><h4 style="color:var(--warning);font-size:14px;">Blocked Projects (' + blockedProjects.length + ')</h4>';
        for (var b = 0; b < blockedProjects.length; b++) {

            '</div>';
        }
        html += '</div>';

      // Blocked Tasks section

          var bt = blockedTasks[d];
          html += '<tr>' +
            '<td>' + esc(bt.task.title) + '</td>' +
            '<td><span class="text-dim text-sm">' + esc(bt.project.id) + '</span></td>' +
            '<td>' + (bt.task.priority ? badge(bt.task.priority, bt.task.priority.toLowerCase()) : '-') + '</td>' +
            '<td>' + (bt.task.due || '-') + '</td>' +
            '</tr>';
        }
        html += '</tbody></table></div>';
      }

      // Tasks blocking others
      if (blockingTasks.length > 0) {
        html += '<div class="table-section"><h4 style="font-size:14px;">Tasks Blocking Others (' + blockingTasks.length + ')</h4>';
        html += '<table class="data-grid"><thead><tr><th>Task</th><th>Project</th><th>Section</th><th>Blocks</th></tr></thead><tbody>';
        for (var e = 0; e < blockingTasks.length; e++) {

    async function loadInterviewHistory() {
      try {
        var res = await fetch('/api/interview/sessions');

        var list = document.getElementById('interview-history');
        if (!data.sessions || data.sessions.length === 0) {
          list.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-muted);font-size:12px;">No interview history yet</div>';
          return;
        }
        list.innerHTML = data.sessions.map(function (s) {
          var date = new Date(s.startedAt).toLocaleDateString();
          var status = s.completedAt ? '✓' : '...';
          return '<div class="interview-history-item" onclick="loadInterviewSession(\'' + s.id + '\')">' +
            '<div style="display:flex;justify-content:space-between;align-items:center;">' +
            '<span style="font-weight:500;">' + s.entityTitle + '</span>' +
            '<span style="font-size:11px;color:var(--text-muted);">' + status + '</span>' +
            '</div>' +
            '<div style="font-size:11px;color:var(--text-dim);margin-top:4px;">' +
            '<span class="badge badge-ACTIVE" style="font-size:10px;">' + s.interviewType + '</span> ' +
            date +
            '</div>' +
            '</div>';
        }).join('');
      } catch (e) {
        console.error('Failed to load interview history', e);
      }
    }

    async function loadInterviewSession(sessionId) {
      try {
        var res = await fetch('/api/interview/session/' + sessionId);
        var data = await res.json();
        currentInterviewSession = data.session;
        renderActiveInterview();
      } catch (e) {
        showToast('Failed to load session', 'error');

    async function interviewSubmit() {
      var answer = document.getElementById('interview-answer').value;
      try {
        var res = await fetch('/api/interview/respond', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sessionId: currentInterviewSession.id, answer: answer })
        });
        var data = await res.json();
        if (data.success) {
          currentInterviewSession.questions[currentInterviewSession.currentIdx].a = answer;
          currentInterviewSession.currentIdx = data.currentIdx;
          if (data.isComplete) {
            currentInterviewSession.summary = data.summary;
            currentInterviewSession.completedAt = Date.now();
            showToast('Interview complete!', 'success');
          }
          renderActiveInterview();
          loadInterviewHistory();
        }
      } catch (e) {
        showToast('Failed to submit answer', 'error');
      }
    }

    function interviewSkip() {
      currentInterviewSession.currentIdx++;
      if (currentInterviewSession.currentIdx >= currentInterviewSession.questions.length) {
        showToast('End of questions reached', 'info');
        currentInterviewSession.currentIdx = currentInterviewSession.questions.length - 1;
      }
      renderActiveInterview();
    }

    function interviewPrev() {
      if (currentInterviewSession.currentIdx > 0) {
        currentInterviewSession.currentIdx--;
        renderActiveInterview();
      }
    }

    async function startInterview() {
      var entityVal = document.getElementById('interview-entity').value;
      var interviewType = document.getElementById('interview-type').value;

      if (!entityVal) {
        showToast('Please select an entity', 'error');
        return;
      }

      var parts = entityVal.split(':');
      var entityType = parts[0];
      var entityId = parts[1];
      var entityTitle = parts.slice(2).join(':');

      showToast('Generating questions...', 'info');

      try {
        var res = await fetch('/api/interview/start', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            entityType: entityType,
            entityId: entityId,
            entityTitle: entityTitle,
            interviewType: interviewType
          })
        });
        var data = await res.json();
        if (data.success) {
          closeModal();
          // Load the new session
          await loadInterviewSession(data.sessionId);
          showToast('Interview started!', 'success');
        } else {
          showToast(data.error || 'Failed to start', 'error');
        }
      } catch (e) {
        showToast('Failed to start interview', 'error');
      }
    }

    function exportJSON() {
      var blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
      downloadBlob(blob, 'pai-dashboard-' + new Date().toISOString().split('T')[0] + '.json');
    }

    function exportCSV() {
      var allP = allProjects();
      var csv = 'Type,ID,Title,Status,Priority,Completion\n';
      var ms = state.missions || [];
      for (var i = 0; i < ms.length; i++) {
        var m = ms[i];
        csv += 'Mission,' + csvEsc(m.id) + ',' + csvEsc(m.title) + ',' + m.status + ',' + m.priority + ',' + (m.aggregate_completion || 0) + '\n';
      }
      for (var j = 0; j < allP.length; j++) {
        var p = allP[j];
        csv += 'Project,' + csvEsc(p.id) + ',' + csvEsc(p.title) + ',' + p.status + ',' + p.priority + ',' + (p.completion_percentage || 0) + '\n';
        var tasks = p.tasks || [];
        for (var t = 0; t < tasks.length; t++) {
          csv += 'Task,' + csvEsc(p.id) + ',' + csvEsc(tasks[t].title) + ',' + tasks[t].section + ',' + (tasks[t].priority || '') + ',\n';
        }
      }
      var blob = new Blob([csv], { type: 'text/csv' });
      downloadBlob(blob, 'pai-export-' + new Date().toISOString().split('T')[0] + '.csv');
    }

    function exportMarkdown() {
      var md = '# PAI Project Dashboard\n\nGenerated: ' + new Date().toISOString().split('T')[0] + '\n\n';
      var ms = state.missions || [];
      for (var i = 0; i < ms.length; i++) {

        md += '- Status: ' + m.status + '\n- Priority: ' + m.priority + '\n- Completion: ' + (m.aggregate_completion || 0) + '%\n\n';
      }

      for (var j = 0; j < allP.length; j++) {

        md += '- Status: ' + p.status + '\n- Completion: ' + (p.completion_percentage || 0) + '%\n\n';

        }

      downloadBlob(blob, 'pai-report-' + new Date().toISOString().split('T')[0] + '.md');
    }

    async function importJSON(e) {
      var file = e.target.files[0];
      if (!file) return;
      try {
        var text = await file.text();
        var data = JSON.parse(text);
        var count = 0;
        if (data.missions) {
          for (var i = 0; i < data.missions.length; i++) {
            var m = data.missions[i];
            await api('POST', '/api/missions', { slug: m.id, title: m.title, description: m.description || '', priority: m.priority || 'MEDIUM', status: m.status || 'ACTIVE' });
            count++;
          }
        }
        if (data.projects || data.orphan_projects) {
          var seenP = new Set();
          var combined = (data.projects || []).concat(data.orphan_projects || []);
          for (var j = 0; j < combined.length; j++) {
            var p = combined[j];
            if (seenP.has(p.id)) continue; seenP.add(p.id);
            await api('POST', '/api/projects', { slug: p.id, title: p.title, goal: p.goal || '', priority: p.priority || 'MEDIUM', status: p.status || 'PLANNING' });
            count++;
            var tasks = p.tasks || [];
            for (var t = 0; t < tasks.length; t++) {
              await api('POST', '/api/tasks/' + p.id, { text: tasks[t].title, priority: tasks[t].priority, section: tasks[t].section });
              count++;
            }
          }
        }
        toast('Imported ' + count + ' items');
        refreshData();
      } catch (err) { toast('Import failed: ' + err.message, 'error'); }
    }

    function downloadBlob(blob, name) {

      var a = document.createElement('a');
      a.href = url; a.download = name; a.click();
      URL.revokeObjectURL(url);
    }

    async function submitCreate(e, type) {
      e.preventDefault();
      var form = new FormData(e.target);
      var data = Object.fromEntries(form);

      if (data.criteria) data.criteria = data.criteria.split('\n').map(function (s) { return s.trim(); }).filter(Boolean);
      else data.criteria = [];
      if (data.tags) data.tags = data.tags.split(',').map(function (s) { return s.trim(); }).filter(Boolean);
      else data.tags = [];

      try {
        var res;
        if (type === 'mission') {
          res = await api('POST', '/api/missions', data);
          if (res.created) { toast('Mission created'); closeModal(); refreshData(); }
          else { toast(res.error || 'Failed', 'error'); }
        } else {
          if (data.mission) data.parent_mission = data.mission;
          res = await api('POST', '/api/projects', data);
          if (res.created) { toast('Project created'); closeModal(); refreshData(); }
          else { toast(res.error || 'Failed', 'error'); }
        }
      } catch (err) { toast('Error: ' + err.message, 'error'); }
      return false;
    }

    async function submitEdit(e, type, slug) {
      e.preventDefault();
      var form = new FormData(e.target);
      var data = Object.fromEntries(form);

      for (var k in data) { if (data[k] === '') delete data[k]; }

      try {
        if (type === 'project' && data.newTask) {
          await api('POST', '/api/tasks/' + slug, { text: data.newTask });
          delete data.newTask;
        }

        if (Object.keys(data).length > 0) {
          if (type === 'mission') {
            await api('PUT', '/api/missions/' + slug, data);
          } else {
            await api('PUT', '/api/projects/' + slug, data);
          }
        }
        toast('Updated successfully');
        closeModal();
        refreshData();
      } catch (err) { toast('Error: ' + err.message, 'error'); }
      return false;
    }

    function dispatchToClipboard(action, context) {
      var prompt = generateDispatchPrompt(action, context);
      if (!prompt) { toast('Unknown dispatch action', 'error'); return; }
      navigator.clipboard.writeText(prompt).then(function () {
        toast('Prompt copied — paste into Claude Code');
      }).catch(function () {
        var ta = document.createElement('textarea');
        ta.style.cssText = 'position:fixed;left:-9999px;top:-9999px;opacity:0';
        ta.value = prompt;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        toast('Prompt copied — paste into Claude Code');
      });
      document.querySelectorAll('.dispatch-menu.open').forEach(function (m) { m.classList.remove('open'); });
    }

    function toggleDispatch(btn) {
      if (_dispatchHandler) {
        document.removeEventListener('click', _dispatchHandler);
        _dispatchHandler = null;
      }
      document.querySelectorAll('.dispatch-menu.open').forEach(function (m) { m.classList.remove('open'); });
      var menu = btn.nextElementSibling;
      var isOpen = menu.classList.toggle('open');
      if (isOpen) {
        setTimeout(function () {
          _dispatchHandler = function (e) {
            if (!menu.contains(e.target) && e.target !== btn) {
              menu.classList.remove('open');
              document.removeEventListener('click', _dispatchHandler);
              _dispatchHandler = null;
            }
          };
          document.addEventListener('click', _dispatchHandler);
        }, 0);
      }
    }

    async function ghLoadStatus() {
      var el = document.getElementById('gh-sync-status');
      var ghStat = document.getElementById('gh-status');
      try {
        var res = await api('GET', '/api/github/status');
        if (ghStat) {
          var lc = (res.linked_count || 0);
          ghStat.innerHTML = '<span class="badge badge-ACTIVE">' + lc + ' linked</span> ' +
            '<span class="badge badge-IN_PROGRESS">' + ((res.projects || []).length - lc) + ' unlinked</span>';
        }
        if (!el) return;
        if (!res.success || !res.projects) { el.innerHTML = ''; return; }
        var linked = res.projects.filter(function (p) { return p.linked; });
        if (linked.length === 0) {
          el.innerHTML = '<div style="color:var(--text-muted);font-size:12px;">No projects linked yet. Use Link to connect a project to a GitHub repo.</div>';
          return;
        }
        var html = '';
        for (var i = 0; i < linked.length; i++) {
          var p = linked[i];
          var syncTime = p.last_synced ? new Date(p.last_synced).toLocaleString() : 'Never';
          var repoUrl = 'https://github.com/' + esc(p.repo);
          html += '<div style="padding:8px 0;border-bottom:1px solid var(--border);">' +
            '<div style="display:flex;justify-content:space-between;align-items:center;">' +
            '<span style="font-size:13px;font-weight:500;">' + esc(p.project) + '</span>' +
            '<a href="' + repoUrl + '" target="_blank" class="badge badge-ACTIVE" style="font-size:10px;text-decoration:none;">' + esc(p.repo) + ' ↗</a>' +
            '</div>' +
            '<div style="font-size:11px;color:var(--text-muted);margin-top:4px;">' +
            'Last synced: ' + syncTime + ' | Tasks mapped: ' + (p.mapped_tasks || 0) +
            '</div>' +
            '<div id="gh-tasks-' + esc(p.project) + '" style="margin-top:6px;"></div>' +
            '<button class="btn btn-ghost" style="font-size:10px;padding:2px 8px;margin-top:4px;" onclick="ghLoadTaskMappings(\'' + esc(p.project) + '\')">Show Task Links</button>' +
            '</div>';
        }
        el.innerHTML = html;
      } catch (e) {
        if (el) el.innerHTML = '<span style="color:var(--error);font-size:12px;">Could not load status</span>';
      }
    }

    async function ghLoadTaskMappings(slug) {
      var el = document.getElementById('gh-tasks-' + slug);
      if (!el) return;
      el.innerHTML = '<span style="color:var(--text-dim);font-size:11px;">Loading...</span>';
      try {
        var res = await api('GET', '/api/github/mapping/' + slug);
        if (!res.success || !res.mapping) { el.innerHTML = ''; return; }
        var tm = res.mapping.task_map || {};
        var keys = Object.keys(tm);
        if (keys.length === 0) { el.innerHTML = '<span style="font-size:11px;color:var(--text-muted);">No tasks mapped yet</span>'; return; }
        var html = '<div style="font-size:11px;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;">';
        for (var i = 0; i < keys.length; i++) {
          var task = keys[i];
          var entry = tm[task];
          var stateIcon = entry.github_state === 'closed' ? '\u2705' : '\u26AA';
          var secBadge = entry.pai_section === 'completed' ? 'badge-COMPLETED' : entry.pai_section === 'in_progress' ? 'badge-IN_PROGRESS' : 'badge-PLANNING';
          html += '<div style="padding:4px 8px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;">' +
            '<span>' + stateIcon + '</span>' +
            '<a href="' + esc(entry.issue_url) + '" target="_blank" style="color:var(--cyan);text-decoration:none;font-weight:500;">#' + entry.issue_number + '</a>' +
            '<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + esc(task) + '</span>' +
            '<span class="badge ' + secBadge + '" style="font-size:9px;">' + esc(entry.pai_section) + '</span>' +
            '<button class="btn btn-ghost" style="font-size:9px;padding:1px 6px;" onclick="ghCloseIssue(\'' + esc(slug) + '\',' + entry.issue_number + ',' + (entry.github_state === 'open') + ')">' + (entry.github_state === 'open' ? 'Close' : 'Reopen') + '</button>' +
            '</div>';
        }
        html += '</div>';
        el.innerHTML = html;
      } catch (e) { el.innerHTML = '<span style="color:var(--error);font-size:11px;">Failed to load</span>'; }
    }

    async function ghCreateIssue() {

    async function ghCloseIssue(slug, issueNum, shouldClose) {
