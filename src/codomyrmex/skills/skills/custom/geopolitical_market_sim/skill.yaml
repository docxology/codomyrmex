name: geopolitical-market-sim
description: |
  Geopolitical market forecasting skill for Codomyrmex, backed by the
  PrediHermes Hermes skill (nativ3ai/hermes-geopolitical-market-sim).

  Combines WorldOSINT headless OSINT signals with Polymarket open-market
  discovery and MiroFish multi-agent counterfactual simulation.

  Prerequisites:
    - Hermes Agent CLI installed and configured
    - PrediHermes skill installed: ./scripts/install_hermes_skill.sh
    - (Optional) WorldOSINT headless + MiroFish companion services

version: "1.0.0"
category: simulation
tags:
  - geopolitics
  - prediction-markets
  - osint
  - simulation
  - polymarket
  - hermes-skill

hermes_skill: geopolitical-market-sim
source: codomyrmex-custom
upstream: https://github.com/nativ3ai/hermes-geopolitical-market-sim

python_facade:
  module: codomyrmex.skills.skills.custom.geopolitical_market_sim
  class: GeopoliticalMarketPipeline
  functions:
    - health
    - list_worldosint_modules
    - track_topic
    - run_tracked
    - plan_tracked
    - dashboard
    - update_topic

mcp_tools:
  - name: hermes_execute
    notes: Pass hermes_skill=geopolitical-market-sim
  - name: hermes_chat_session
    notes: Persists skill across session turns automatically

companion_services:
  worldosint:
    repo: https://github.com/nativ3ai/worldosint-headless
    default_path: ~/predihermes/companions/worldosint-headless
  mirofish:
    repo: https://github.com/nativ3ai/MiroFish
    default_path: ~/predihermes/companions/MiroFish

documentation:
  - docs/agents/hermes/predihermes.md
  - docs/agents/hermes/skills.md
