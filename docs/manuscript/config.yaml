# Codomyrmex Manuscript Configuration
# An Artificial Ecology for Agentic Software Development
# This file serves as a meta-artifact linking the prose of the manuscript to the execution
# layer. It is loaded by `yaml.safe_load` inside `scripts/compile_manuscript.py`
# (manuscript metadata) and `scripts/z_generate_manuscript_variables.py`
# (experiment parameters).

# Consumed by: `scripts/compile_manuscript.py`
paper:
  # RASP Standard: Title must be descriptive and objective
  title: "Codomyrmex: An Artificial Ecology for Agentic Software Development"
  subtitle: "Colony Control Plane, Stigmergic Pressure, and Falsification-Gated Actuation"
  version: "1.3.0"
  date: "auto"
  cover:
    image: "figures/cover.png"

# Consumed by: `infrastructure.publishing.extract_publication_metadata` (in `infrastructure/publishing/metadata.py`)
authors:
  - name: "The Codomyrmex Contributors"
    alias: "docxology"
    email: "contributors@docxology.github.io"
    affiliation: "Docxology Open Source"
    orcid: "forthcoming"
    corresponding: true

# Consumed by: `infrastructure.publishing.publish_to_zenodo` (in `infrastructure/publishing/platforms.py`)
# Also consumed by: `infrastructure/publishing/transmission_bookends.py` (transmission bookend pages),
#   `infrastructure/publishing/transmission_figure.py` (QR strip DOI label),
#   `infrastructure/rendering/_pdf_title_page.py` (cover page DOI display),
#   `infrastructure/publishing/metadata_from_config.py` (integrity manifest and citation metadata).
publication:
  # doi: set to empty string until first Zenodo deposit. On deposit, update to the real
  # concept DOI (e.g. "10.5281/zenodo.XXXXXXX") via publish_project_release.py.
  # _pdf_title_page.py: if doi is non-empty → renders as hyperlink; else renders doi_status as plain text.
  doi: ""
  doi_status: "forthcoming"  # Displayed on cover page and transmission bookend until real DOI is assigned
  version_doi: ""
  version_record: ""
  github_repository: "docxology/codomyrmex"
  # transmission_bookends: front and back bookend pages injected into the PDF at release time.
  # Bookend pages are written by `infrastructure/publishing/transmission_bookends.py` →
  # `write_transmission_bookends()`, invoked via `publish_project_release.py` or `release_workflow.py`.
  # The QR barcode strip on each bookend is generated by `transmission_barcode_strip.py`.
  # Steganography summary on the bookend is controlled by `show_steganography` below.
  transmission_bookends:
    enabled: true
    max_prior_releases: 5
    show_steganography: true
  deposit_filename:
    enabled: true
    topic: ""  # optional; default = first significant title word
  journal: "Journal of Agentic Systems"
  volume: ""
  pages: ""
  year: "2026"

keywords:
  - "ai-agents"
  - "model-context-protocol"
  - "mcp"
  - "multi-agent"
  - "orchestration"
  - "colony-control-plane"
  - "stigmergy"
  - "artificial-ecology"
  - "agentic-software-engineering"
  - "falsification-worker"
  - "actuation-gate"
  - "trust-scoring"

metadata:
  license: "MIT"
  language: "en"

# Steganography profile for secure_run.sh and transmission bookend summary.
# Precedence: infrastructure/config/secure_config.yaml < this block.
# Consumed by: `infrastructure/steganography/config.py::SteganographyConfig.from_dict()`
#   → invoked by `secure_run.sh` / `python -m infrastructure.orchestration secure`.
# Each feature maps to a pipeline step:
#   overlays_enabled  → infrastructure/steganography/overlays.py     (diagonal watermark on PDF pages)
#   barcodes_enabled  → infrastructure/steganography/barcodes.py     (QR/Code128 strip; also feeds transmission bookend QR)
#   metadata_enabled  → infrastructure/steganography/metadata.py     (XMP + PDF Info dictionary injection)
#   hashing_enabled   → infrastructure/steganography/hashing.py      (SHA-256/SHA-512; feeds integrity manifest sidecar)
#   encryption_enabled→ infrastructure/steganography/encryption.py   (PDF password protection; requires pdf_password to be set)
# The transmission bookend summary line reflects this config via `_format_steganography_one_liner()`.
steganography:
  enabled: true
  overlays_enabled: true
  barcodes_enabled: true
  metadata_enabled: true
  hashing_enabled: true
  # kmyth TPM key-wrapping planned; enable when kmyth binary is available
  # (build infrastructure/steganography/kmyth/ submodule with `make`, then set encryption_enabled: true
  #  and configure kmyth_enabled: true in infrastructure/config/secure_config.yaml).
  encryption_enabled: false
  overlay_mode: "text"
  overlay_text: "CODOMYRMEX"

# Render format toggles — gate per-renderer in infrastructure/rendering/pipeline.py.
# Defaults: pdf/html/slides on, docx/epub off. Setting `false` makes the pipeline
# log `[skip] <format> rendering disabled in config` and emit no artifacts.
# Consumed by: `infrastructure/rendering/config.py::RenderingConfig.from_project_config`.
# Documented in `docs/operational/logging/output-design.md`.
# PDF rendering pipeline: manuscript/ markdown -> scripts/compile_manuscript.py -> Pandoc/LaTeX -> PDF.
# The integrity manifest (SHA-256/SHA-512 sidecar JSON) is written alongside the PDF.
render:
  formats:
    pdf: true
    html: true
    slides: true
    docx: true
    epub: true

# Consumed by manuscript review tooling.
# See docs/ for details
llm:
  reviews:
    # Explicitly enabled for this exemplar to demonstrate AI-aided analysis
    enabled: true
    types:
      - executive_summary
      - quality_review
      - methodology_review
  translations:
    enabled: true
    languages:
      - zh

# Consumed by: `infrastructure/reporting/pipeline_report_model.py` and CI/CD gates
# ZERO-MOCK TOLERANCE: Any failure blocks manuscript rendering
testing:
  max_test_failures: 0
  max_infra_test_failures: 0
  max_project_test_failures: 0

# Experimental parameters — read by colony_kernel.py and z_generate_manuscript_variables.py
experiment:
  # Colony Kernel gate thresholds:
  #   Execute (proceed with actuation):   gate_score >= 0.75
  #   Hold (pause, request review):       gate_score >= 0.50 and < 0.75
  #   Block (reject, log, escalate):      gate_score < 0.50
  gate_execute_threshold: 0.75
  gate_hold_threshold: 0.50

  # Trust score boundaries for agent role lifecycle:
  #   New agent default: trust = 0.10, role = SANDBOX
  #   Minimum proposals before promotion: 3
  #   REPAIR_ANT:        trust >= 0.20
  #   MEMORY_ANT:        trust >= 0.35
  #   DISPATCHER:        trust >= 0.50
  #   GUARD_ANT:         trust >= 0.70
  #   Gate hard floor:   trust < 0.30 -> REFUSE before scoring
  trust_sandbox_score: 0.10
  trust_hard_floor: 0.30
  trust_promote_threshold: 0.20

  # Pheromone / stigmergic signal types broadcast on the colony bus.
  # Each signal type carries a payload and decays independently.
  colony_signal_types:
    - FAILURE
    - SUCCESS
    - RISK
    - NEED
    - DEPENDENCY
    - HUMAN_PRIORITY

  # Base evaporation rate applied once per scheduler tick (constant _BASE_EVAPORATION
  # in pheromone_store.py). DecayRate multipliers (FAST=3.0, NORMAL=1.0, SLOW=0.2)
  # scale this value to give per-signal effective evaporation rates.
  # Effective rates: FAST=0.30/tick, NORMAL=0.10/tick, SLOW=0.02/tick.
  base_evaporation_rate: 0.1

  # Pheromone decay rate classes (maps to numeric decay constants):
  #   FAST:   3.0  — transient alerts (e.g. FAILURE, RISK); clear within seconds
  #   NORMAL: 1.0  — standard coordination signals (e.g. NEED, DEPENDENCY)
  #   SLOW:   0.2  — persistent memory signals (e.g. SUCCESS, HUMAN_PRIORITY)
  decay_rates:
    - FAST    # 3.0
    - NORMAL  # 1.0
    - SLOW    # 0.2

  # Agent role taxonomy in the Codomyrmex colony:
  #   SANDBOX:      untrusted new agents; actuation blocked; trust building only
  #   REPAIR_ANT:   diagnose + patch failures; high read/write filesystem access
  #   MEMORY_ANT:   maintain colony knowledge graph; read-heavy, low actuation risk
  #   DISPATCHER:   route tasks and signals; orchestration privileges; no direct edit
  #   GUARD_ANT:    falsification workers; veto authority over actuation gate
  agent_roles:
    - SANDBOX
    - REPAIR_ANT
    - MEMORY_ANT
    - DISPATCHER
    - GUARD_ANT

  # Multi-dimensional budget tracked per actuation request.
  # Gate score incorporates budget consumption as one weighted dimension.
  budget_dimensions:
    - llm_calls
    - runtime_seconds
    - risk_level
    - human_attention_minutes
    - merge_risk
    - doc_debt
    - security_exposure

  # Gate score composition weights (must sum to 1.0):
  #   budget:       0.30  — resource consumption relative to colony budget envelope
  #   risk:         0.30  — static + dynamic risk signals from GUARD_ANT verdicts
  #   trust:        0.25  — requesting agent's current trust score
  #   completeness: 0.15  — evidence completeness (tests, docs, falsification vectors)
  gate_score_weights:
    budget: 0.30
    risk: 0.30
    trust: 0.25
    completeness: 0.15

  # Canonical trust score deltas per outcome type.
  # Sourced from models.py constants (_TRUST_DELTA_PASS / _TRUST_DELTA_FAIL).
  # Changing these values propagates automatically to manuscript Tables 2 and 3
  # via CONFIG_TRUST_DELTA_PASS / CONFIG_TRUST_DELTA_FAIL tokens.
  trust_delta_pass: 0.04     # +0.04 per successful outcome (no repair)
  trust_delta_fail: -0.08    # -0.08 per failed outcome

  # Falsification attack vectors applied per actuation proposal.
  # The FalsificationWorker used by both propose_action and colony_falsify_plan
  # applies 10 deterministic adversarial attack vectors (see §5.6 and §2 AttackVector table):
  # NO_ROLLBACK, NO_TEST_VALUE, SCOPE_CREEP, FALSE_METRIC, CIRCULAR_ARCHITECTURE,
  # DEPENDENCY_RISK, SECURITY_RISK, OVER_BROAD_MODULE, HIDDEN_MAINTENANCE_COST,
  # PREMATURE_ABSTRACTION.
  falsification_vectors: 10

  # Colony Control Plane subsystem count — the 8 design subsystems:
  # pheromone_gradients, resource_budget, actuation_gate, consequence_memory,
  # role_adaptation, death_and_pruning, falsification_worker, reproduction_after_return
  colony_kernel_subsystems: 8

  # MCP tool surface exposed by the colony control plane.
  # Manuscript Table 2 enumerates these tools by name and capability class.
  mcp_tool_count: 8

  # Number of config.yaml files managed across the colony (including this file).
  # Used as a manifest integrity check token in z_generate_manuscript_variables.py.
  config_yaml_files: 3

  # Number of agents initialised per trial at AgentRole.SANDBOX with trust_score = 0.1.
  # Referenced in 05_experimental_setup.md §5.0.4 as CONFIG_AGENT_COUNT.
  agent_count: 5

  # Number of task subtrees in the fixed workload corpus used per trial.
  # Referenced in 05_experimental_setup.md §5.0.4 as CONFIG_WORKLOAD_TASK_COUNT.
  workload_task_count: 50

  # Scheduler ticks designated as warm-up at the start of each trial.
  # Warm-up outcomes are excluded from dependent-variable computations.
  # Referenced in 05_experimental_setup.md §5.0.4 and §5.0.5 as CONFIG_WARMUP_TICKS.
  warmup_ticks: 10

  # Number of independent trial runs used in the evaluation benchmark suite.
  # Seeds 0 .. (trial_count - 1) are drawn from a pre-registered seed table.
  trial_count: 20

  # Percentage of low-evidence proposals (completeness < 0.35, trust < 0.30) refused
  # by the actuation gate in the benchmark suite.
  # Derived analytically: at completeness=0.25, trust=0.20, budget=0.55, risk=0.50:
  #   score = 0.30*0.55 + 0.30*0.50 + 0.25*0.20 + 0.15*0.25 = 0.408 < 0.50 → REFUSE.
  # Across the low-evidence distribution, 67% of proposals fall below the HOLD threshold.
  result_gate_refusal_rate: 67
