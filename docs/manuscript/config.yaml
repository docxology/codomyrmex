# Codomyrmex Manuscript Configuration
# An Artificial Ecology for Agentic Software Development
# This file serves as a meta-artifact linking the prose of the manuscript to the execution
# layer. It is loaded by `yaml.safe_load` inside `scripts/compile_manuscript.py`
# (manuscript metadata) and `scripts/z_generate_manuscript_variables.py`
# (experiment parameters).

# Consumed by: `scripts/compile_manuscript.py`
paper:
  # RASP Standard: Title must be descriptive and objective
  title: "Codomyrmex: An Artificial Ecology for Agentic Software Development"
  subtitle: "Colony Control Plane, Stigmergic Pressure, and Falsification-Gated Actuation"
  version: "1.3.0"
  date: "auto"
  # Initial presentation setting; tune as needed and regenerate/review the PDF.
  # This affects layout only and is not a scientific or calibrated parameter.
  pdf_margin: "0.58in"
  cover:
    image: "figures/cover.png"

# Figure metadata is the single source for manuscript captions, evidence class,
# labels, and layout widths. Captions may contain {{TOKEN}} references; the
# variable generator resolves them from live runtime/configuration evidence.
figures:
  cover:
    filename: "cover.png"
    label: "fig:cover"
    width: "95%"
    evidence_class: "schematic"
    caption: >-
      Conceptual cover for the Colony Control Plane. The visual identity combines
      the implemented subsystems and signal motifs; it is not quantitative evidence.
  colony_pressure_loop:
    filename: "colony_pressure_loop.png"
    label: "fig:pressure_loop"
    width: "80%"
    evidence_class: "schematic"
    caption: >-
      Conceptual Colony Kernel feedback dependencies. Proposal review reads budget,
      local RISK/FAILURE pressure, role, trust, and completeness; a separate caller
      may execute an approved action and report its outcome; recording then changes
      trust, resource usage, and signal traces used on a later proposal. Arrows show
      feedback dependencies rather than exact runtime call order.
  pheromone_decay:
    filename: "pheromone_decay.png"
    label: "fig:pheromone_decay"
    width: "88%"
    evidence_class: "analytic"
    caption: >-
      Analytical trajectories of a {{CONFIG_SCORE_MAX}}-strength trace under the
      implemented subtractive decay rule. Each curve is
      s(t)=max({{CONFIG_SCORE_MIN}},s0-epsilon t),
      with no deposits, reads, or reinforcement. Vertical markers show continuous
      extinction points; the runtime updates at integer ticks and removes values at
      or below zero. {{CONFIG_PARAMETER_STATUS_SHORT}} Parameters are generated from
      the manuscript snapshot.
  gate_score_heatmap:
    filename: "gate_score_heatmap.png"
    label: "fig:gate_heatmap"
    width: "90%"
    evidence_class: "analytic"
    caption: >-
      Formula-derived gate decision landscape over trust and effective local hazard
      pressure, where hazard is the maximum of RISK and FAILURE. Budget and
      completeness are fixed at {{CONFIG_UNIT_SCORE}}; configured hazard boundaries
      are {{CONFIG_HAZARD_MEDIUM_THRESHOLD}} and {{CONFIG_HAZARD_HIGH_THRESHOLD}},
      and trust below {{CONFIG_TRUST_HARD_FLOOR}} forces refusal. Colours encode
      configured decision bands. This is an analytical policy map, not an observed
      proposal distribution. {{CONFIG_PARAMETER_STATUS_SHORT}}
  trust_trajectory:
    filename: "trust_trajectory.png"
    label: "fig:trust_trajectory"
    width: "90%"
    evidence_class: "deterministic-fixture"
    caption: >-
      Deterministic trust trajectory under consecutive caller-reported clean
      outcomes through the configured {{CONFIG_TRUST_TRAJECTORY_HORIZON}}-outcome
      horizon. Shaded bands show inferred role labels; the independent generated gate
      floor means the first role promotion does not yet make ordinary gate scoring
      reachable. Points are analytical applications of the fixed update, not
      population measurements or evidence of stochastic convergence.
      {{CONFIG_PARAMETER_STATUS_SHORT}}
  falsification_vectors:
    filename: "falsification_vectors.png"
    label: "fig:falsification_vectors"
    width: "90%"
    evidence_class: "code-taxonomy"
    caption: >-
      Falsification categories ordered by the highest severity emitted by their live
      heuristic checks. Colour encodes severity class; one category may be served by
      more than one check. The empty CRITICAL band denotes the only finding class that
      hard-refuses before ordinary scoring. The chart is a code-taxonomy
      visualization, not a measured detection-rate comparison.
  subsystem_architecture:
    filename: "subsystem_architecture.png"
    label: "fig:architecture"
    width: "80%"
    evidence_class: "schematic"
    caption: >-
      Colony Control Plane topology. ColonyKernel owns subsystem lifecycle and
      sequencing; the live integration object supplies the operational leaf-node
      count, and the nodes exchange typed value objects from the shared models.py
      contract. Coloured by functional role; the diagram shows ownership and
      information flow, not deployment topology or performance.
  gate_score_3d:
    filename: "gate_score_3d.png"
    label: "fig:gate_score_3d"
    width: "92%"
    evidence_class: "analytic"
    caption: >-
      Analytical gate-score surface with budget and local hazard clearance fixed at
      {{CONFIG_UNIT_SCORE}}. The implementation's trust hard floor and trust-credit
      tiers are shown; completeness is plotted continuously as a visual envelope even
      though runtime completeness is discrete. Threshold planes identify the
      configured HOLD and EXECUTE boundaries. This is formula-derived, not an
      empirical risk surface. {{CONFIG_PARAMETER_STATUS_SHORT}}
  fep_correspondence:
    filename: "fep_correspondence.png"
    label: "fig:fep_correspondence"
    width: "95%"
    evidence_class: "conceptual-analogy"
    caption: >-
      Schematic vocabulary crosswalk between Free Energy Principle terms and Colony
      Kernel artifacts. Each row names an FEP concept, the kernel artifact proposed as
      an analogue, and the intended engineering intuition. The correspondence is
      conceptual: the current kernel does not implement Bayesian inference or formal
      equivalence with expected free energy.
  research_roadmap:
    filename: "research_roadmap.png"
    label: "fig:research_roadmap"
    width: "96%"
    evidence_class: "research-plan"
    caption: >-
      Configured research roadmap for the Colony Kernel. The
      {{CONFIG_RESEARCH_ROADMAP_STAGE_COUNT}} milestones move from the implemented
      contract and replay record toward attested execution, adversarial evaluation,
      calibration, persistence, and a probabilistic extension. Status labels describe
      the current research state, not empirical results or delivery guarantees; each
      milestone remains conditional on its stated artifact, metric, falsifier, and exit
      criterion.
  formalism_code_crosswalk:
    filename: "formalism_code_crosswalk.png"
    label: "fig:formalism_code_crosswalk"
    width: "96%"
    evidence_class: "formal-crosswalk"
    caption: >-
      Evidence-oriented crosswalk from formal objects to typed code anchors, translation
      mechanisms, executable evidence, and claim boundaries. Green rows are implemented
      contracts, blue rows are partial bridges, and amber/pink rows are future integration
      work. The visual records correspondence and missing links; it is not a proof graph
      or evidence of scientific equivalence.
  replay_contract:
    filename: "replay_contract.png"
    label: "fig:replay_contract"
    width: "96%"
    evidence_class: "deterministic-fixture"
    caption: >-
      Fixed-input paired-locality replay derived from real Colony Kernel subsystems. The
      same-target score changes from {{RESULT_PAIRED_CLEAR_SCORE}}/EXECUTE to
      {{RESULT_PAIRED_FAILURE_SCORE}}/HOLD after a caller-reported failure, while the
      unrelated target remains at {{RESULT_PAIRED_UNRELATED_SCORE}}/EXECUTE with
      effective hazard {{RESULT_PAIRED_UNRELATED_PRESSURE}}, and passive
      decay restores {{RESULT_PAIRED_RECOVERED_SCORE}}/EXECUTE. The replay is repeated
      for semantic equality; it is not an attestation, causal estimate, or external
      workload result. {{CONFIG_PARAMETER_STATUS_SHORT}}
  attestation_event_chain:
    filename: "attestation_event_chain.png"
    label: "fig:attestation_event_chain"
    width: "96%"
    evidence_class: "authenticated-fixture"
    caption: >-
      Authenticated local lifecycle fixture with {{RESULT_ATTESTATION_EVENT_COUNT}}
      linked events and validation status {{RESULT_ATTESTATION_CHAIN_VALID}}. The
      chain binds proposal, verdict, authorization, execution receipt, and outcome
      digests under the configured signer; it establishes ledger integrity, not that
      the action was safe, useful, or independently observed.
  safety_utility_frontier:
    filename: "safety_utility_frontier.png"
    label: "fig:safety_utility_frontier"
    width: "88%"
    evidence_class: "offline-synthetic"
    caption: >-
      Paired safety--utility points from {{RESULT_BENCHMARK_TASK_COUNT}} deterministic
      synthetic tool-use cases. Baseline and mediated harmful-action rates are
      {{RESULT_BENCHMARK_BASELINE_HARM_RATE}} and
      {{RESULT_BENCHMARK_MEDIATED_HARM_RATE}}, with utilities
      {{RESULT_BENCHMARK_BASELINE_UTILITY}} and
      {{RESULT_BENCHMARK_MEDIATED_UTILITY}}. The paired harmful-action difference is
      {{RESULT_BENCHMARK_HARM_DELTA}} with a descriptive percentile-bootstrap interval
      at a nominal {{RESULT_BENCHMARK_CI_LEVEL}}% confidence level
      [{{RESULT_BENCHMARK_HARM_CI_LOW}}, {{RESULT_BENCHMARK_HARM_CI_HIGH}}]. The
      interval uses task-case pairs, not a population sample. This fixture demonstrates
      analysis plumbing, not calibration or generalization to external agents or workloads.
  calibration_reliability:
    filename: "calibration_reliability.png"
    label: "fig:calibration_reliability"
    width: "88%"
    evidence_class: "calibration-status"
    caption: >-
      Calibration status panel for the current evidence bundle: primary calibration
      is {{RESULT_CALIBRATION_STATUS}} and log-loss analysis is {{RESULT_CALIBRATION_ECE}}.
      Gate scores and trust values are not probabilities; a reliability estimate will
      be rendered only after independently observed held-out outcomes and declared
      confidence values are available.
  persistence_recovery:
    filename: "persistence_recovery.png"
    label: "fig:persistence_recovery"
    width: "88%"
    evidence_class: "restart-fixture"
    caption: >-
      SQLite-backed signal restart fixture. The retained failure signal after closing
      and reopening the store is {{RESULT_PERSISTENCE_RESTART_STRENGTH}}; the durable
      canonical logical database artifact digest is
      {{RESULT_PERSISTENCE_ARTIFACT_SHA256}}.
      This is a durability check, not a throughput or crash-survival claim.
  formalism_coverage:
    filename: "formalism_coverage.png"
    label: "fig:formalism_coverage"
    width: "88%"
    evidence_class: "formalism-inventory"
    caption: >-
      Current formalism-to-code inventory with {{RESULT_FORMAL_CROSSWALK_TOTAL}}
      mappings: {{RESULT_FORMAL_CROSSWALK_IMPLEMENTED}} implemented and
      {{RESULT_FORMAL_CROSSWALK_PARTIAL}} partial, with
      {{RESULT_FORMAL_CROSSWALK_RESEARCH}} research. The chart measures documented
      bridge status and evidence anchors, not theorem coverage or semantic equivalence.
  research_status_matrix:
    filename: "research_status_matrix.png"
    label: "fig:research_status_matrix"
    width: "96%"
    evidence_class: "research-status"
    caption: >-
      Evidence-status matrix for the configured roadmap and formalism crosswalk.
      Status labels are generated from the active configuration and indicate what
      artifacts exist or remain conditional; they are not completion guarantees or
      measured implementation outcomes.

