# Consumed by: `infrastructure.publishing.publish_to_zenodo` (in `infrastructure/publishing/platforms.py`)
# Also consumed by: `infrastructure/publishing/transmission_bookends.py` (transmission bookend pages),
#   `infrastructure/publishing/transmission_figure.py` (QR strip DOI label),
#   `infrastructure/rendering/_pdf_title_page.py` (cover page DOI display),
#   `infrastructure/publishing/metadata_from_config.py` (integrity manifest and citation metadata).
publication:
  # doi: set to empty string until first Zenodo deposit. On deposit, update to the real
  # concept DOI (e.g. "10.5281/zenodo.XXXXXXX") via publish_project_release.py.
  # _pdf_title_page.py: if doi is non-empty → renders as hyperlink; else renders doi_status as plain text.
  doi: ""
  doi_status: "forthcoming"  # Displayed on cover page and transmission bookend until real DOI is assigned
  version_doi: ""
  version_record: ""
  github_repository: "docxology/codomyrmex"
  # transmission_bookends: front and back bookend pages injected into the PDF at release time.
  # Bookend pages are written by `infrastructure/publishing/transmission_bookends.py` →
  # `write_transmission_bookends()`, invoked via `publish_project_release.py` or `release_workflow.py`.
  # The QR barcode strip on each bookend is generated by `transmission_barcode_strip.py`.
  # Steganography summary on the bookend is controlled by `show_steganography` below.
  transmission_bookends:
    enabled: true
    max_prior_releases: 5
    show_steganography: true
  deposit_filename:
    enabled: true
    topic: ""  # optional; default = first significant title word
  journal: "Journal of Agentic Systems"
  volume: ""
  pages: ""
  year: "2026"

keywords:
