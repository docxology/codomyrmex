    - generate_manuscript_figures.py

# Research milestones are deliberately configuration-backed. Each row must state
# the hypothesis, artifact, decisive metric, falsifier, and exit criterion so that
# the manuscript distinguishes a testable program from an unsupported promise.
research_roadmap:
  - id: "R0"
    name: "Reproducible kernel contract"
    status: "implemented"
    artifact_paths:
      - "src/codomyrmex/colony_kernel/replay.py"
      - "tests/unit/colony_kernel/test_replay.py"
      - "tests/unit/colony_kernel/test_manuscript_consistency.py"
      - "docs/manuscript/06_reproducibility.md"
    hypothesis: "The local control-plane contract can be replayed from the checked-in source and configuration."
    artifact: "Scoped tests, coverage record, variable map, figure registry, and rendered manuscript."
    metric: "Replay agreement for gate, locality, decay, and provenance outputs."
    falsifier: "Any replay depends on an undocumented input or produces a contradictory contract result."
    exit_criteria: "Fresh generation and focused gates pass with hashes recorded."
  - id: "R1"
    name: "Attested execution chain"
    status: "next"
    hypothesis: "Binding proposal, authorization, execution, and outcome records will reduce untrustworthy feedback."
    artifact: "Authenticated event ledger with nonce, actor, proposal digest, verdict, and outcome evidence."
    metric: "Forgery and replay rejection, linkage completeness, and overhead under declared workloads."
    falsifier: "A caller can submit or relink an outcome without possessing the required execution evidence."
    exit_criteria: "Adversarial ledger tests pass and the attestation boundary is documented."
  - id: "R2"
    name: "Adversarial tool-use benchmark"
    status: "planned"
    hypothesis: "Gate-mediated proposals will change unsafe-action and recovery outcomes under hostile tool inputs."
    artifact: "Seeded AgentDojo, InjecAgent, or ToolEmu adapter with paired baseline traces."
    metric: "Attack success, harmful-action rate, task utility, refusal cost, and complete trace retention."
    falsifier: "The mediated condition does not improve the preregistered safety-utility frontier."
    exit_criteria: "Independent rerun reproduces paired estimates and failure analyses."
  - id: "R3"
    name: "Calibration and utility"
    status: "planned"
    hypothesis: "Gate scores can be calibrated against independently observed downstream consequences."
    artifact: "Held-out outcome dataset, baseline policies, calibration analysis, and preregistered configuration."
    metric: "Log loss, calibration error, selective risk, repair cost, utility, and confidence intervals."
    falsifier: "Scores remain miscalibrated or add friction without a defensible utility trade-off."
    exit_criteria: "Held-out analysis and uncertainty intervals are released with raw traces."
  - id: "R4"
    name: "Persistence and concurrency"
    status: "planned"
    hypothesis: "Explicit persistence and concurrent access can preserve locality without violating isolation or ordering."
    artifact: "Restart, crash-recovery, multi-worker, and load scenarios under a declared deployment profile."
    metric: "Durability, ordering, isolation, throughput, latency, and recovery completeness."
    falsifier: "Restart or concurrency causes silent signal loss, cross-target contamination, or unsafe duplicate actuation."
    exit_criteria: "Scenario matrix passes with retained logs, seeds, environment, and artifact hashes."
  - id: "R5"
    name: "Probabilistic and Active Inference extension"
    status: "research"
    hypothesis: "An explicit generative model can improve prediction or policy selection beyond the heuristic projection."
    artifact: "Declared likelihood, posterior implementation, simulation-based calibration, and paired baselines."
    metric: "Posterior predictive checks, held-out log loss, calibration, policy utility, and compute cost."
    falsifier: "The probabilistic model fails calibration or utility comparisons, or its assumptions are not identifiable."
    exit_criteria: "Model, assumptions, replay harness, and negative results are independently reproducible."

# Formalism-to-code mappings are a second, evidence-oriented research contract. A
# mapping is not accepted merely because names sound similar: it must identify the
# formal object, the executable translation, retained evidence, and the claim boundary.
formalism_code_crosswalk:
  - id: "F0"
    name: "Typed operational semantics"
    status: "implemented"
    formalism: "State-transition contract"
    formal_object: "Proposal, verdict, reported consequence, and kernel state transition"
    code_symbols: "ActionProposal; GateResult; ColonyKernel.propose_action; ColonyKernel.record_outcome; run_paired_locality_replay"
    code_paths:
      - "src/codomyrmex/colony_kernel/models.py"
      - "src/codomyrmex/colony_kernel/kernel.py"
      - "src/codomyrmex/colony_kernel/replay.py"
    bridge: "Dataclasses and enums define the vocabulary; kernel sequencing defines the transition boundary."
    evidence_paths:
      - "tests/unit/colony_kernel/test_kernel.py"
      - "tests/unit/colony_kernel/test_models.py"
      - "tests/unit/colony_kernel/test_replay.py"
    evidence: "Typed construction, lifecycle sequencing, repeatable replay, and serialized result tests."
    claim_boundary: "Establishes a replayable interface and control-flow contract, not semantic safety or execution attestation."
  - id: "F1"
    name: "Discrete dynamical recurrence"
    status: "implemented"
    formalism: "Bounded state recurrence"
    formal_object: "s_(t+1)=max(0, s_t-epsilon) for a trace without new deposits"
    code_symbols: "PheromoneStore.evaporate; PheromoneStore.tick; TraceField.sense"
    code_paths:
      - "src/codomyrmex/colony_kernel/pheromone_store.py"
      - "src/codomyrmex/agentic_memory/stigmergy/field.py"
    bridge: "Per-signal metadata supplies epsilon; integer ticks apply the floored subtraction and delete depleted markers."
    evidence_paths:
      - "tests/unit/colony_kernel/test_pheromone_store.py"
      - "tests/unit/colony_kernel/test_property_stress_integration.py"
    evidence: "Decay, floor, compound-key isolation, and stress/property scenarios."
    claim_boundary: "Supports the stated recurrence under declared inputs; it is not exponential forgetting, wall-clock decay, or biological pheromone chemistry."
  - id: "F2"
    name: "Piecewise decision semantics"
    status: "implemented"
    formalism: "Rule system with hard overrides"
    formal_object: "Weighted score, hazard tiers, and EXECUTE/HOLD/REFUSE precedence"
    code_symbols: "ActuationGate.witness_state; ActuationGate.evaluate; FalsificationWorker.evaluate_plan"
    code_paths:
      - "src/codomyrmex/colony_kernel/actuation_gate.py"
      - "src/codomyrmex/colony_kernel/falsification/worker.py"
    bridge: "Named thresholds and ordered branches implement the piecewise policy; no opaque learned scorer is implied."
    evidence_paths:
      - "tests/unit/colony_kernel/test_actuation_gate.py"
      - "tests/unit/colony_kernel/test_falsification_worker.py"
    evidence: "Boundary, precedence, monotonicity, and adversarial-vector tests."
    claim_boundary: "Proves only the coded policy properties; the score is not a probability of safety, harm, or utility."
  - id: "F3"
    name: "Runtime invariant predicates"
    status: "partial"
    formalism: "Executable design-by-contract checks"
    formal_object: "Bounds, monotone role thresholds, enum separation, and gate-weight conservation"
    code_symbols: "all_invariants_hold; ColonySignal.__post_init__; ResourceCost.__post_init__"
    code_paths:
      - "src/codomyrmex/colony_kernel/invariants.py"
      - "src/codomyrmex/colony_kernel/models.py"
    bridge: "Predicates and constructor guards execute against live constants; a dedicated crosswalk test checks source alignment."
    evidence_paths:
      - "tests/unit/colony_kernel/test_models.py"
      - "tests/unit/colony_kernel/test_invariants.py"
    evidence: "Direct invariant checks plus boundary regressions; cross-module coverage remains incomplete."
    claim_boundary: "Runtime predicates detect selected violations for supplied states; they are not a complete proof of all kernel behaviors."
  - id: "F4"
    name: "Structural code-change verification"
    status: "implemented"
    formalism: "AST-preservation rules"
    formal_object: "No deletion of public functions, no removed parameters, and order-compatible signatures"
    code_symbols: "ChangeProposal; CodeChangeVerifier.verify; InvariantRule"
    code_paths:
      - "src/codomyrmex/formal_verification/code_change_verifier.py"
      - "src/codomyrmex/formal_verification/gated_rewrite.py"
    bridge: "Python source is parsed into ASTs and compared by pluggable rule functions before optional attestation."
    evidence_paths:
      - "tests/unit/test_v130_foundations.py"
    evidence: "Real-source AST regression tests for preserved public structure and custom rules."
    claim_boundary: "Covers selected structural compatibility properties; it does not establish behavioral equivalence, security, or deployability."
  - id: "F5"
    name: "SMT invariant proving"
    status: "partial"
    formalism: "Satisfiability-based proof obligation"
    formal_object: "C AND not(invariant) is unsatisfiable"
    code_symbols: "KernelFormalSnapshot; runtime_obligations; prove_kernel_obligations"
    code_paths:
      - "src/codomyrmex/colony_kernel/formal.py"
      - "src/codomyrmex/formal_verification/z3_bridge.py"
      - "tests/unit/colony_kernel/test_formal_bridge.py"
      - "tests/unit/formal_verification/test_z3_bridge.py"
    bridge: "A solver-neutral obligation model and bounded kernel-specific Z3 encoding translate selected runtime bounds, weight conservation, pressure monotonicity, locality, and authorized linkage obligations into solver expressions."
    evidence_paths:
      - "tests/unit/colony_kernel/test_formal_bridge.py"
      - "tests/unit/formal_verification/test_z3_bridge.py"
