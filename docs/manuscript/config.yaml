metadata:
  license: "MIT"
  language: "en"

# Steganography profile for secure_run.sh and transmission bookend summary.
# Precedence: infrastructure/config/secure_config.yaml < this block.
# Consumed by: `infrastructure/steganography/config.py::SteganographyConfig.from_dict()`
#   → invoked by `secure_run.sh` / `python -m infrastructure.orchestration secure`.
# Each feature maps to a pipeline step:
#   overlays_enabled  → infrastructure/steganography/overlays.py     (diagonal watermark on PDF pages)
#   barcodes_enabled  → infrastructure/steganography/barcodes.py     (QR/Code128 strip; also feeds transmission bookend QR)
#   metadata_enabled  → infrastructure/steganography/metadata.py     (XMP + PDF Info dictionary injection)
#   hashing_enabled   → infrastructure/steganography/hashing.py      (SHA-256/SHA-512; feeds integrity manifest sidecar)
#   encryption_enabled→ infrastructure/steganography/encryption.py   (PDF password protection; requires pdf_password to be set)
# The transmission bookend summary line reflects this config via `_format_steganography_one_liner()`.
steganography:
  enabled: true
  overlays_enabled: true
  barcodes_enabled: true
  metadata_enabled: true
  hashing_enabled: true
  # kmyth TPM key-wrapping planned; enable when kmyth binary is available
  # (build infrastructure/steganography/kmyth/ submodule with `make`, then set encryption_enabled: true
  #  and configure kmyth_enabled: true in infrastructure/config/secure_config.yaml).
  encryption_enabled: false
  overlay_mode: "text"
  overlay_text: "CODOMYRMEX"

# Render format toggles — gate per-renderer in infrastructure/rendering/pipeline.py,
# via `RenderManager` (see `RenderingConfig.from_project_config`). NOT consulted for
# this project: `scripts/_render_pdf_override.py` exists, so
# `infrastructure/rendering/pipeline.py::_render_pipeline_impl` returns immediately
# after running the override (before `RenderManager` is ever constructed). The
# override only produces `output/paper.pdf` and `output/paper.html` via
# `scripts/compile_manuscript.py --pdf`. slides/docx/epub are therefore never
# generated regardless of these values — verified empty `output/slides/` and no
# `output/{docx,epub}/` artifacts in this checkout. Set to `false` to reflect
# actual behavior; flip to `true` (and extend `_render_pdf_override.py` to call
# the shared `RenderManager`) only if those formats are actually implemented.
# Documented in `docs/operational/logging/output-design.md`.
# PDF rendering pipeline: manuscript/ markdown -> scripts/compile_manuscript.py -> Pandoc/LaTeX -> PDF.
# The integrity manifest (SHA-256/SHA-512 sidecar JSON) is written alongside the PDF.
render:
  formats:
    pdf: true
    html: true
    slides: false
    docx: false
    epub: false

