# Codomyrmex exemplar: infrastructure adapters limited to the integration boundary.
#
# The colony_kernel/ modules (kernel.py, actuation_gate.py, falsification_worker.py,
# pheromone_store.py, pruning_daemon.py, consequence_memory.py, resource_ledger.py,
# role_adapter.py, models.py, config_loader.py) are the main scientific layer and
# MUST remain infrastructure-free.  They import only stdlib and internal codomyrmex
# packages so the colony control-plane is forkable as a standalone package.
#
# Only the file listed below is sanctioned to import infrastructure.*:
#
#   src/manuscript_variables.py
#     — backward-compatibility shim re-exporting codomyrmex.manuscript.variables
#       (the manuscript-variable generator; reads manuscript/config.yaml via the
#       shared infrastructure rendering/config surface and emits experiment-derived
#       tokens for LaTeX injection). Declared here because it is the only src/ file
#       whose job is to bridge the scientific layer to the publication pipeline.
#
# Everything else under src/codomyrmex/ must stay free of infrastructure.* imports.
#
# Enforcement: verified by test_layer_contract_forbids_infrastructure_imports in
# tests/unit/colony_kernel/test_manuscript_consistency.py, which reads this file's
# allow_infrastructure_imports list and asserts every *.py file under
# src/codomyrmex/colony_kernel/ imports no infrastructure.* symbol. Previously this
# file was documentation-only — referenced by docs/manuscript/AGENTS.md as "enforced
# at CI boundary" but consumed by no code anywhere in the repository (verified via
# repo-wide grep, 2026-07-12).
allow_infrastructure_imports:
  - src/manuscript_variables.py
